<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<title>Payment / Receipt - VAJRA LIGHTS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="page_permissions.js"></script>
<script src="common-ui.js"></script>
<style>
    :root{
        --primary:#2563eb;
        --success:#059669;
        --danger:#dc2626;
        --bg:#f1f5f9;
        --card:#ffffff;
        --text:#1e293b;
        --muted:#64748b;
        --border:#cbd5e1;
        --hover:#eff6ff;
        --shadow:0 10px 25px rgba(0,0,0,0.08);
        --radius:14px;
        --amber:#f59e0b;
    }

    *{ box-sizing:border-box; }

    body{
        margin:0;
        font-family:Segoe UI, Roboto, Arial, sans-serif;
        background:burlywood;
        color:var(--text);
        padding:14px;
    }

    .container{
        max-width:1000px;
        margin:auto;
    }

    .card{
        background:var(--card);
        border:1px solid var(--border);
        border-radius:var(--radius);
        box-shadow:var(--shadow);
        padding:16px;
        margin-bottom:16px;
    }

    h1,h2{
        margin:0 0 12px;
    }

    .title-row{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
    }

    .grid{
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        gap:12px;
    }

    .field{
        display:flex;
        flex-direction:column;
        gap:6px;
        position:relative;
    }

    .field.full{
        grid-column:1 / -1;
    }

    label{
        font-size:13px;
        font-weight:600;
        color:var(--muted);
    }

    input, select, textarea, button{
        width:100%;
        min-height:44px;
        border:1px solid var(--border);
        border-radius:10px;
        padding:10px 12px;
        font-size:15px;
        outline:none;
        background:#fff;
    }

    input:focus, select:focus, textarea:focus{
        border-color:var(--primary);
        box-shadow:0 0 0 3px rgba(37,99,235,0.12);
    }

    textarea{
        min-height:90px;
        resize:vertical;
    }

    .btn-row{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        margin-top:12px;
    }

    button{
        cursor:pointer;
        border:none;
        font-weight:700;
    }

    .btn-primary{
        background:var(--primary);
        color:#fff;
    }

    .btn-secondary{
        background:#e2e8f0;
        color:#0f172a;
    }

    .badge{
        background:#dbeafe;
        color:#1d4ed8;
        padding:8px 12px;
        border-radius:999px;
        font-size:13px;
        font-weight:700;
    }

    .credit-chip{
        background:#fff7ed;
        color:#9a3412;
        border:1px solid #fdba74;
        padding:8px 12px;
        border-radius:10px;
        font-size:13px;
        font-weight:700;
        display:none;
    }

    .autocomplete-list{
        position:absolute;
        top:100%;
        left:0;
        right:0;
        background:#fff;
        border:1px solid var(--border);
        border-radius:10px;
        margin-top:4px;
        box-shadow:var(--shadow);
        max-height:220px;
        overflow:auto;
        z-index:50;
        display:none;
    }

    .autocomplete-item{
        padding:10px 12px;
        cursor:pointer;
        border-bottom:1px solid #f1f5f9;
    }

    .autocomplete-item:last-child{
        border-bottom:none;
    }

    .autocomplete-item.active,
    .autocomplete-item:hover{
        background:var(--hover);
    }

    .autocomplete-title{
        font-weight:700;
    }

    .autocomplete-sub{
        font-size:12px;
        color:var(--muted);
        margin-top:4px;
    }

    .autocomplete-money{
        font-size:13px;
        color:#92400e;
        font-weight:700;
        margin-top:4px;
    }

    .search-box{
        display:grid;
        grid-template-columns:2fr 1fr 1fr auto;
        gap:10px;
        align-items:end;
    }

    .table-wrap{
        overflow:auto;
        border:1px solid var(--border);
        border-radius:12px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        min-width:820px;
        background:#fff;
    }

    th, td{
        padding:12px 10px;
        border-bottom:1px solid #e2e8f0;
        text-align:left;
        font-size:14px;
    }

    th{
        background:#f8fafc;
        position:sticky;
        top:0;
        z-index:1;
    }

    .amount{
        text-align:right;
        font-weight:700;
    }

    .payment{
        color:var(--danger);
        font-weight:700;
        text-transform:capitalize;
    }

    .receipt{
        color:var(--success);
        font-weight:700;
        text-transform:capitalize;
    }

    .small{
        font-size:12px;
        color:var(--muted);
    }

    .message{
        margin-top:10px;
        font-weight:700;
    }

    .success-msg{ color:var(--success); }
    .error-msg{ color:var(--danger); }

    .accept-btn{
        background:#16a34a;
        color:#fff;
        border:none;
        padding:8px 12px;
        border-radius:8px;
        font-size:13px;
        font-weight:700;
        cursor:pointer;
        min-height:auto;
        width:auto;
    }

    .accept-btn:hover{
        opacity:0.95;
    }

    .accept-btn:disabled{
        background:#94a3b8;
        cursor:not-allowed;
    }

    .status-badge{
        display:inline-block;
        padding:6px 10px;
        border-radius:999px;
        font-size:12px;
        font-weight:700;
        white-space:nowrap;
    }

    .status-pending{
        background:#fef3c7;
        color:#92400e;
    }

    .status-approved{
        background:#dcfce7;
        color:#166534;
    }

    .status-rejected{
        background:#fee2e2;
        color:#991b1b;
    }

    .status-not-needed{
        background:#e2e8f0;
        color:#334155;
    }

    .linked-bill{
        display:inline-block;
        padding:4px 8px;
        border-radius:999px;
        background:#fff7ed;
        color:#9a3412;
        font-size:12px;
        font-weight:700;
    }

    @media (max-width: 900px){
        .grid{
            grid-template-columns:repeat(2, 1fr);
        }

        .search-box{
            grid-template-columns:1fr 1fr;
        }
    }

    @media (max-width: 600px){
        body{
            padding:10px;
        }

        .card{
            padding:12px;
        }

        .grid{
            grid-template-columns:1fr;
        }

        .search-box{
            grid-template-columns:1fr;
        }

        input, select, textarea, button{
            font-size:16px;
        }
    }
</style>
</head>
<body>
<div class="container">

    <div class="card">
        <div class="title-row">
            <h1>Payment / Receipt Entry</h1>
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <div class="credit-chip" id="creditChip">Credit Collection Mode</div>
                <div class="badge" id="modeBadge">Payment Mode</div>
            </div>
        </div>

        <div class="grid">
            <div class="field">
                <label for="txnType">Type</label>
                <select id="txnType" name="txnType">
                    <option value="payment">Payment</option>
                    <option value="receipt">Receipt</option>
                </select>
            </div>

            <div class="field">
                <label for="txnDate">Date</label>
                <input type="date" id="txnDate" name="txnDate" />
            </div>

            <div class="field">
                <label for="voucherNo">Voucher Number</label>
                <input type="text" id="voucherNo" name="voucherNo" readonly />
            </div>

            <div class="field">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="Enter amount" />
            </div>

            <div class="field full" id="partyFieldWrap">
                <label for="partyName" id="partyLabel">Paid To</label>
                <input type="text" id="partyName" name="partyName" autocomplete="off" placeholder="Type name or mobile..." />
                <div id="partySuggestions" class="autocomplete-list"></div>
                <div class="small">Saved names appear automatically. In receipt mode, pending credit bills also appear.</div>
            </div>

            <div class="field full">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" name="remarks" placeholder="Optional remarks"></textarea>
            </div>

            <div class="field full">
                <div id="allocationPreview" style="display:none; background:#eff6ff; border:1px solid #bfdbfe; color:#1e3a8a; padding:12px; border-radius:12px; font-size:14px; line-height:1.5;"></div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-primary" id="saveBtn">Save Entry</button>
            <button class="btn-secondary" id="clearBtn" type="button">Clear</button>
        </div>

        <div id="formMessage" class="message"></div>
    </div>

    <div class="card">
        <h2>Search Transaction Details</h2>

        <div class="search-box">
            <div class="field">
                <label for="searchParty">Name Search</label>
                <input type="text" id="searchParty" name="searchParty" placeholder="Search by party name..." />
            </div>

            <div class="field">
                <label for="searchType">Type</label>
                <select id="searchType" name="searchType">
                    <option value="">All</option>
                    <option value="payment">Payment</option>
                    <option value="receipt">Receipt</option>
                </select>
            </div>

            <div class="field">
                <label for="searchDate">Date</label>
                <input type="date" id="searchDate" name="searchDate" />
            </div>

            <div class="field">
                <button class="btn-primary" id="searchBtn" type="button">Search</button>
            </div>
        </div>

        <div style="margin-top:14px;" class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Voucher No</th>
                        <th>Type</th>
                        <th>Party</th>
                        <th>Linked Bill</th>
                        <th class="amount">Amount</th>
                        <th>Remarks</th>
                        <th>Approve</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="8" style="text-align:center; color:#64748b;">No transactions found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const sb = window.sbcc;

    document.addEventListener("DOMContentLoaded", async () => {
        const ok = await requirePageAccess("paymentreceipt");
        if (!ok) return;
    });

    const txnType = document.getElementById("txnType");
    const txnDate = document.getElementById("txnDate");
    const voucherNo = document.getElementById("voucherNo");
    const amount = document.getElementById("amount");
    const partyName = document.getElementById("partyName");
    const remarks = document.getElementById("remarks");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const partyLabel = document.getElementById("partyLabel");
    const modeBadge = document.getElementById("modeBadge");
    const creditChip = document.getElementById("creditChip");
    const formMessage = document.getElementById("formMessage");
    const partySuggestions = document.getElementById("partySuggestions");
    const allocationPreview = document.getElementById("allocationPreview");

    const searchParty = document.getElementById("searchParty");
    const searchType = document.getElementById("searchType");
    const searchDate = document.getElementById("searchDate");
    const searchBtn = document.getElementById("searchBtn");
    const resultsBody = document.getElementById("resultsBody");

    let suggestionItems = [];
    let activeSuggestionIndex = -1;
    let isSaving = false;
    let selectedCreditBill = null;
    let selectedCustomerAutoAllocation = null;

    window.onload = async function(){
        txnDate.value = new Date().toISOString().split("T")[0];
        updateTypeUI();
        await generateNextVoucherNo();
        await loadTransactions();
        setupEnterNavigation();
    };

    txnType.addEventListener("change", async () => {
        updateTypeUI();
        resetCreditSelection(false);
        await generateNextVoucherNo();
    });

    function updateTypeUI(){
        if(txnType.value === "payment"){
            partyLabel.textContent = "Paid To";
            modeBadge.textContent = "Payment Mode";
        }else{
            partyLabel.textContent = "Received From";
            modeBadge.textContent = "Receipt Mode";
        }
        creditChip.style.display = (selectedCreditBill || selectedCustomerAutoAllocation) ? "inline-block" : "none";
        creditChip.textContent = selectedCustomerAutoAllocation ? "Auto Credit Collection" : "Credit Collection Mode";
    }

    function hideAllocationPreview(){
        allocationPreview.style.display = "none";
        allocationPreview.innerHTML = "";
    }

    function showAllocationPreview(html){
        allocationPreview.innerHTML = html;
        allocationPreview.style.display = html ? "block" : "none";
    }

    function resetCreditSelection(clearAmount = false){
        selectedCreditBill = null;
        selectedCustomerAutoAllocation = null;
        creditChip.style.display = "none";
        creditChip.textContent = "Credit Collection Mode";
        hideAllocationPreview();
        if(clearAmount) amount.value = "";
    }

    async function generateNextVoucherNo(){
        const prefix = txnType.value === "payment" ? "PAY" : "REC";

        const { data, error } = await sb
            .from("cash_transactions")
            .select("voucher_no")
            .eq("txn_type", txnType.value)
            .order("id", { ascending: false })
            .limit(1);

        if(error){
            console.error(error);
            voucherNo.value = `${prefix}-0001`;
            return;
        }

        let nextNumber = 1;
        if(data && data.length){
            const lastVoucher = data[0].voucher_no || "";
            const match = lastVoucher.match(/(\d+)$/);
            if(match){
                nextNumber = parseInt(match[1], 10) + 1;
            }
        }

        voucherNo.value = `${prefix}-${String(nextNumber).padStart(4, "0")}`;
    }

    partyName.addEventListener("input", async function(){
        activeSuggestionIndex = -1;
        const q = partyName.value.trim();

        resetCreditSelection(true);

        if(!q){
            hideSuggestions();
            await loadTransactions();
            return;
        }

        await showPartySuggestions(q);
        await loadTransactions(q);
    });

    partyName.addEventListener("keydown", function(e){
        const items = partySuggestions.querySelectorAll(".autocomplete-item");

        if(partySuggestions.style.display === "block" && items.length){
            if(e.key === "ArrowDown"){
                e.preventDefault();
                activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, items.length - 1);
                highlightSuggestion(items);
                return;
            }

            if(e.key === "ArrowUp"){
                e.preventDefault();
                activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
                highlightSuggestion(items);
                return;
            }

            if(e.key === "Enter" && activeSuggestionIndex >= 0){
                e.preventDefault();
                items[activeSuggestionIndex].click();
                return;
            }

            if(e.key === "Escape"){
                hideSuggestions();
            }
        }
    });

    document.addEventListener("click", function(e){
        if(!partySuggestions.contains(e.target) && e.target !== partyName){
            hideSuggestions();
        }
    });

    async function showPartySuggestions(query){
        const items = [];
        const cleanQuery = query.trim();

        const partyPromises = [
            sb.from("parties").select("id, party_name").ilike("party_name", `%${cleanQuery}%`).order("party_name", { ascending: true }).limit(8),
            sb.from("customers").select("customer_id, name, mobile, address").or(`name.ilike.%${escapeOrValue(cleanQuery)}%,mobile.ilike.%${escapeOrValue(cleanQuery)}%`).order("name", { ascending: true }).limit(8)
        ];

        const [partyRes, customerRes] = await Promise.allSettled(partyPromises);

        if(partyRes.status === "fulfilled" && !partyRes.value.error){
            (partyRes.value.data || []).forEach(row => {
                if(!row.party_name) return;
                items.push({
                    kind: "party",
                    party_name: row.party_name || "",
                    label: row.party_name || ""
                });
            });
        }

        if(customerRes.status === "fulfilled" && !customerRes.value.error){
            (customerRes.value.data || []).forEach(row => {
                const label = `${row.name || ""} ${row.mobile || ""}`.trim();
                if(!label) return;
                items.push({
                    kind: "customer",
                    party_name: row.name || row.mobile || "",
                    customer_name: row.name || "",
                    customer_mobile: row.mobile || "",
                    customer_address: row.address || "",
                    label
                });
            });
        }

        if(txnType.value === "receipt"){
            const autoCustomers = await fetchCustomerAutoAllocationOptions(cleanQuery);
            autoCustomers.forEach(row => items.push(row));

            const creditItems = await fetchCustomerCreditBills(cleanQuery);
            creditItems.forEach(row => items.push(row));
        }

        suggestionItems = dedupeSuggestionItems(items);
        renderSuggestions(suggestionItems, cleanQuery);
    }

    function dedupeSuggestionItems(items){
        const seen = new Set();
        return items.filter(item => {
            const key = [item.kind, item.sales_id || "", (item.customer_mobile || "").toLowerCase(), (item.customer_name || item.party_name || "").toLowerCase()].join("|");
            if(seen.has(key)) return false;
            seen.add(key);
            return true;
        });
    }

    async function fetchCustomerCreditBills(query){
        const rows = await fetchOpenCreditBillsForSearch(query, 12, false);
        return rows.map(row => ({
            kind: "credit_bill",
            sales_id: row.id,
            series_code: row.series_code || "",
            sales_number: row.sales_number || "",
            bill_date: row.bill_date || "",
            customer_mobile: row.customer_mobile || "",
            customer_name: row.customer_name || "",
            balance_amount: parseFloat(row.balance_amount || 0),
            paid_amount: parseFloat(row.paid_amount || 0),
            label: `${row.customer_name || ""} ${row.customer_mobile || ""}`.trim()
        }));
    }

    async function fetchCustomerAutoAllocationOptions(query){
        const rows = await fetchOpenCreditBillsForSearch(query, 40, true);
        const grouped = new Map();

        for(const row of rows){
            const key = normaliseCustomerKey(row.customer_name, row.customer_mobile);
            if(!key || key === "|") continue;

            if(!grouped.has(key)){
                grouped.set(key, {
                    kind: "customer_credit_auto",
                    customer_name: row.customer_name || "",
                    customer_mobile: row.customer_mobile || "",
                    total_balance: 0,
                    bills: []
                });
            }

            const bucket = grouped.get(key);
            const billBal = parseFloat(row.balance_amount || 0);
            bucket.total_balance += billBal;
            bucket.bills.push({
                sales_id: row.id,
                series_code: row.series_code || "",
                sales_number: row.sales_number || "",
                bill_date: row.bill_date || "",
                balance_amount: billBal,
                paid_amount: parseFloat(row.paid_amount || 0)
            });
        }

        return Array.from(grouped.values())
            .filter(x => x.bills.length > 0)
            .sort((a, b) => a.customer_name.localeCompare(b.customer_name));
    }

    async function fetchOpenCreditBillsForSearch(query, limit = 20, asc = false){
        const search = (query || "").trim();
        if(!search) return [];

        let q = sb
            .from("sales_details")
            .select("id, series_code, sales_number, bill_date, customer_mobile, customer_name, payment_type, paid_amount, balance_amount")
            .eq("payment_type", "CREDIT")
            .gt("balance_amount", 0)
            .order("bill_date", { ascending: asc })
            .order("sales_number", { ascending: asc })
            .limit(limit);

        const maybeMobile = search.replace(/\D/g, "");
        if(maybeMobile.length >= 3){
            q = q.ilike("customer_mobile", `%${maybeMobile}%`);
        } else {
            q = q.or(`customer_name.ilike.%${escapeOrValue(search)}%,customer_mobile.ilike.%${escapeOrValue(search)}%`);
        }

        const { data, error } = await q;
        if(error){
            console.error("Credit bill load error:", error);
            return [];
        }
        return data || [];
    }

    function renderSuggestions(items, query){
        partySuggestions.innerHTML = "";

        if(!items.length){
            hideSuggestions();
            return;
        }

        items.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "autocomplete-item";
            div.dataset.index = index;

            if(item.kind === "customer_credit_auto"){
                div.innerHTML = `
                    <div class="autocomplete-title">${escapeHtml(item.customer_name || item.customer_mobile || "Customer")} ${item.customer_mobile ? "- " + escapeHtml(item.customer_mobile) : ""}</div>
                    <div class="autocomplete-sub">Auto adjust oldest pending bills first • ${item.bills.length} bill(s)</div>
                    <div class="autocomplete-money">Total Pending Credit ₹${Number(item.total_balance || 0).toFixed(2)}</div>
                `;
            } else if(item.kind === "credit_bill"){
                div.innerHTML = `
                    <div class="autocomplete-title">${escapeHtml(item.customer_name || "")} ${item.customer_mobile ? "- " + escapeHtml(item.customer_mobile) : ""}</div>
                    <div class="autocomplete-sub">Bill ${escapeHtml(formatBillNo(item.series_code, item.sales_number))} • ${escapeHtml(item.bill_date || "")}</div>
                    <div class="autocomplete-money">Pending Credit ₹${Number(item.balance_amount || 0).toFixed(2)}</div>
                `;
            } else if(item.kind === "customer"){
                div.innerHTML = `
                    <div class="autocomplete-title">${escapeHtml(item.customer_name || item.party_name || "")}</div>
                    <div class="autocomplete-sub">${escapeHtml(item.customer_mobile || "")}${item.customer_address ? " • " + escapeHtml(item.customer_address) : ""}</div>
                `;
            } else {
                const safeName = escapeHtml(item.party_name || "");
                const safeQuery = escapeRegExp(query);
                const regex = new RegExp(`(${safeQuery})`, "ig");
                div.innerHTML = `<div class="autocomplete-title">${safeName.replace(regex, "<strong>$1</strong>")}</div>`;
            }

            div.addEventListener("click", async () => {
                if(item.kind === "customer_credit_auto"){
                    selectedCustomerAutoAllocation = JSON.parse(JSON.stringify(item));
                    selectedCreditBill = null;
                    partyName.value = item.customer_mobile || item.customer_name || "";
                    amount.value = Number(item.total_balance || 0).toFixed(2);
                    creditChip.style.display = "inline-block";
                    creditChip.textContent = "Auto Credit Collection";
                    remarks.value = `Auto credit collection from customer`;
                    updateAutoAllocationPreview();
                } else if(item.kind === "credit_bill"){
                    selectedCreditBill = item;
                    selectedCustomerAutoAllocation = null;
                    partyName.value = item.customer_mobile || item.customer_name || "";
                    amount.value = Number(item.balance_amount || 0).toFixed(2);
                    creditChip.style.display = "inline-block";
                    creditChip.textContent = "Credit Collection Mode";
                    remarks.value = `Credit collection for bill ${formatBillNo(item.series_code, item.sales_number)}`;
                    showAllocationPreview(`<strong>Selected single bill:</strong> ${escapeHtml(formatBillNo(item.series_code, item.sales_number))} • Pending ₹${Number(item.balance_amount || 0).toFixed(2)}`);
                } else {
                    partyName.value = item.customer_mobile || item.party_name || item.customer_name || "";
                    resetCreditSelection(true);
                }

                hideSuggestions();
                amount.focus();
                await loadTransactions(partyName.value.trim());
            });

            partySuggestions.appendChild(div);
        });

        partySuggestions.style.display = "block";
    }

    function updateAutoAllocationPreview(){
        if(!selectedCustomerAutoAllocation){
            hideAllocationPreview();
            return;
        }

        const enteredAmount = parseFloat(amount.value || 0);
        const plan = buildAutoAllocationPlan(selectedCustomerAutoAllocation.bills || [], enteredAmount);
        const lines = plan.allocations.slice(0, 6).map((row, idx) => {
            return `${idx + 1}. ${escapeHtml(formatBillNo(row.series_code, row.sales_number))} • ${escapeHtml(row.bill_date || "")} • ₹${Number(row.applied_amount || 0).toFixed(2)}`;
        }).join("<br>");

        const more = plan.allocations.length > 6 ? `<br>+ ${plan.allocations.length - 6} more bill(s)` : "";
        const advanceHtml = plan.advance_amount > 0
            ? `<br><strong>Advance kept:</strong> ₹${Number(plan.advance_amount).toFixed(2)}`
            : "";

        showAllocationPreview(`
            <strong>Automatic allocation preview</strong><br>
            Received Amount: ₹${Number(enteredAmount || 0).toFixed(2)}<br>
            ${lines || "No bill allocation yet"}
            ${more}
            ${advanceHtml}
        `);
    }

    amount.addEventListener("input", updateAutoAllocationPreview);

    function buildAutoAllocationPlan(bills, receiptAmount){
        let remaining = Math.max(0, parseFloat(receiptAmount || 0));
        const allocations = [];

        for(const bill of (bills || [])){
            if(remaining <= 0) break;
            const billBalance = parseFloat(bill.balance_amount || 0);
            if(billBalance <= 0) continue;
            const applied = Math.min(billBalance, remaining);
            allocations.push({ ...bill, applied_amount: applied });
            remaining -= applied;
        }

        return {
            allocations,
            advance_amount: Math.max(0, remaining)
        };
    }

    function highlightSuggestion(items){
        items.forEach(item => item.classList.remove("active"));
        if(items[activeSuggestionIndex]){
            items[activeSuggestionIndex].classList.add("active");
            items[activeSuggestionIndex].scrollIntoView({ block: "nearest" });
        }
    }

    function hideSuggestions(){
        partySuggestions.style.display = "none";
        partySuggestions.innerHTML = "";
        activeSuggestionIndex = -1;
    }

    function escapeRegExp(string){
        return String(string).replace(/[.*+?^${}()|[\]\\]/g, "\$&");
    }

    function escapeOrValue(text){
        return String(text || "").replaceAll(",", " ");
    }

    async function ensurePartyExists(name){
        const cleanName = (name || "").trim();
        if(!cleanName) return null;

        const { data: existing } = await sb
            .from("parties")
            .select("id, party_name")
            .eq("party_name", cleanName)
            .maybeSingle();

        if(existing) return existing.id;

        const { data, error } = await sb
            .from("parties")
            .insert([{ party_name: cleanName }])
            .select("id")
            .single();

        if(error){
            console.error("Party save error:", error);
            return null;
        }

        return data.id;
    }

    saveBtn.addEventListener("click", saveTransaction);

    async function saveTransaction(){
        if(isSaving) return;

        const type = txnType.value;
        const date = txnDate.value;
        const voucher = voucherNo.value.trim();
        const party = partyName.value.trim();
        const amt = parseFloat(amount.value || 0);
        const note = remarks.value.trim();

        if(!date){
            showMessage("Please select date", false);
            txnDate.focus();
            return;
        }
        if(!voucher){
            showMessage("Voucher number missing", false);
            return;
        }
        if(!party){
            showMessage(`Please enter ${type === "payment" ? "Paid To" : "Received From"} name`, false);
            partyName.focus();
            return;
        }
        if(!amt || amt <= 0){
            showMessage("Please enter valid amount", false);
            amount.focus();
            return;
        }
        if(selectedCreditBill && amt > Number(selectedCreditBill.balance_amount || 0)){
            showMessage("Receipt amount cannot be more than pending credit balance for selected bill", false);
            amount.focus();
            return;
        }

        isSaving = true;
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving...";

        try{
            let savedPartyName = party;
            let referenceId = null;
            let referenceType = null;
            let approvalStatus = (type === "payment") ? "pending" : "approved";
            let finalRemarks = note || null;

            if(selectedCustomerAutoAllocation){
                savedPartyName = selectedCustomerAutoAllocation.customer_name || party;
                const plan = buildAutoAllocationPlan(selectedCustomerAutoAllocation.bills || [], amt);
                referenceType = "customer_credit_auto";
                approvalStatus = "pending";
                finalRemarks = buildAutoAllocationRemark(note, plan);
            } else if(selectedCreditBill){
                savedPartyName = selectedCreditBill.customer_name || party;
                referenceId = selectedCreditBill.sales_id;
                referenceType = "sales_credit";
                approvalStatus = (type === "receipt") ? "pending" : "pending";
            }

            const partyId = await ensurePartyExists(savedPartyName);

            const insertRow = {
                voucher_no: voucher,
                txn_date: date,
                txn_type: type,
                party_id: partyId,
                party_name: savedPartyName,
                amount: amt,
                remarks: finalRemarks,
                reference_id: referenceId,
                reference_type: referenceType,
                approval_status: approvalStatus
            };

            const { error } = await sb.from("cash_transactions").insert([insertRow]);
            if(error) throw error;

            showMessage(selectedCustomerAutoAllocation ? "Receipt saved in auto allocation mode" : "Transaction saved successfully", true);
            await loadTransactions(searchParty.value.trim());
            clearForm(false);
            await generateNextVoucherNo();
            partyName.focus();
        }catch(err){
            console.error(err);
            showMessage(err.message || "Failed to save transaction", false);
        }finally{
            isSaving = false;
            saveBtn.disabled = false;
            saveBtn.textContent = "Save Entry";
        }
    }

    function buildAutoAllocationRemark(userRemark, plan){
        const allocations = (plan.allocations || []).map(x => `${formatBillNo(x.series_code, x.sales_number)}:${Number(x.applied_amount || 0).toFixed(2)}`).join("|");
        const meta = `AUTO_ALLOC[[${allocations}]][ADV:${Number(plan.advance_amount || 0).toFixed(2)}]]`;
        return [userRemark || "", meta].filter(Boolean).join(" ");
    }

    function parseAutoAllocationRemark(text){
        const raw = String(text || "");
        const match = raw.match(/AUTO_ALLOC\[\[(.*?)\]\]\[ADV:(.*?)\]\]/);
        if(!match){
            return { cleanRemarks: raw, allocations: [], advance_amount: 0 };
        }

        const allocPart = match[1] || "";
        const advance = parseFloat(match[2] || 0) || 0;
        const allocations = allocPart
            .split("|")
            .map(x => x.trim())
            .filter(Boolean)
            .map(x => {
                const [billNo, amt] = x.split(":");
                return { bill_no: billNo || "", amount: parseFloat(amt || 0) || 0 };
            });

        return {
            cleanRemarks: raw.replace(match[0], "").trim(),
            allocations,
            advance_amount: advance
        };
    }

    clearBtn.addEventListener("click", () => clearForm(true));

    function clearForm(withVoucherRefresh = true){
        txnDate.value = new Date().toISOString().split("T")[0];
        partyName.value = "";
        amount.value = "";
        remarks.value = "";
        hideSuggestions();
        formMessage.textContent = "";
        resetCreditSelection(true);

        if(withVoucherRefresh){
            generateNextVoucherNo();
        }
    }

    function showMessage(msg, ok){
        formMessage.textContent = msg;
        formMessage.className = "message " + (ok ? "success-msg" : "error-msg");
    }

    searchBtn.addEventListener("click", () => {
        loadTransactions(searchParty.value.trim());
    });
    searchParty.addEventListener("input", () => {
        loadTransactions(searchParty.value.trim());
    });
    searchType.addEventListener("change", () => {
        loadTransactions(searchParty.value.trim());
    });
    searchDate.addEventListener("change", () => {
        loadTransactions(searchParty.value.trim());
    });

    async function loadTransactions(nameFilter = ""){
        let query = sb
            .from("cash_transactions")
            .select("id, txn_date, voucher_no, txn_type, party_name, amount, remarks, approval_status, approved_by, approved_at, reference_id, reference_type")
            .order("txn_date", { ascending: false })
            .order("id", { ascending: false })
            .limit(100);

        const partySearchValue = (nameFilter || searchParty.value || "").trim();
        const typeValue = searchType.value;
        const dateValue = searchDate.value;

        if(partySearchValue){
            query = query.ilike("party_name", `%${partySearchValue}%`);
        }
        if(typeValue){
            query = query.eq("txn_type", typeValue);
        }
        if(dateValue){
            query = query.eq("txn_date", dateValue);
        }

        const { data, error } = await query;
        if(error){
            console.error(error);
            resultsBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:red;">Failed to load transactions</td></tr>`;
            return;
        }

        const rows = (data || []).filter(row => row.reference_type !== "customer_advance");
        const linkedIds = rows.filter(r => r.reference_type === "sales_credit" && r.reference_id).map(r => r.reference_id);
        let salesMap = {};

        if(linkedIds.length){
            const uniqueIds = [...new Set(linkedIds)];
            const { data: salesRows } = await sb.from("sales_details").select("id, series_code, sales_number").in("id", uniqueIds);
            (salesRows || []).forEach(row => { salesMap[row.id] = row; });
        }

        renderTransactions(rows, salesMap);
    }

    function renderTransactions(rows, salesMap = {}){
        if(!rows.length){
            resultsBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#64748b;">No transactions found</td></tr>`;
            return;
        }

        const role = (localStorage.getItem("role") || "staff").toLowerCase();
        const canApprove = ["manager", "admin", "owner"].includes(role);

        resultsBody.innerHTML = rows.map(row => {
            const parsedRemark = parseAutoAllocationRemark(row.remarks || "");
            let approveCell = "-";

            if(row.txn_type === "payment"){
                if(row.approval_status === "approved"){
                    approveCell = `<span class="status-badge status-approved">Approved</span>`;
                } else if(row.approval_status === "rejected"){
                    approveCell = `<span class="status-badge status-rejected">Rejected</span>`;
                } else if(canApprove){
                    approveCell = `<button class="accept-btn" onclick="approveTransaction(${row.id})">Accept</button>`;
                } else {
                    approveCell = `<span class="status-badge status-pending">Pending</span>`;
                }
            } else if(["sales_credit", "customer_credit_auto"].includes(row.reference_type)){
                if(row.approval_status === "approved"){
                    approveCell = `<span class="status-badge status-approved">Approved</span>`;
                } else if(row.approval_status === "rejected"){
                    approveCell = `<span class="status-badge status-rejected">Rejected</span>`;
                } else if(canApprove){
                    approveCell = `<button class="accept-btn" onclick="approveCreditReceipt(${row.id})">Accept</button>`;
                } else {
                    approveCell = `<span class="status-badge status-pending">Pending</span>`;
                }
            } else {
                approveCell = `<span class="status-badge status-not-needed">Not Needed</span>`;
            }

            let linkedBill = "-";
            if(row.reference_type === "sales_credit" && row.reference_id && salesMap[row.reference_id]){
                linkedBill = `<span class="linked-bill">${escapeHtml(formatBillNo(salesMap[row.reference_id].series_code, salesMap[row.reference_id].sales_number))}</span>`;
            } else if(row.reference_type === "customer_credit_auto"){
                linkedBill = `<span class="linked-bill">AUTO ${parsedRemark.allocations.length ? "• " + parsedRemark.allocations.length + " bill(s)" : ""}</span>`;
            }

            const remarkText = parsedRemark.cleanRemarks || "";
            const advanceText = parsedRemark.advance_amount > 0 ? `<div class="small">Advance kept: ₹${Number(parsedRemark.advance_amount).toFixed(2)}</div>` : "";

            return `
                <tr>
                    <td>${formatDate(row.txn_date)}</td>
                    <td>${escapeHtml(row.voucher_no || "")}</td>
                    <td><span class="${row.txn_type}">${escapeHtml(row.txn_type || "")}</span></td>
                    <td>${escapeHtml(row.party_name || "")}</td>
                    <td>${linkedBill}</td>
                    <td class="amount">${Number(row.amount || 0).toFixed(2)}</td>
                    <td>${escapeHtml(remarkText)}${advanceText}</td>
                    <td>${approveCell}</td>
                </tr>
            `;
        }).join("");
    }

    function formatDate(dateStr){
        if(!dateStr) return "";
        const d = new Date(dateStr);
        if(isNaN(d)) return dateStr;
        return d.toLocaleDateString("en-GB");
    }

    function formatBillNo(series, number){
        const s = series || "";
        const n = number || "";
        return s && n ? `${s}-${n}` : (n || s || "");
    }

    function normaliseCustomerKey(name, mobile){
        return `${String(name || "").trim().toLowerCase()}|${String(mobile || "").replace(/\D/g, "")}`;
    }

    function escapeHtml(text){
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    async function approveTransaction(id) {
        const role = (localStorage.getItem("role") || "staff").toLowerCase();
        const username = localStorage.getItem("username") || localStorage.getItem("staff_name") || "Unknown";

        if (!["admin", "manager", "owner"].includes(role)) {
            alert("Only admin, manager, or owner can approve transactions.");
            return;
        }

        const ok = confirm("Do you want to approve this transaction?");
        if (!ok) return;

        const { data: txRow, error: txErr } = await sb
            .from("cash_transactions")
            .select("id, voucher_no, txn_date, txn_type, party_id, party_name, amount, remarks, reference_id, reference_type, approval_status")
            .eq("id", id)
            .maybeSingle();

        if (txErr || !txRow) {
            alert("Unable to load transaction record.");
            return;
        }

        if (txRow.approval_status === "approved") {
            alert("This transaction is already approved.");
            return;
        }

        if (txRow.txn_type === "payment") {
            await approvePaymentTransaction(txRow, username);
            return;
        }

        if (txRow.reference_type === "sales_credit") {
            await approveSingleBillReceipt(txRow, username);
            return;
        }

        if (txRow.reference_type === "customer_credit_auto") {
            await approveAutoAllocatedReceipt(txRow, username);
            return;
        }

        const { error: txUpdErr } = await sb
            .from("cash_transactions")
            .update({
                approval_status: "approved",
                approved_by: username,
                approved_at: new Date().toISOString()
            })
            .eq("id", txRow.id);

        if (txUpdErr) {
            alert("Approval failed: " + txUpdErr.message);
            return;
        }

        alert("Transaction approved successfully");
        await loadTransactions(searchParty.value.trim());
    }


    async function approvePaymentTransaction(txRow, username){
        const { error: txUpdErr } = await sb
            .from("cash_transactions")
            .update({
                approval_status: "approved",
                approved_by: username,
                approved_at: new Date().toISOString()
            })
            .eq("id", txRow.id)
            .eq("txn_type", "payment");

        if (txUpdErr) {
            alert("Approval failed: " + txUpdErr.message);
            return;
        }

        alert("Payment approved successfully");
        await loadTransactions(searchParty.value.trim());
    }

    async function approveSingleBillReceipt(txRow, username){
        const { data: saleRow, error: saleErr } = await sb
            .from("sales_details")
            .select("id, paid_amount, balance_amount")
            .eq("id", txRow.reference_id)
            .maybeSingle();

        if (saleErr || !saleRow) {
            alert("Unable to load linked sales bill.");
            return;
        }

        const currentPaid = parseFloat(saleRow.paid_amount || 0);
        const currentBalance = parseFloat(saleRow.balance_amount || 0);
        const receiptAmount = parseFloat(txRow.amount || 0);

        if (receiptAmount <= 0) {
            alert("Invalid receipt amount.");
            return;
        }
        if (receiptAmount > currentBalance) {
            alert("Receipt amount is greater than current pending balance.");
            return;
        }

        const { error: salesUpdErr } = await sb
            .from("sales_details")
            .update({
                paid_amount: currentPaid + receiptAmount,
                balance_amount: Math.max(0, currentBalance - receiptAmount)
            })
            .eq("id", txRow.reference_id);

        if (salesUpdErr) {
            alert("Failed to update credit balance: " + salesUpdErr.message);
            return;
        }

        const { error: txUpdErr } = await sb
            .from("cash_transactions")
            .update({
                approval_status: "approved",
                approved_by: username,
                approved_at: new Date().toISOString()
            })
            .eq("id", txRow.id);

        if (txUpdErr) {
            alert("Approval failed: " + txUpdErr.message);
            return;
        }

        alert("Credit receipt approved successfully");
        await loadTransactions(searchParty.value.trim());
    }

    async function approveAutoAllocatedReceipt(txRow, username){
        const receiptAmount = parseFloat(txRow.amount || 0);
        if(receiptAmount <= 0){
            alert("Invalid receipt amount.");
            return;
        }

        const { data: openBills, error: billsErr } = await sb
            .from("sales_details")
            .select("id, series_code, sales_number, bill_date, customer_name, customer_mobile, paid_amount, balance_amount, payment_type")
            .eq("payment_type", "CREDIT")
            .gt("balance_amount", 0)
            .or(`customer_name.ilike.%${escapeOrValue(txRow.party_name || "")}%,customer_mobile.ilike.%${escapeOrValue(txRow.party_name || "").replace(/\D/g, "")}%`)
            .order("bill_date", { ascending: true })
            .order("sales_number", { ascending: true });

        if(billsErr){
            alert("Unable to load customer credit bills: " + billsErr.message);
            return;
        }

        const bills = (openBills || []).filter(x => (x.customer_name || x.customer_mobile || "").trim());
        if(!bills.length){
            alert("No open credit bills found for this customer.");
            return;
        }

        let remaining = receiptAmount;
        for(const bill of bills){
            if(remaining <= 0) break;
            const currentBalance = parseFloat(bill.balance_amount || 0);
            const currentPaid = parseFloat(bill.paid_amount || 0);
            if(currentBalance <= 0) continue;

            const applied = Math.min(currentBalance, remaining);
            const { error: updErr } = await sb
                .from("sales_details")
                .update({
                    paid_amount: currentPaid + applied,
                    balance_amount: Math.max(0, currentBalance - applied)
                })
                .eq("id", bill.id);

            if(updErr){
                alert("Failed while applying to bill " + formatBillNo(bill.series_code, bill.sales_number) + ": " + updErr.message);
                return;
            }

            remaining -= applied;
        }

        const { error: txUpdErr } = await sb
            .from("cash_transactions")
            .update({
                approval_status: "approved",
                approved_by: username,
                approved_at: new Date().toISOString(),
                remarks: buildAutoAllocationRemark(parseAutoAllocationRemark(txRow.remarks || "").cleanRemarks, buildAutoAllocationPlan(bills, receiptAmount))
            })
            .eq("id", txRow.id);

        if(txUpdErr){
            alert("Approval failed: " + txUpdErr.message);
            return;
        }

        if(remaining > 0){
            const advanceRow = {
                voucher_no: txRow.voucher_no,
                txn_date: txRow.txn_date,
                txn_type: "receipt",
                party_id: txRow.party_id || null,
                party_name: txRow.party_name,
                amount: remaining,
                remarks: `Advance amount from voucher ${txRow.voucher_no}`,
                reference_id: txRow.id,
                reference_type: "customer_advance",
                approval_status: "approved",
                approved_by: username,
                approved_at: new Date().toISOString()
            };

            const { error: advErr } = await sb.from("cash_transactions").insert([advanceRow]);
            if(advErr){
                console.error("Advance save failed", advErr);
                alert("Receipt approved, but advance row was not saved separately: " + advErr.message);
            }
        }

        alert("Auto credit receipt approved successfully");
        await loadTransactions(searchParty.value.trim());
    }

    window.approveTransaction = approveTransaction;

    function setupEnterNavigation(){
        const orderedFields = [txnType, txnDate, partyName, amount, remarks, saveBtn];
        orderedFields.forEach((field, index) => {
            field.addEventListener("keydown", function(e){
                if(e.key !== "Enter") return;

                if(field === partyName && partySuggestions.style.display === "block"){
                    const items = partySuggestions.querySelectorAll(".autocomplete-item");
                    if(items.length && activeSuggestionIndex >= 0){
                        e.preventDefault();
                        items[activeSuggestionIndex].click();
                        return;
                    }
                }

                if(field === remarks || field.tagName === "INPUT" || field.tagName === "SELECT" || field.tagName === "BUTTON"){
                    e.preventDefault();
                    const next = orderedFields[index + 1];
                    if(next){
                        next.focus();
                        if(next.select) next.select();
                    }else{
                        saveTransaction();
                    }
                }
            });
        });
    }
</script>
