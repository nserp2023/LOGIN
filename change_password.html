<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Change Password</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI, Arial, sans-serif;
  background:#0f172a;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:400px;
  background:#1e293b;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h2{
  color:#fff;
  text-align:center;
  margin-bottom:25px;
}

.input-group{
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:7px;
  color:#e2e8f0;
  font-size:14px;
}

.input-group input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:#fff;
  font-size:15px;
}

.input-group input:focus{
  outline:none;
  box-shadow:0 0 0 3px rgba(0,123,255,.35);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00c6ff,#0078d7);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.message{
  margin-top:15px;
  text-align:center;
  font-size:14px;
  min-height:20px;
}

.error{
  color:#ff6b6b;
}

.success{
  color:#4ade80;
}
</style>
</head>

<body>

<div class="container">

  <h2>Change Password</h2>

  <form id="passwordForm">

    <div class="input-group">
      <label>Current Password</label>
      <input type="password" id="currentPassword" required />
    </div>

    <div class="input-group">
      <label>New Password</label>
      <input type="password" id="newPassword" required />
    </div>

    <div class="input-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" required />
    </div>

    <button type="submit" id="saveBtn">
      Update Password
    </button>

    <div id="msg" class="message"></div>

  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>

const sb = window.sbcc;

const form = document.getElementById("passwordForm");
const msg = document.getElementById("msg");
const saveBtn = document.getElementById("saveBtn");

function showMessage(text, type="error"){
  msg.className = "message " + type;
  msg.textContent = text;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  msg.textContent = "";

  const currentPassword =
    document.getElementById("currentPassword").value;

  const newPassword =
    document.getElementById("newPassword").value;

  const confirmPassword =
    document.getElementById("confirmPassword").value;

  if(newPassword.length < 6){
    showMessage("New password must be at least 6 characters.");
    return;
  }

  if(newPassword !== confirmPassword){
    showMessage("New passwords do not match.");
    return;
  }

  try{

    saveBtn.disabled = true;
    saveBtn.textContent = "Updating...";

    // get current user
    const {
      data: { user }
    } = await sb.auth.getUser();

    if(!user){
      showMessage("User session expired. Please login again.");
      return;
    }

    // verify current password
    const { error: loginError } =
      await sb.auth.signInWithPassword({
        email: user.email,
        password: currentPassword
      });

    if(loginError){
      showMessage("Current password is incorrect.");
      return;
    }

    // update password
    const { error } = await sb.auth.updateUser({
      password: newPassword
    });

    if(error){
      showMessage(error.message);
      return;
    }

    showMessage(
      "Password updated successfully.",
      "success"
    );

    form.reset();

  }catch(err){
    showMessage(err.message || "Unexpected error.");
  }finally{
    saveBtn.disabled = false;
    saveBtn.textContent = "Update Password";
  }
});

</script>

</body>
</html>
