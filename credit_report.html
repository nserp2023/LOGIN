<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <title>Credit Report - VAJRA LIGHTS</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="page_permissions.js"></script>
  <script src="common-ui.js"></script>

  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;
      --panel2:#1f2937;
      --line:#334155;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --gold:#facc15;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#2563eb;
      --amber:#f59e0b;
      --white:#ffffff;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:
        linear-gradient(rgba(2,6,23,.92), rgba(2,6,23,.92)),
        url("background.jpg") center/cover fixed;
      color:var(--text);
      min-height:100vh;
      padding:14px;
    }

    .container{ max-width:1700px; margin:0 auto; }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .title-wrap h1{ margin:0; font-size:28px; color:var(--gold); letter-spacing:.4px; }
    .title-wrap p{ margin:4px 0 0; color:var(--muted); font-size:13px; }
    .top-actions{ display:flex; gap:10px; flex-wrap:wrap; }

    .card{
      background:rgba(17,24,39,.92);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    .filters{
      padding:14px;
      display:grid;
      grid-template-columns:repeat(9, minmax(110px,1fr));
      gap:10px;
      margin-bottom:14px;
      align-items:end;
    }

    .field{ display:flex; flex-direction:column; gap:6px; min-width:0; }
    .field label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    .field input,.field select{
      height:38px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#0b1220;
      color:var(--white);
      padding:0 10px;
      outline:none;
    }

    .field input:focus,.field select:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 2px rgba(37,99,235,.2);
    }

    .checkbox-wrap{
      display:flex;
      align-items:flex-end;
      gap:10px;
      padding-bottom:0;
    }

    .checkbox-box{
      height:38px;
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--white);
      padding:0 6px;
      border-radius:8px;
    }

    .btn{
      height:38px;
      border:none;
      border-radius:8px;
      padding:0 14px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.3px;
    }

    .btn-primary{ background:var(--blue); color:white; }
    .btn-primary:hover{ filter:brightness(1.08); }
    .btn-green{ background:var(--green); color:#052e16; }
    .btn-green:hover{ filter:brightness(1.06); }
    .btn-ghost{ background:#1e293b; color:#e5e7eb; border:1px solid var(--line); }
    .btn-amber{ background:var(--amber); color:#111827; }

    .summary{
      display:grid;
      grid-template-columns:repeat(4, minmax(180px,1fr));
      gap:12px;
      margin-bottom:14px;
    }

    .summary-box{
      padding:14px 16px;
      border-radius:12px;
      background:rgba(17,24,39,.92);
      border:1px solid var(--line);
    }

    .summary-box .label{ color:var(--muted); font-size:12px; text-transform:uppercase; font-weight:700; letter-spacing:.5px; }
    .summary-box .value{ margin-top:6px; font-size:26px; font-weight:800; color:var(--white); }
    .summary-box.red .value{ color:#fca5a5; }
    .summary-box.green .value{ color:#86efac; }
    .summary-box.gold .value{ color:#fde68a; }

    .status{
      padding:10px 14px;
      margin-bottom:12px;
      color:#fde68a;
      background:rgba(15,23,42,.8);
      border:1px solid var(--line);
      border-radius:10px;
      font-size:13px;
    }

    .table-wrap{ overflow:auto; border-radius:12px; }

    table{ width:100%; border-collapse:collapse; min-width:1250px; }
    thead{ position:sticky; top:0; z-index:5; }

    th{
      background:#0b1220;
      color:var(--gold);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.5px;
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid var(--line);
      white-space:nowrap;
    }

    td{
      padding:11px 10px;
      border-bottom:1px solid rgba(148,163,184,.12);
      vertical-align:middle;
      white-space:nowrap;
      font-size:14px;
    }

    tbody tr.main-row:hover{ background:rgba(37,99,235,.08); cursor:pointer; }
    tbody tr.receipt-row{ background:rgba(34,197,94,.045); }
    tbody tr.bill-row{ background:rgba(245,158,11,.025); }

    .right{ text-align:right; }
    .center{ text-align:center; }

    .chip{ display:inline-flex; align-items:center; padding:4px 8px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.4px; border:1px solid transparent; }
    .chip-bill{ background:rgba(245,158,11,.12); color:#fcd34d; border-color:rgba(245,158,11,.35); }
    .chip-receipt{ background:rgba(34,197,94,.12); color:#86efac; border-color:rgba(34,197,94,.35); }
    .chip-settled{ background:rgba(34,197,94,.12); color:#86efac; border-color:rgba(34,197,94,.35); }
    .chip-partial{ background:rgba(59,130,246,.12); color:#93c5fd; border-color:rgba(59,130,246,.35); }
    .chip-credit{ background:rgba(245,158,11,.12); color:#fcd34d; border-color:rgba(245,158,11,.35); }

    .check-btn{
      min-width:88px;
      height:36px;
      border-radius:10px;
      border:1px solid rgba(34,197,94,.55);
      background:rgba(34,197,94,.14);
      color:#86efac;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:0 12px;
    }

    .check-btn:hover{
      background:rgba(34,197,94,.24);
      filter:brightness(1.08);
    }

    .check-btn.checked{
      background:rgba(34,197,94,.32);
      color:#dcfce7;
      border-color:rgba(34,197,94,.7);
      cursor:default;
      font-size:13px;
    }

    .check-btn:disabled{
      opacity:1;
    }

    .details-row{ display:none; background:rgba(2,6,23,.55); }
    .details-cell{ padding:0; }
    .details-box{ padding:12px; background:rgba(2,6,23,.45); }
    .mini-table{ width:100%; min-width:700px; border-collapse:collapse; background:rgba(255,255,255,.03); }
    .mini-table th{ background:#111827; color:#cbd5e1; font-size:11px; }
    .mini-table td{ font-size:13px; }
    .empty{ padding:26px; text-align:center; color:var(--muted); }

    @media (max-width: 1200px){
      .filters{ grid-template-columns:repeat(3, minmax(140px,1fr)); }
      .summary{ grid-template-columns:repeat(2, minmax(160px,1fr)); }
    }

    @media (max-width: 700px){
      body{ padding:10px; }
      .filters{ grid-template-columns:1fr; }
      .summary{ grid-template-columns:1fr; }
      .top-actions{ width:100%; }
      .top-actions .btn{ flex:1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Credit Report</h1>
        <p>Customer-wise credit ledger book with bills, receipts, and running balance.</p>
      </div>
      <div class="top-actions">
        <button class="btn btn-green" onclick="openSalesPage()">+ New Sales Bill</button>
        <button class="btn btn-ghost" onclick="window.open('report.html','_blank')">Sales Report</button>
      </div>
    </div>

    <div class="card filters">
      <div class="field">
        <label>From Date</label>
        <input type="date" id="from_date">
      </div>

      <div class="field">
        <label>To Date</label>
        <input type="date" id="to_date">
      </div>

      <div class="field">
        <label>Mobile</label>
        <input type="text" id="mobile_filter" placeholder="Search mobile">
      </div>

      <div class="field">
        <label>Customer Name</label>
        <input type="text" id="name_filter" placeholder="Search customer">
      </div>

      <div class="field">
        <label>Bill / Voucher No</label>
        <input type="text" id="bill_filter" placeholder="Search bill or receipt no">
      </div>

      <div class="field">
        <label>Series</label>
        <select id="series_filter">
          <option value="">ALL</option>
        </select>
      </div>

      <div class="field">
        <label>Status</label>
        <select id="status_filter">
          <option value="ALL">ALL</option>
          <option value="OUTSTANDING">OUTSTANDING ONLY</option>
          <option value="SETTLED">SETTLED ONLY</option>
        </select>
      </div>

      <div class="field">
        <label>Order</label>
        <button class="btn btn-amber" id="sort_btn" type="button">Descending</button>
      </div>

      <div class="checkbox-wrap">
        <div class="checkbox-box">
          <input type="checkbox" id="credit_only" checked>
          <label for="credit_only" style="margin:0; color:#fff; font-size:13px; text-transform:none; letter-spacing:0;">Credit only</label>
        </div>
        <button class="btn btn-primary" id="btn_load">Load Report</button>
      </div>
    </div>

    <div class="summary">
      <div class="summary-box gold">
        <div class="label">Credit Bills</div>
        <div class="value" id="sum_bills">0</div>
      </div>
      <div class="summary-box">
        <div class="label">Total Bill Amount</div>
        <div class="value" id="sum_total">₹0.00</div>
      </div>
      <div class="summary-box green">
        <div class="label">Total Receipt Amount</div>
        <div class="value" id="sum_paid">₹0.00</div>
      </div>
      <div class="summary-box red">
        <div class="label">Outstanding</div>
        <div class="value" id="sum_balance">₹0.00</div>
      </div>
    </div>

    <div class="status" id="status_box">Ready.</div>

    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Bill / Voucher No</th>
            <th>Type</th>
            <th>Mobile</th>
            <th>Customer</th>
            <th class="right">Bill Amount</th>
            <th class="right">Paid</th>
            <th class="right">Running Balance</th>
            <th class="center">Book Check</th>
          </tr>
        </thead>
        <tbody id="report_body">
          <tr><td colspan="9" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const sb = window.sbcc;
    const qs = (id) => document.getElementById(id);
    let sortAscending = false;
    let effectiveAscending = false;

    document.addEventListener("DOMContentLoaded", async () => {
      const ok = await requirePageAccess("sales");
      if (!ok) return;

      const today = new Date();
      qs("from_date").value = "2000-01-01";
      qs("to_date").value = today.toISOString().split("T")[0];

      await loadSeries();
      bindEvents();
      await loadCreditReport();
    });

    function bindEvents() {
      qs("btn_load").addEventListener("click", loadCreditReport);
      qs("sort_btn").addEventListener("click", () => {
        loadCreditReport();
      });

      ["from_date", "to_date", "series_filter", "status_filter", "credit_only"].forEach(id => {
        qs(id).addEventListener("change", loadCreditReport);
      });

      ["mobile_filter", "name_filter", "bill_filter"].forEach(id => {
        qs(id).addEventListener("input", debounce(loadCreditReport, 350));
      });
    }

    function debounce(fn, delay = 300) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), delay);
      };
    }

    function money(v) {
      return "₹" + (parseFloat(v || 0).toFixed(2));
    }

    function num(v){
      return parseFloat(v || 0) || 0;
    }

    function openSalesPage() {
      window.location.href = "soqtest.html";
    }

    async function loadSeries() {
      try {
        const { data, error } = await sb
          .from("bill_series")
          .select("series_code")
          .order("series_code", { ascending: true });

        if (error) throw error;

        const select = qs("series_filter");
        (data || []).forEach(row => {
          const opt = document.createElement("option");
          opt.value = row.series_code || "";
          opt.textContent = row.series_code || "";
          select.appendChild(opt);
        });
      } catch (err) {
        console.error("Series load error:", err);
      }
    }

    function formatBillNo(series, number){
      const s = series || "";
      const n = number || "";
      return s && n ? `${s}-${n}` : (n || s || "");
    }

    function normalizeDate(v){
      return v || "";
    }

    function dateSortValue(v){
      const d = new Date(v || "1970-01-01");
      return isNaN(d) ? 0 : d.getTime();
    }

    function safeLikeValue(text){
      return String(text || "").replaceAll("%", "").replaceAll("_", "").replaceAll(",", " ");
    }

    function normalNameKey(text){
      return String(text || "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function extractMobile(text){
      const raw = String(text || "");
      const match = raw.match(/(?:\+?91[-\s]?)?[6-9]\d{9}/);
      if (!match) return "";
      return match[0].replace(/\D/g, "").slice(-10);
    }

    function getReceiptMobile(row, customerMobileMap = {}){
      const directMobile = extractMobile(`${row.party_name || ""} ${row.remarks || ""}`);
      if (directMobile) return directMobile;

      const receiptNameKey = normalNameKey(row.party_name);
      if (!receiptNameKey) return "";

      if (customerMobileMap[receiptNameKey]) return customerMobileMap[receiptNameKey];

      const matchedKey = Object.keys(customerMobileMap).find(key =>
        key && (key.includes(receiptNameKey) || receiptNameKey.includes(key))
      );

      return matchedKey ? customerMobileMap[matchedKey] : "";
    }

    function buildCustomerLookupFromSales(salesRows, filters = {}){
      const nameSet = new Set();
      const mobileSet = new Set();
      const customerMobileMap = {};
      const customerNameMap = {};

      (salesRows || []).forEach(r => {
        const nameKey = normalNameKey(r.customer_name);
        const mobileDigits = String(r.customer_mobile || "").replace(/\D/g, "").slice(-10);

        if (nameKey) nameSet.add(nameKey);
        if (mobileDigits) mobileSet.add(mobileDigits);
        if (nameKey && mobileDigits) customerMobileMap[nameKey] = mobileDigits;
        if (mobileDigits && r.customer_name) customerNameMap[mobileDigits] = r.customer_name;
      });

      const typedName = normalNameKey(filters.name);
      const typedMobile = String(filters.mobile || "").replace(/\D/g, "").slice(-10);

      if (typedName) nameSet.add(typedName);
      if (typedMobile) mobileSet.add(typedMobile);

      return {
        names: Array.from(nameSet).filter(Boolean),
        mobiles: Array.from(mobileSet).filter(Boolean),
        customerMobileMap,
        customerNameMap
      };
    }

    function receiptMatchesCustomer(row, lookup, filters = {}){
      const hasCustomerSearch = Boolean((filters.mobile || "").trim() || (filters.name || "").trim());
      if (!hasCustomerSearch) return true;

      const text = normalNameKey(`${row.party_name || ""} ${row.remarks || ""} ${row.voucher_no || ""}`);
      const receiptMobile = extractMobile(`${row.party_name || ""} ${row.remarks || ""}`);

      if (receiptMobile && lookup.mobiles.includes(receiptMobile)) return true;

      return lookup.names.some(nameKey => {
        return nameKey && (text.includes(nameKey) || nameKey.includes(normalNameKey(row.party_name)));
      });
    }

    async function loadCreditReport() {
      const body = qs("report_body");
      const statusBox = qs("status_box");

      body.innerHTML = `<tr><td colspan="9" class="empty">Loading...</td></tr>`;
      statusBox.textContent = "Loading credit report...";

      try {
        const fromDate = qs("from_date").value;
        const toDate = qs("to_date").value;
        const mobile = (qs("mobile_filter").value || "").trim();
        const name = (qs("name_filter").value || "").trim();
        const bill = (qs("bill_filter").value || "").trim();
        const series = qs("series_filter").value;
        const statusFilter = qs("status_filter").value;
        const creditOnly = qs("credit_only").checked;

        let salesQuery = sb
          .from("sales_details")
          .select(`
            id,
            series_code,
            sales_number,
            bill_date,
            customer_mobile,
            customer_name,
            invoice_amount,
            payment_type,
            paid_amount,
            balance_amount,
            is_checked
          `);

        if (fromDate) salesQuery = salesQuery.gte("bill_date", fromDate);
        if (toDate) salesQuery = salesQuery.lte("bill_date", toDate);
        if (mobile) salesQuery = salesQuery.ilike("customer_mobile", `%${safeLikeValue(mobile)}%`);
        if (name) salesQuery = salesQuery.ilike("customer_name", `%${safeLikeValue(name)}%`);
        if (bill) salesQuery = salesQuery.or(`sales_number.ilike.%${safeLikeValue(bill)}%,invoice_number.ilike.%${safeLikeValue(bill)}%`);
        if (series) salesQuery = salesQuery.eq("series_code", series);
        if (creditOnly) salesQuery = salesQuery.eq("payment_type", "CREDIT");

        const { data: salesData, error: salesError } = await salesQuery;
        if (salesError) throw salesError;

        const customerLookup = buildCustomerLookupFromSales(salesData || [], { mobile, name });

        let billRows = (salesData || []).map(r => {
          const invoiceAmount = num(r.invoice_amount);
          const balanceAmount = num(r.balance_amount);
          const paidAmount = num(r.paid_amount);
          return {
            rowKind:"bill",
            id:r.id,
            date: normalizeDate(r.bill_date),
            docNo: formatBillNo(r.series_code, r.sales_number),
            series_code:r.series_code || "",
            sales_number:r.sales_number || "",
            mobile:r.customer_mobile || "",
            customer:r.customer_name || "",
            billAmount: invoiceAmount,
            paidAmount: paidAmount,
            receiptAmount: 0,
            balanceAmount: balanceAmount,
            payment_type:r.payment_type || "",
            is_checked: !!r.is_checked,
            status: balanceAmount <= 0 ? "SETTLED" : (paidAmount > 0 ? "PARTIAL" : "OUTSTANDING")
          };
        });

        if (statusFilter === "OUTSTANDING") {
          billRows = billRows.filter(r => r.balanceAmount > 0);
        } else if (statusFilter === "SETTLED") {
          billRows = billRows.filter(r => r.balanceAmount <= 0);
        }

        let receiptRows = await loadReceiptRows({fromDate,toDate,mobile,name,bill,customerLookup});

        if (series) {
          receiptRows = receiptRows.filter(r => false);
        }

        const hasCustomerSearch = !!(mobile || name);
        effectiveAscending = hasCustomerSearch ? true : false;
        qs("sort_btn").textContent = effectiveAscending ? "Ascending" : "Descending";

        const allRows = [...billRows, ...receiptRows].sort((a,b) => {
          const ad = dateSortValue(a.date);
          const bd = dateSortValue(b.date);
          if (ad !== bd) return effectiveAscending ? ad - bd : bd - ad;
          if (a.rowKind !== b.rowKind) return a.rowKind === "bill" ? -1 : 1;
          return String(a.docNo || "").localeCompare(String(b.docNo || ""));
        });

        renderRows(allRows, billRows, receiptRows);
      } catch (err) {
        console.error("Credit report load error:", err);
        body.innerHTML = `<tr><td colspan="9" class="empty">Error loading credit report.</td></tr>`;
        statusBox.textContent = "Error: " + (err.message || "Unable to load report");
      }
    }

    async function loadReceiptRows(filters){
      const lookup = filters.customerLookup || { names:[], mobiles:[], customerMobileMap:{}, customerNameMap:{} };

      let receiptQuery = sb
        .from("cash_transactions")
        .select("id, txn_date, voucher_no, txn_type, party_name, amount, remarks, approval_status, reference_type, is_checked")
        .eq("txn_type", "receipt")
        .eq("approval_status", "approved");

      if (filters.fromDate) receiptQuery = receiptQuery.gte("txn_date", filters.fromDate);
      if (filters.toDate) receiptQuery = receiptQuery.lte("txn_date", filters.toDate);

      const orParts = [];

      (lookup.mobiles || []).slice(0, 20).forEach(m => {
        const mobile = safeLikeValue(m);
        if (mobile){
          orParts.push(`party_name.ilike.%${mobile}%`);
          orParts.push(`remarks.ilike.%${mobile}%`);
        }
      });

      (lookup.names || []).slice(0, 20).forEach(n => {
        const name = safeLikeValue(n);
        if (name){
          orParts.push(`party_name.ilike.%${name}%`);
          orParts.push(`remarks.ilike.%${name}%`);
        }
      });

      if (filters.bill) {
        const bill = safeLikeValue(filters.bill);
        orParts.push(`voucher_no.ilike.%${bill}%`);
        orParts.push(`remarks.ilike.%${bill}%`);
      }

      if (orParts.length) receiptQuery = receiptQuery.or(orParts.join(","));

      const { data, error } = await receiptQuery;
      if (error) {
        console.warn("Receipt rows load warning:", error);
        return [];
      }

      return (data || [])
        .filter(r => {
          const ref = String(r.reference_type || "").toLowerCase();
          const text = String(`${r.remarks || ""} ${r.voucher_no || ""}`).toLowerCase();
          const isCreditReceipt = ref === "sales_credit" || ref === "customer_credit_auto" || text.includes("credit collection") || text.includes("auto_alloc");
          return isCreditReceipt && receiptMatchesCustomer(r, lookup, filters);
        })
        .map(r => {
          const receiptMobile = getReceiptMobile(r, lookup.customerMobileMap || {});
          const fallbackName = receiptMobile && lookup.customerNameMap ? lookup.customerNameMap[receiptMobile] : "";
          return {
            rowKind:"receipt",
            id:`receipt_${r.id}`,
            real_id:r.id,
            is_checked: !!r.is_checked,
            date: normalizeDate(r.txn_date),
            docNo: r.voucher_no || "",
            mobile: receiptMobile,
            customer:r.party_name || fallbackName || "",
            billAmount:0,
            paidAmount:num(r.amount),
            receiptAmount:num(r.amount),
            balanceAmount:0,
            remarks:r.remarks || "",
            status:"RECEIPT"
          };
        });
    }

    function renderCheckButton(row){
      if(row.is_checked){
        return `<button type="button" class="check-btn checked" disabled>✓ CHECKED</button>`;
      }

      const kind = String(row.rowKind || "").replace(/[^a-zA-Z0-9_-]/g, "");
      const id = kind === "receipt" ? String(row.real_id || String(row.id || "").replace("receipt_", "")) : String(row.id || "");
      const safeId = id.replace(/'/g, "\\'");

      return `<button type="button" class="check-btn" onclick="markLedgerChecked('${kind}', '${safeId}', this, event)">✓</button>`;
    }

    async function markLedgerChecked(type, id, btn, event){
      if(event) event.stopPropagation();

      const ok = confirm("Mark this line as checked? This tick is saved in database and cannot be unticked from this page.");
      if(!ok) return;

      if(btn){
        btn.disabled = true;
        btn.textContent = "Saving...";
      }

      try{
        let error = null;

        if(type === "bill"){
          const res = await sb
            .from("sales_details")
            .update({ is_checked: true })
            .eq("id", id);
          error = res.error;
        }

        if(type === "receipt"){
          const realId = String(id || "").replace("receipt_", "");
          const res = await sb
            .from("cash_transactions")
            .update({ is_checked: true })
            .eq("id", realId);
          error = res.error;
        }

        if(error) throw error;

        if(btn){
          btn.classList.add("checked");
          btn.disabled = true;
          btn.textContent = "✓ CHECKED";
        }
      }catch(err){
        console.error("Book check update failed:", err);
        alert("Failed to mark checked: " + (err.message || "Please check is_checked column / RLS policy."));
        if(btn){
          btn.disabled = false;
          btn.classList.remove("checked");
          btn.textContent = "✓";
        }
      }
    }

    function renderRows(rows, billRows, receiptRows) {
      const body = qs("report_body");
      const statusBox = qs("status_box");

      const totalBills = billRows.length;
      const totalAmount = billRows.reduce((s,r) => s + num(r.billAmount), 0);
      const totalPaid = receiptRows.reduce((s,r) => s + num(r.receiptAmount), 0);
      const totalBalance = totalAmount - totalPaid;

      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="9" class="empty">No credit records found.</td></tr>`;
        qs("sum_bills").textContent = "0";
        qs("sum_total").textContent = money(0);
        qs("sum_paid").textContent = money(0);
        qs("sum_balance").textContent = money(0);
        statusBox.textContent = "No records found.";
        return;
      }

      const chronologicalRows = [...rows].sort((a,b) => {
        const ad = dateSortValue(a.date);
        const bd = dateSortValue(b.date);
        if (ad !== bd) return ad - bd;
        if (a.rowKind !== b.rowKind) return a.rowKind === "bill" ? -1 : 1;
        return String(a.docNo || "").localeCompare(String(b.docNo || ""));
      });

      let runningBalance = 0;
      chronologicalRows.forEach(row => {
        if (row.rowKind === "bill") runningBalance += num(row.billAmount);
        if (row.rowKind === "receipt") runningBalance -= num(row.receiptAmount);
        row.runningBalance = runningBalance;
      });

      const displayRows = [...chronologicalRows].sort((a,b) => {
        const ad = dateSortValue(a.date);
        const bd = dateSortValue(b.date);
        if (ad !== bd) return effectiveAscending ? ad - bd : bd - ad;
        if (a.rowKind !== b.rowKind) return a.rowKind === "bill" ? -1 : 1;
        return String(a.docNo || "").localeCompare(String(b.docNo || ""));
      });

      let html = "";

      displayRows.forEach((row) => {
        const balanceClass = num(row.runningBalance) > 0 ? "chip-credit" : "chip-settled";

        if (row.rowKind === "receipt") {
          html += `
            <tr class="receipt-row">
              <td>${escapeHtml(row.date || "")}</td>
              <td>${escapeHtml(row.docNo || "")}</td>
              <td><span class="chip chip-receipt">RECEIPT</span></td>
              <td>${escapeHtml(row.mobile || "")}</td>
              <td>${escapeHtml(row.customer || "")}</td>
              <td class="right">-</td>
              <td class="right">${money(row.receiptAmount)}</td>
              <td class="right">${money(row.runningBalance)}</td>
              <td class="center">${renderCheckButton(row)}</td>
            </tr>
          `;
          return;
        }

        html += `
          <tr class="main-row bill-row" onclick="toggleDetails(${row.id})">
            <td>${escapeHtml(row.date || "")}</td>
            <td>${escapeHtml(row.docNo || "")}</td>
            <td><span class="chip chip-bill">BILL</span></td>
            <td>${escapeHtml(row.mobile || "")}</td>
            <td>${escapeHtml(row.customer || "")}</td>
            <td class="right">${money(row.billAmount)}</td>
            <td class="right">-</td>
            <td class="right">${money(row.runningBalance)}</td>
            <td class="center">${renderCheckButton(row)}</td>
          </tr>
          <tr class="details-row" id="details_${row.id}">
            <td colspan="9" class="details-cell">
              <div class="details-box" id="details_box_${row.id}">
                Loading items...
              </div>
            </td>
          </tr>
        `;
      });

      body.innerHTML = html;

      qs("sum_bills").textContent = String(totalBills);
      qs("sum_total").textContent = money(totalAmount);
      qs("sum_paid").textContent = money(totalPaid);
      qs("sum_balance").textContent = money(totalBalance);

      statusBox.textContent = `${displayRows.length} ledger row(s) loaded. Bills: ${totalBills}, Receipts: ${receiptRows.length}, Balance: ${money(totalBalance)}.`;
    }

    async function toggleDetails(salesId) {
      const row = document.getElementById(`details_${salesId}`);
      const box = document.getElementById(`details_box_${salesId}`);
      if (!row || !box) return;

      const isOpen = row.style.display === "table-row";
      row.style.display = isOpen ? "none" : "table-row";
      if (isOpen) return;

      if (box.dataset.loaded === "1") return;

      box.innerHTML = "Loading items...";

      try {
        const { data, error } = await sb
          .from("sales_item_details")
          .select(`
            item_code,
            item_name,
            quantity,
            price,
            sales_price_gst,
            gst_percent,
            discount_percent
          `)
          .eq("sales_id", salesId)
          .order("id", { ascending: true });

        if (error) throw error;

        if (!data || !data.length) {
          box.innerHTML = `<div class="empty">No items found.</div>`;
          box.dataset.loaded = "1";
          return;
        }

        let html = `
          <table class="mini-table">
            <thead>
              <tr>
                <th>Item Code</th>
                <th>Item Name</th>
                <th class="right">Qty</th>
                <th class="right">Price</th>
                <th class="right">Price+GST</th>
                <th class="right">Disc %</th>
                <th class="right">GST %</th>
              </tr>
            </thead>
            <tbody>
        `;

        data.forEach(item => {
          html += `
            <tr>
              <td>${escapeHtml(item.item_code || "")}</td>
              <td>${escapeHtml(item.item_name || "")}</td>
              <td class="right">${parseFloat(item.quantity || 0).toFixed(2)}</td>
              <td class="right">${money(item.price)}</td>
              <td class="right">${money(item.sales_price_gst)}</td>
              <td class="right">${parseFloat(item.discount_percent || 0).toFixed(2)}</td>
              <td class="right">${parseFloat(item.gst_percent || 0).toFixed(2)}</td>
            </tr>
          `;
        });

        html += `</tbody></table>`;
        box.innerHTML = html;
        box.dataset.loaded = "1";
      } catch (err) {
        console.error("Item details error:", err);
        box.innerHTML = `<div class="empty">Error loading items.</div>`;
      }
    }

    function escapeHtml(text){
      return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    window.toggleDetails = toggleDetails;
    window.markLedgerChecked = markLedgerChecked;
  </script>
</body>
</html>
