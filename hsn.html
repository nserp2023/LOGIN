<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultra HSN Management</title>

  <script src="common-ui.js"></script>

  <style>
    :root{
      --bg:#07111f;
      --panel:#0e1b2d;
      --panel2:#101f34;
      --border:rgba(148,163,184,.22);
      --text:#e5edf8;
      --muted:#94a3b8;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;
      --shadow:0 18px 45px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at top left,rgba(56,189,248,.18),transparent 32%),
        radial-gradient(circle at top right,rgba(34,197,94,.12),transparent 34%),
        linear-gradient(135deg,#07111f,#0b1220 55%,#08101d);
      color:var(--text);
      overflow:hidden;
    }

    .app{
      height:100vh;
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:10px;
    }

    .topbar{
      min-height:68px;
      background:rgba(14,27,45,.88);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      backdrop-filter:blur(16px);
    }

    .titlebox{
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .titlebox h1{
      margin:0;
      font-size:22px;
      letter-spacing:.4px;
      font-weight:900;
    }

    .titlebox small{
      color:var(--muted);
      font-size:12px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    button{
      border:0;
      border-radius:13px;
      padding:10px 13px;
      cursor:pointer;
      font-weight:800;
      color:#06111f;
      background:linear-gradient(135deg,#7dd3fc,#38bdf8);
      box-shadow:0 10px 24px rgba(56,189,248,.18);
      transition:.16s ease;
      white-space:nowrap;
    }

    button:hover{transform:translateY(-1px);filter:brightness(1.05)}
    button:active{transform:translateY(0) scale(.99)}
    button.secondary{
      color:var(--text);
      background:rgba(148,163,184,.13);
      border:1px solid var(--border);
      box-shadow:none;
    }
    button.success{background:linear-gradient(135deg,#86efac,#22c55e)}
    button.danger{background:linear-gradient(135deg,#fca5a5,#ef4444);color:#fff}
    button.warning{background:linear-gradient(135deg,#fcd34d,#f59e0b)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .banner{
      display:none;
      padding:11px 14px;
      border-radius:14px;
      font-weight:800;
      border:1px solid var(--border);
      background:rgba(14,27,45,.95);
      box-shadow:var(--shadow);
    }
    .banner.success{color:#86efac;border-color:rgba(34,197,94,.38)}
    .banner.error{color:#fca5a5;border-color:rgba(239,68,68,.4)}
    .banner.warning{color:#fcd34d;border-color:rgba(245,158,11,.45)}

    .layout{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:390px minmax(0,1fr);
      gap:10px;
    }

    .card{
      min-height:0;
      background:rgba(14,27,45,.9);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(16px);
    }

    .card-head{
      padding:13px 14px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      background:rgba(16,31,52,.82);
    }

    .card-head h2{
      margin:0;
      font-size:15px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .form-card{
      display:flex;
      flex-direction:column;
    }

    form{
      padding:14px;
      display:grid;
      gap:12px;
      overflow:auto;
    }

    label{
      display:flex;
      flex-direction:column;
      gap:6px;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.35px;
    }

    input,select{
      width:100%;
      border:1px solid var(--border);
      border-radius:13px;
      padding:12px 12px;
      background:rgba(2,6,23,.45);
      color:var(--text);
      font-size:15px;
      outline:none;
    }

    input:focus,select:focus{
      border-color:rgba(56,189,248,.75);
      box-shadow:0 0 0 4px rgba(56,189,248,.12);
    }

    input[readonly]{
      background:rgba(148,163,184,.09);
      color:#cbd5e1;
    }

    .grid-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:9px;
    }

    .form-buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-top:3px;
    }

    .tools{
      display:grid;
      grid-template-columns:minmax(0,1fr) 150px 120px;
      gap:9px;
      padding:12px;
      border-bottom:1px solid var(--border);
      background:rgba(2,6,23,.25);
    }

    .stats{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }

    .pill{
      border:1px solid var(--border);
      background:rgba(148,163,184,.1);
      border-radius:999px;
      padding:7px 10px;
    }

    .table-wrap{
      height:100%;
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:850px;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:2;
      background:#102038;
      color:#dbeafe;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.35px;
      padding:11px 10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      white-space:nowrap;
    }

    tbody td{
      padding:10px;
      border-bottom:1px solid rgba(148,163,184,.13);
      color:#dbeafe;
      font-size:14px;
      vertical-align:middle;
    }

    tbody tr:hover{
      background:rgba(56,189,248,.08);
    }

    .num{text-align:right;font-variant-numeric:tabular-nums}
    .code{
      font-weight:900;
      color:#7dd3fc;
      letter-spacing:.35px;
    }

    .gst-badge{
      display:inline-flex;
      min-width:58px;
      justify-content:center;
      border-radius:999px;
      padding:5px 8px;
      background:rgba(34,197,94,.12);
      color:#86efac;
      border:1px solid rgba(34,197,94,.25);
      font-weight:900;
    }

    .row-actions{
      display:flex;
      gap:6px;
      justify-content:flex-end;
    }

    .row-actions button{
      padding:7px 9px;
      border-radius:10px;
      font-size:12px;
    }

    .empty{
      padding:24px;
      text-align:center;
      color:var(--muted);
      font-weight:800;
    }

    .mini{
      font-size:11px;
      color:var(--muted);
      text-transform:none;
      letter-spacing:0;
      font-weight:700;
      margin-top:-3px;
    }

    @media(max-width:950px){
      body{overflow:auto}
      .app{height:auto;min-height:100vh}
      .layout{grid-template-columns:1fr}
      .tools{grid-template-columns:1fr}
      .topbar{align-items:flex-start;flex-direction:column}
      .actions{justify-content:flex-start}
    }

    @media print{
      body{background:#fff;color:#000;overflow:visible}
      .app{height:auto;padding:0}
      .topbar,.form-card,.tools,.row-actions,.banner{display:none!important}
      .layout{display:block}
      .card{box-shadow:none;border:0;background:#fff}
      .card-head{background:#fff;color:#000;border-bottom:1px solid #000}
      .table-wrap{overflow:visible}
      table{min-width:0}
      thead th{position:static;background:#eee;color:#000;border:1px solid #000}
      tbody td{color:#000;border:1px solid #000}
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="titlebox">
        <h1>HSN Code Management</h1>
        <small>VAJRA billing software · GST master for stock, sales and purchase</small>
      </div>
      <div class="actions">
        <button type="button" class="secondary" onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button type="button" class="secondary" onclick="window.location.href='ultra_stock_page.html'">Stock Page</button>
        <button type="button" class="warning" id="printBtn">Print</button>
        <button type="button" class="success" id="newBtn">+ New HSN</button>
      </div>
    </header>

    <div id="banner" class="banner"></div>

    <main class="layout">
      <section class="card form-card">
        <div class="card-head">
          <h2 id="formTitle">Add / Edit HSN</h2>
          <span class="pill" id="modePill">NEW</span>
        </div>

        <form id="hsnForm" autocomplete="off">
          <input type="hidden" id="hsnId" />

          <label>
            HSN Code
            <input type="text" id="hsnCode" placeholder="Example: 8536" required />
          </label>

          <label>
            Description
            <input type="text" id="description" placeholder="Example: Electrical switches" required />
          </label>

          <label>
            GST %
            <input type="number" id="gstPercent" step="0.01" min="0" placeholder="Example: 18" required />
            <span class="mini">CGST and SGST will split automatically. IGST = GST.</span>
          </label>

          <div class="grid-3">
            <label>
              CGST %
              <input type="number" id="cgstPercent" step="0.01" readonly />
            </label>
            <label>
              SGST %
              <input type="number" id="sgstPercent" step="0.01" readonly />
            </label>
            <label>
              IGST %
              <input type="number" id="igstPercent" step="0.01" readonly />
            </label>
          </div>

          <div class="form-buttons">
            <button type="submit" id="saveBtn" class="success">Save HSN</button>
            <button type="button" id="resetBtn" class="secondary">Reset</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>HSN List</h2>
          <div class="stats">
            <span class="pill">Total: <b id="totalCount">0</b></span>
            <span class="pill">Showing: <b id="showingCount">0</b></span>
          </div>
        </div>

        <div class="tools">
          <input type="text" id="searchHSN" placeholder="Search by HSN code, description, or GST %" />
          <select id="gstFilter">
            <option value="">All GST</option>
            <option value="0">0%</option>
            <option value="5">5%</option>
            <option value="12">12%</option>
            <option value="18">18%</option>
            <option value="28">28%</option>
          </select>
          <button type="button" id="clearSearchBtn" class="secondary">Clear</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:80px">ID</th>
                <th style="width:140px">HSN Code</th>
                <th>Description</th>
                <th class="num" style="width:90px">GST</th>
                <th class="num" style="width:90px">CGST</th>
                <th class="num" style="width:90px">SGST</th>
                <th class="num" style="width:90px">IGST</th>
                <th style="width:150px;text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="hsnTableBody">
              <tr><td colspan="8" class="empty">Loading HSN codes...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="page_permissions.js"></script>

  <script>
    const supabaseClient = window.sbcc;

    const form = document.getElementById("hsnForm");
    const tableBody = document.getElementById("hsnTableBody");
    const hsnIdInput = document.getElementById("hsnId");
    const hsnCodeInput = document.getElementById("hsnCode");
    const descriptionInput = document.getElementById("description");
    const gstInput = document.getElementById("gstPercent");
    const cgstInput = document.getElementById("cgstPercent");
    const sgstInput = document.getElementById("sgstPercent");
    const igstInput = document.getElementById("igstPercent");
    const searchInput = document.getElementById("searchHSN");
    const gstFilter = document.getElementById("gstFilter");
    const saveBtn = document.getElementById("saveBtn");
    const modePill = document.getElementById("modePill");
    const formTitle = document.getElementById("formTitle");

    let allHSN = [];
    let editingId = null;

    function safeText(v){
      return String(v ?? "").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function money(n){
      return toNum(n).toFixed(2);
    }

    function showBanner(message, type = "success"){
      const banner = document.getElementById("banner");
      banner.textContent = message;
      banner.className = "banner " + type;
      banner.style.display = "block";
      clearTimeout(window.__bannerTimer);
      window.__bannerTimer = setTimeout(() => {
        banner.style.display = "none";
      }, 3000);
    }

    function recalcGSTSplit(){
      const gst = toNum(gstInput.value);
      cgstInput.value = money(gst / 2);
      sgstInput.value = money(gst / 2);
      igstInput.value = money(gst);
    }

    function resetForm(){
      editingId = null;
      form.reset();
      hsnIdInput.value = "";
      cgstInput.value = "";
      sgstInput.value = "";
      igstInput.value = "";
      saveBtn.textContent = "Save HSN";
      modePill.textContent = "NEW";
      formTitle.textContent = "Add / Edit HSN";
      hsnCodeInput.focus();
    }

    async function checkAccess(){
      if (typeof requirePageAccess === "function") {
        const ok = await requirePageAccess("purchase");
        return !!ok;
      }
      return true;
    }

    async function loadHSN(){
      tableBody.innerHTML = `<tr><td colspan="8" class="empty">Loading HSN codes...</td></tr>`;

      const { data, error } = await supabaseClient
        .from("hsn_codes")
        .select("hsn_id,hsn_code,description,gst_percent,cgst_percent,sgst_percent,igst_percent")
        .order("hsn_code", { ascending: true });

      if (error) {
        tableBody.innerHTML = `<tr><td colspan="8" class="empty">Failed to load HSN codes.</td></tr>`;
        showBanner("Error loading HSN: " + error.message, "error");
        return;
      }

      allHSN = Array.isArray(data) ? data : [];
      document.getElementById("totalCount").textContent = allHSN.length;
      applyFilters();
    }

    function applyFilters(){
      const term = searchInput.value.trim().toLowerCase();
      const selectedGST = gstFilter.value;

      let list = allHSN.filter(h => {
        const hsn = String(h.hsn_code ?? "").toLowerCase();
        const desc = String(h.description ?? "").toLowerCase();
        const gst = String(toNum(h.gst_percent));
        const matchTerm = !term || hsn.includes(term) || desc.includes(term) || gst.includes(term);
        const matchGST = selectedGST === "" || toNum(h.gst_percent) === toNum(selectedGST);
        return matchTerm && matchGST;
      });

      renderHSN(list);
      document.getElementById("showingCount").textContent = list.length;
    }

    function renderHSN(list){
      if (!list.length) {
        tableBody.innerHTML = `<tr><td colspan="8" class="empty">No HSN codes found.</td></tr>`;
        return;
      }

      tableBody.innerHTML = list.map(h => `
        <tr>
          <td>${safeText(h.hsn_id)}</td>
          <td class="code">${safeText(h.hsn_code)}</td>
          <td>${safeText(h.description)}</td>
          <td class="num"><span class="gst-badge">${money(h.gst_percent)}%</span></td>
          <td class="num">${money(h.cgst_percent ?? (toNum(h.gst_percent) / 2))}%</td>
          <td class="num">${money(h.sgst_percent ?? (toNum(h.gst_percent) / 2))}%</td>
          <td class="num">${money(h.igst_percent ?? h.gst_percent)}%</td>
          <td>
            <div class="row-actions">
              <button type="button" class="secondary" onclick="editHSN('${safeText(h.hsn_id)}')">Edit</button>
              <button type="button" class="danger" onclick="deleteHSN('${safeText(h.hsn_id)}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function saveHSN(e){
      e.preventDefault();

      const hsnCode = hsnCodeInput.value.trim().toUpperCase();
      const description = descriptionInput.value.trim();
      const gst = toNum(gstInput.value);

      if (!hsnCode || !description) {
        showBanner("Please enter HSN code and description.", "warning");
        return;
      }

      if (gst < 0 || gst > 100) {
        showBanner("GST percentage must be between 0 and 100.", "warning");
        return;
      }

      const payload = {
        hsn_code: hsnCode,
        description,
        gst_percent: Number(gst.toFixed(2)),
        cgst_percent: Number((gst / 2).toFixed(2)),
        sgst_percent: Number((gst / 2).toFixed(2)),
        igst_percent: Number(gst.toFixed(2))
      };

      saveBtn.disabled = true;

      try {
        let error;

        if (editingId) {
          ({ error } = await supabaseClient
            .from("hsn_codes")
            .update(payload)
            .eq("hsn_id", editingId));
        } else {
          const duplicate = allHSN.find(h => String(h.hsn_code).toUpperCase() === hsnCode);
          if (duplicate) {
            showBanner("This HSN code already exists. Use Edit instead.", "warning");
            saveBtn.disabled = false;
            return;
          }

          ({ error } = await supabaseClient
            .from("hsn_codes")
            .insert([payload]));
        }

        if (error) throw error;

        showBanner(editingId ? "HSN updated successfully." : "HSN added successfully.", "success");
        resetForm();
        await loadHSN();
      } catch (err) {
        showBanner("Error saving HSN: " + err.message, "error");
      } finally {
        saveBtn.disabled = false;
      }
    }

    window.editHSN = function(id){
      const item = allHSN.find(h => String(h.hsn_id) === String(id));
      if (!item) {
        showBanner("HSN not found.", "error");
        return;
      }

      editingId = item.hsn_id;
      hsnIdInput.value = item.hsn_id;
      hsnCodeInput.value = item.hsn_code || "";
      descriptionInput.value = item.description || "";
      gstInput.value = money(item.gst_percent);
      recalcGSTSplit();

      saveBtn.textContent = "Update HSN";
      modePill.textContent = "EDIT";
      formTitle.textContent = "Editing HSN: " + (item.hsn_code || "");
      hsnCodeInput.focus();
      hsnCodeInput.select();
    };

    window.deleteHSN = async function(id){
      const item = allHSN.find(h => String(h.hsn_id) === String(id));
      const label = item ? `${item.hsn_code} - ${item.description}` : "this HSN";

      if (!confirm("Delete " + label + "?")) return;

      try {
        const { error } = await supabaseClient
          .from("hsn_codes")
          .delete()
          .eq("hsn_id", id);

        if (error) throw error;

        showBanner("HSN deleted successfully.", "success");
        if (String(editingId) === String(id)) resetForm();
        await loadHSN();
      } catch (err) {
        showBanner("Error deleting HSN: " + err.message, "error");
      }
    };

    gstInput.addEventListener("input", recalcGSTSplit);
    searchInput.addEventListener("input", applyFilters);
    gstFilter.addEventListener("change", applyFilters);
    form.addEventListener("submit", saveHSN);

    document.getElementById("resetBtn").addEventListener("click", resetForm);
    document.getElementById("newBtn").addEventListener("click", resetForm);
    document.getElementById("clearSearchBtn").addEventListener("click", () => {
      searchInput.value = "";
      gstFilter.value = "";
      applyFilters();
      searchInput.focus();
    });
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") resetForm();
      if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      const ok = await checkAccess();
      if (!ok) return;
      recalcGSTSplit();
      await loadHSN();
    });
  </script>
</body>
</html>
