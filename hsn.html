<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HSN Code Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* General reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #f0f4f8, #d9e4ec);
  color: #333;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  background: #2c3e50;
  color: #fff;
  padding: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 1.5rem;
}

header button {
  background: #e74c3c;
  border: none;
  padding: 0.5rem 1rem;
  color: #fff;
  cursor: pointer;
  border-radius: 4px;
}

/* Sidebar */
#sidebar {
  position: fixed;
  top: 0;
  left: -200px;
  width: 200px;
  height: 100%;
  background: #34495e;
  transition: left 0.3s ease;
  padding-top: 60px;
  z-index: 10;
}

#sidebar.active {
  left: 0;
}

#sidebar nav ul {
  list-style: none;
}

#sidebar nav ul li {
  margin: 1rem 0;
}

#sidebar nav ul li a {
  color: #fff;
  text-decoration: none;
  padding: 0.5rem 1rem;
  display: block;
  transition: background 0.2s ease;
}

#sidebar nav ul li a:hover {
  background: #2c3e50;
}

#toggleBtn {
  position: absolute;
  top: 10px;
  right: -45px;
  background: #34495e;
  color: #fff;
  border: none;
  padding: 0.5rem;
  cursor: pointer;
  border-radius: 0 4px 4px 0;
}

/* Main layout */
main {
  margin: 1rem;
  transition: margin-left 0.3s ease;
}

#sidebar.active ~ main {
  margin-left: 220px;
}

#sidebar:not(.active) ~ main {
  margin-left: 20px;
}

/* Section cards */
.card {
  background: #fff;
  padding: 0.8rem;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  width: 100%; /* ensure full width for tables */
}

.card h2 {
  font-size: 1.2rem;
  margin-bottom: 0.6rem;
  color: #2c3e50;
}

/* Forms */
form {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
}

form label {
  flex: 1 1 200px;
  display: flex;
  flex-direction: column;
  font-size: 0.95rem;
}

form input, form select {
  padding: 0.3rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-top: 0.2rem;
}

form input:focus, form select:focus {
  border-color: #3498db;
  outline: none;
  box-shadow: 0 0 4px rgba(52,152,219,0.4);
}

/* Sales form inputs */
#salesForm input {
  flex: 1 1 150px;
}

/* Table */
table {
  width: 100%;              /* full width */
  border-collapse: collapse;
  margin-top: 1rem;
  table-layout: auto;       /* natural column sizing */
}

table th, table td {
  border: 1px solid #ddd;
  padding: 0.6rem;          /* bigger padding */
  text-align: center;
  font-size: 1rem;          /* larger text */
}

table th {
  background: #f4f6f8;
}

table tr:nth-child(even) {
  background: #f9f9f9;      /* striped rows */
}

.remove {
  background: #e74c3c;
  border: none;
  color: #fff;
  padding: 0.3rem 0.6rem;
  border-radius: 4px;
  cursor: pointer;
}

/* Buttons */
button, .btn {
  background: #3498db;
  border: none;
  color: #fff;
  padding: 0.6rem 1rem;
  border-radius: 4px;
  cursor: pointer;
  margin-top: 1rem;
  transition: background 0.2s ease;
}

button:hover, .btn:hover {
  background: #2980b9;
}

.btn-danger {
  background: #e74c3c;
}

.btn-danger:hover {
  background: #c0392b;
}

/* Totals */
h3 {
  font-size: 1rem;
  margin-top: 0.8rem;
}

h3 span {
  font-weight: bold;
  color: #27ae60;
}

/* Print Styles */
@media print {
  body {
    background: #fff !important;
    color: #000;
  }

  header, #sidebar, #toggleBtn, .remove, #saveInvoice {
    display: none !important;
  }

  main {
    margin: 0;
  }

  .card {
    box-shadow: none;
    border: 1px solid #ccc;
    page-break-inside: avoid;
  }

  table th {
    background: #eee;
  }

  h1, h2, h3 {
    color: #000;
  }
}
</style>
</head>
<body>
  <header>
    <h1>HSN Codes</h1>
    <button id="addHSNBtn" type="button">+ Add HSN Code</button>
  </header>

  <main>
    <!-- Form for add/edit -->
    <section class="card">
      <form id="hsnForm" class="inline-form">
        <input type="hidden" id="hsnId">
        <label>HSN Code
          <input type="text" id="hsnCode" required>
        </label>
        <label>Description
          <input type="text" id="description" required>
        </label>
        <label>GST %
          <input type="number" id="gstPercent" step="0.01" required>
        </label>
        <label>CGST %
          <input type="number" id="cgstPercent" step="0.01" readonly>
        </label>
        <label>SGST %
          <input type="number" id="sgstPercent" step="0.01" readonly>
        </label>
        <label>IGST %
          <input type="number" id="igstPercent" step="0.01" readonly>
        </label>
        <button type="submit" id="saveBtn">Save HSN</button>
      </form>
    </section>

    <!-- Search bar -->
    <section class="card">
      <label for="searchHSN">Search HSN</label>
      <input type="text" id="searchHSN" placeholder="Type HSN code or description...">
    </section>

    <!-- Table -->
    <section class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>HSN Code</th>
            <th>Description</th>
            <th>GST%</th>
            <th>CGST%</th>
            <th>SGST%</th>
            <th>IGST%</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="hsnTableBody"></tbody>
      </table>
    </section>
  </main>

  <!-- Supabase + JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
  <script src="page_permissions.js"></script>

  <script>
    const supabaseClient = window.sbcc; // supabase client from supabaseClient.js
  document.addEventListener("DOMContentLoaded", async () => {
  const ok = await requirePageAccess("sales");
  if (!ok) return;
  });

const form = document.getElementById("hsnForm");
const tableBody = document.getElementById("hsnTableBody");
const gstInput = document.getElementById("gstPercent");
const cgstInput = document.getElementById("cgstPercent");
const sgstInput = document.getElementById("sgstPercent");
const igstInput = document.getElementById("igstPercent");
const hsnIdInput = document.getElementById("hsnId");
const searchInput = document.getElementById("searchHSN");

let editingId = null;
let allHSN = [];

// ✅ Auto-update CGST, SGST, IGST when GST changes
gstInput.addEventListener("input", () => {
  const gst = parseFloat(gstInput.value) || 0;
  cgstInput.value = (gst / 2).toFixed(2);
  sgstInput.value = (gst / 2).toFixed(2);
  igstInput.value = gst.toFixed(2);
});

// ✅ Load all HSN codes
async function loadHSN() {
  const { data, error } = await supabaseClient
    .from("hsn_codes")
    .select("*")
    .order("hsn_id", { ascending: true });

  if (error) {
    alert("Error loading HSN codes: " + error.message);
    return;
  }

  allHSN = data;
  renderHSN(allHSN);
}

// ✅ Render HSN list
function renderHSN(list) {
  tableBody.innerHTML = "";
  list.forEach(h => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${h.hsn_id}</td>
      <td>${h.hsn_code}</td>
      <td>${h.description}</td>
      <td>${h.gst_percent}</td>
      <td>${h.cgst_percent}</td>
      <td>${h.sgst_percent}</td>
      <td>${h.igst_percent}</td>
      <td>
        <button onclick="editHSN(${h.hsn_id}, '${h.hsn_code}', '${h.description}', ${h.gst_percent})">Edit</button>
        <button onclick="deleteHSN(${h.hsn_id})">Delete</button>
      </td>
    `;
    tableBody.appendChild(row);
  });
}

// ✅ Search filter
searchInput.addEventListener("input", () => {
  const term = searchInput.value.toLowerCase();
  const filtered = allHSN.filter(h =>
    h.hsn_code.toLowerCase().includes(term) ||
    h.description.toLowerCase().includes(term)
  );
  renderHSN(filtered);
});

// ✅ Add or Update HSN
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const hsnCode = document.getElementById("hsnCode").value.trim();
  const description = document.getElementById("description").value.trim();
  const gst = parseFloat(gstInput.value) || 0;
  const cgst = parseFloat(cgstInput.value) || 0;
  const sgst = parseFloat(sgstInput.value) || 0;
  const igst = parseFloat(igstInput.value) || 0;

  try {
    if (editingId) {
      const { error } = await supabaseClient.from("hsn_codes").update({
        hsn_code: hsnCode,
        description,
        gst_percent: gst,
        cgst_percent: cgst,
        sgst_percent: sgst,
        igst_percent: igst
      }).eq("hsn_id", editingId);

      if (error) throw error;
      alert("HSN updated successfully!");
    } else {
      const { error } = await supabaseClient.from("hsn_codes").insert([{
        hsn_code: hsnCode,
        description,
        gst_percent: gst,
        cgst_percent: cgst,
        sgst_percent: sgst,
        igst_percent: igst
      }]);
      if (error) throw error;
      alert("HSN added successfully!");
    }

    form.reset();
    editingId = null;
    document.getElementById("saveBtn").textContent = "Save HSN";
    loadHSN();
  } catch (err) {
    alert("Error saving HSN: " + err.message);
  }
});

// ✅ Edit HSN
window.editHSN = function(id, code, desc, gst) {
  editingId = id;
  document.getElementById("hsnCode").value = code;
  document.getElementById("description").value = desc;
  gstInput.value = gst;
  gstInput.dispatchEvent(new Event("input")); // auto-update CGST/SGST/IGST
  document.getElementById("saveBtn").textContent = "Update HSN";
}

// ✅ Delete HSN
window.deleteHSN = async function(id) {
  if (!confirm("Are you sure you want to delete this HSN code?")) return;
  const { error } = await supabaseClient.from("hsn_codes").delete().eq("hsn_id", id);
  if (error) {
    alert("Error deleting HSN: " + error.message);
  } else {
    alert("HSN deleted successfully!");
    loadHSN();
  }
}

// Initial load
document.addEventListener("DOMContentLoaded", loadHSN);
  </script>
</body>
</html>
