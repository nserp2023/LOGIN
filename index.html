<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="manifest" href="site.webmanifest">
  <title>Billing Software Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: url("background.jpg") no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
      filter: blur(40px);
      animation: float 12s infinite ease-in-out;
    }

    .shape:nth-child(1) {
      width: 200px;
      height: 200px;
      background: #00c6ff;
      top: 10%;
      left: 15%;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 150px;
      height: 150px;
      background: #ff6b6b;
      bottom: 15%;
      right: 20%;
      animation-delay: 4s;
    }

    .shape:nth-child(3) {
      width: 250px;
      height: 250px;
      background: #7d5fff;
      top: 60%;
      left: 5%;
      animation-delay: 8s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-40px) translateX(30px); }
    }

    .login-container {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px 35px;
      width: 380px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.8s ease;
    }

    .login-container h2 {
      margin-bottom: 25px;
      font-size: 26px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #f1f1f1;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      transition: all 0.3s ease;
    }

    .input-group input::placeholder {
      color: #e0e0e0;
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.35);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 120, 215, 0.4);
    }

    /* Uppercase visual effect for name field */
    .uppercase-input {
      text-transform: uppercase;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00c6ff, #0078d7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 120, 215, 0.5);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #error-message {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .login-container p {
      margin-top: 20px;
      font-size: 14px;
      color: #f1f1f1;
      text-align: center;
    }

    .login-container a {
      color: #00c6ff;
      font-weight: 500;
      text-decoration: none;
    }

    .login-container a:hover {
      text-decoration: underline;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>

  <div class="login-container">
    <h2>Login to Billing Software</h2>

    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <label for="full_name">Full Name</label>
        <input
          type="text"
          id="full_name"
          name="full_name"
          class="uppercase-input"
          placeholder="Enter full name"
          required
          autofocus
        />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          required
        />
      </div>

      <button type="submit" id="loginBtn">Login</button>
      <p id="error-message"></p>
    </form>

    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    const loginClient = window.sbcc;
    let isLoggingIn = false;

    const fullNameInput = document.getElementById("full_name");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error-message");
    const loginBtn = document.getElementById("loginBtn");

    // Fake caps lock behavior for name field
    function forceUppercase(el) {
      el.addEventListener("input", () => {
        const start = el.selectionStart;
        const end = el.selectionEnd;
        el.value = el.value.toUpperCase();
        try {
          el.setSelectionRange(start, end);
        } catch (_) {}
      });
    }

    forceUppercase(fullNameInput);

    window.addEventListener("load", () => {
      fullNameInput.focus();
    });

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      if (isLoggingIn) return;

      errorEl.textContent = "";

      const full_name = fullNameInput.value.trim().toUpperCase();
      const password = passwordInput.value;

      if (!full_name || !password) {
        errorEl.textContent = "Please enter full name and password.";
        return;
      }

      try {
        isLoggingIn = true;
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        // Step 1: Find email by full name from user_profiles
        const { data: profileByName, error: nameLookupError } = await loginClient
          .from("user_profiles")
          .select("id, email, full_name, role, approved")
          .eq("full_name", full_name)
          .maybeSingle();

        if (nameLookupError) {
          errorEl.textContent = "Login failed while checking name: " + nameLookupError.message;
          return;
        }

        if (!profileByName) {
          errorEl.textContent = "Login failed: Full name not found.";
          return;
        }

        if (!profileByName.email) {
          errorEl.textContent = "Login failed: Email not found for this user.";
          return;
        }

        // Step 2: Login using found email + password
        const { data, error } = await loginClient.auth.signInWithPassword({
          email: String(profileByName.email).trim().toLowerCase(),
          password
        });

        if (error) {
          if ((error.message || "").toLowerCase().includes("email not confirmed")) {
            errorEl.textContent = "Login failed: Email confirmation is still enabled in Supabase, or this user was created before it was turned off.";
          } else if ((error.message || "").toLowerCase().includes("invalid login credentials")) {
            errorEl.textContent = "Login failed: Wrong password or invalid name.";
          } else {
            errorEl.textContent = "Login failed: " + error.message;
          }
          return;
        }

        const user = data?.user;

        if (!user) {
          errorEl.textContent = "Login failed: User not found.";
          return;
        }

        // Step 3: Load fresh profile using auth user id
        const { data: profile, error: profileError } = await loginClient
          .from("user_profiles")
          .select("id, email, full_name, role, approved")
          .eq("id", user.id)
          .maybeSingle();

        if (profileError || !profile) {
          errorEl.textContent = "Login failed: User profile not found.";
          await loginClient.auth.signOut();
          return;
        }

        if (!profile.approved) {
          errorEl.textContent = "Your account is waiting for OWNER / ADMIN approval.";
          await loginClient.auth.signOut();
          return;
        }

        localStorage.setItem("user_id", profile.id || "");
        localStorage.setItem("email", profile.email || "");
        localStorage.setItem("full_name", profile.full_name || "");
        localStorage.setItem("role", profile.role || "");

        window.location.href = "dashboard.html";
      } catch (err) {
        errorEl.textContent = "Unexpected error: " + (err.message || err);
      } finally {
        isLoggingIn = false;
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
