<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<title>Payment / Receipt - VAJRA LIGHTS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="page_permissions.js"></script>
<script src="common-ui.js"></script>
<style>
    :root{
        --primary:#2563eb;
        --success:#059669;
        --danger:#dc2626;
        --warning:#f59e0b;
        --card:#ffffff;
        --text:#1e293b;
        --muted:#64748b;
        --border:#cbd5e1;
        --hover:#eff6ff;
        --shadow:0 10px 25px rgba(0,0,0,0.08);
        --radius:14px;
    }

    *{ box-sizing:border-box; }

    body{
        margin:0;
        font-family:Segoe UI, Roboto, Arial, sans-serif;
        background:burlywood;
        color:var(--text);
        padding:14px;
    }

    .container{ max-width:1200px; margin:auto; }

    .card{
        background:var(--card);
        border:1px solid var(--border);
        border-radius:var(--radius);
        box-shadow:var(--shadow);
        padding:16px;
        margin-bottom:16px;
    }

    h1,h2{ margin:0 0 12px; }

    .title-row{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
    }

    .grid{
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        gap:12px;
    }

    .field{ display:flex; flex-direction:column; gap:6px; position:relative; }
    .field.full{ grid-column:1 / -1; }

    label{ font-size:13px; font-weight:600; color:var(--muted); }

    input, select, textarea, button{
        width:100%;
        min-height:44px;
        border:1px solid var(--border);
        border-radius:10px;
        padding:10px 12px;
        font-size:15px;
        outline:none;
        background:#fff;
    }

    input:focus, select:focus, textarea:focus{
        border-color:var(--primary);
        box-shadow:0 0 0 3px rgba(37,99,235,0.12);
    }

    textarea{ min-height:90px; resize:vertical; }

    .btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }

    button{ cursor:pointer; border:none; font-weight:700; }
    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-secondary{ background:#e2e8f0; color:#0f172a; }

    .badge{
        background:#dbeafe;
        color:#1d4ed8;
        padding:8px 12px;
        border-radius:999px;
        font-size:13px;
        font-weight:700;
    }

    .autocomplete-list{
        position:absolute;
        top:100%;
        left:0;
        right:0;
        background:#fff;
        border:1px solid var(--border);
        border-radius:10px;
        margin-top:4px;
        box-shadow:var(--shadow);
        max-height:220px;
        overflow:auto;
        z-index:50;
        display:none;
    }

    .autocomplete-item{ padding:10px 12px; cursor:pointer; border-bottom:1px solid #f1f5f9; }
    .autocomplete-item:last-child{ border-bottom:none; }
    .autocomplete-item.active,.autocomplete-item:hover{ background:var(--hover); }

    .search-box{
        display:grid;
        grid-template-columns:2fr 1fr 1fr 1fr auto;
        gap:10px;
        align-items:end;
    }

    .table-wrap{ overflow:auto; border:1px solid var(--border); border-radius:12px; }

    table{ width:100%; border-collapse:collapse; min-width:1050px; background:#fff; }

    th, td{
        padding:12px 10px;
        border-bottom:1px solid #e2e8f0;
        text-align:left;
        font-size:14px;
        vertical-align:middle;
    }

    th{ background:#f8fafc; position:sticky; top:0; z-index:1; }

    tr.need-approval{ background:#fff7ed; }
    tr.approved-row{ background:#ecfdf5; }

    .amount{ text-align:right; font-weight:700; }
    .payment{ color:var(--danger); font-weight:800; text-transform:capitalize; }
    .receipt{ color:var(--success); font-weight:800; text-transform:capitalize; }
    .small{ font-size:12px; color:var(--muted); }
    .message{ margin-top:10px; font-weight:700; }
    .success-msg{ color:var(--success); }
    .error-msg{ color:var(--danger); }

    .accept-btn{
        background:#16a34a;
        color:#fff;
        border:none;
        padding:8px 12px;
        border-radius:8px;
        font-size:13px;
        font-weight:800;
        cursor:pointer;
        min-height:36px;
        width:auto;
        white-space:nowrap;
    }

    .reject-btn{
        background:#dc2626;
        color:#fff;
        border:none;
        padding:8px 12px;
        border-radius:8px;
        font-size:13px;
        font-weight:800;
        cursor:pointer;
        min-height:36px;
        width:auto;
        white-space:nowrap;
    }

    .fix-btn{
        background:#f59e0b;
        color:#111827;
        border:none;
        padding:8px 12px;
        border-radius:8px;
        font-size:13px;
        font-weight:900;
        cursor:pointer;
        min-height:36px;
        width:auto;
        white-space:nowrap;
    }

    .accept-btn:disabled,.reject-btn:disabled,.fix-btn:disabled{ background:#94a3b8; cursor:not-allowed; color:#fff; }

    .status-badge{
        display:inline-block;
        padding:6px 10px;
        border-radius:999px;
        font-size:12px;
        font-weight:800;
        white-space:nowrap;
    }

    .status-pending{ background:#fef3c7; color:#92400e; }
    .status-approved{ background:#dcfce7; color:#166534; }
    .status-rejected{ background:#fee2e2; color:#991b1b; }
    .status-info{ background:#dbeafe; color:#1d4ed8; }

    .type-note{ display:block; margin-top:4px; font-size:11px; color:#64748b; font-weight:800; }
    .action-stack{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    @media (max-width: 900px){
        .grid{ grid-template-columns:repeat(2, 1fr); }
        .search-box{ grid-template-columns:1fr 1fr; }
    }

    @media (max-width: 600px){
        body{ padding:10px; }
        .card{ padding:12px; }
        .grid{ grid-template-columns:1fr; }
        .search-box{ grid-template-columns:1fr; }
        input, select, textarea, button{ font-size:16px; }
    }
</style>
</head>
<body>
<div class="container">

    <div class="card">
        <div class="title-row">
            <h1>Payment / Receipt Entry</h1>
            <div class="badge" id="modeBadge">Payment Mode</div>
        </div>

        <div class="grid">
            <div class="field">
                <label for="txnType">Type</label>
                <select id="txnType" name="txnType">
                    <option value="payment">Payment</option>
                    <option value="receipt">Receipt</option>
                </select>
            </div>

            <div class="field">
                <label for="txnDate">Date</label>
                <input type="date" id="txnDate" name="txnDate" />
            </div>

            <div class="field">
                <label for="voucherNo">Voucher Number</label>
                <input type="text" id="voucherNo" name="voucherNo" readonly />
            </div>

            <div class="field">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="Enter amount" />
            </div>

            <div class="field full" id="partyFieldWrap">
                <label for="partyName" id="partyLabel">Paid To</label>
                <input type="text" id="partyName" name="partyName" autocomplete="off" placeholder="Type name..." />
                <div id="partySuggestions" class="autocomplete-list"></div>
                <div class="small">Saved names will appear automatically. Use Arrow keys + Enter.</div>
            </div>

            <div class="field full">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" name="remarks" placeholder="Optional remarks"></textarea>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-primary" id="saveBtn">Save Entry</button>
            <button class="btn-secondary" id="clearBtn" type="button">Clear</button>
        </div>

        <div id="formMessage" class="message"></div>
    </div>

    <div class="card">
        <h2>Search Transaction Details</h2>

        <div class="search-box">
            <div class="field">
                <label for="searchParty">Search</label>
                <input type="text" id="searchParty" name="searchParty" placeholder="Search by party / voucher / remarks..." />
            </div>

            <div class="field">
                <label for="searchType">Type</label>
                <select id="searchType" name="searchType">
                    <option value="">All</option>
                    <option value="payment">Payment</option>
                    <option value="receipt">Receipt</option>
                </select>
            </div>

            <div class="field">
                <label for="searchDate">Date</label>
                <input type="date" id="searchDate" name="searchDate" />
            </div>

            <div class="field">
                <label for="searchStatus">Status</label>
                <select id="searchStatus" name="searchStatus">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                    <option value="not_needed">Not Needed</option>
                </select>
            </div>

            <div class="field">
                <button class="btn-primary" id="searchBtn" type="button">Search</button>
            </div>
        </div>

        <div style="margin-top:14px;" class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Voucher No</th>
                        <th>Type</th>
                        <th>Party</th>
                        <th>Linked Bill</th>
                        <th class="amount">Amount</th>
                        <th>Remarks</th>
                        <th>Approval</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="8" style="text-align:center; color:#64748b;">No transactions found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const sb = window.sbcc;

    document.addEventListener("DOMContentLoaded", async () => {
        if (typeof requirePageAccess === "function") {
            const ok = await requirePageAccess("paymentreceipt");
            if (!ok) return;
        }
    });

    const txnType = document.getElementById("txnType");
    const txnDate = document.getElementById("txnDate");
    const voucherNo = document.getElementById("voucherNo");
    const amount = document.getElementById("amount");
    const partyName = document.getElementById("partyName");
    const remarks = document.getElementById("remarks");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const partyLabel = document.getElementById("partyLabel");
    const modeBadge = document.getElementById("modeBadge");
    const formMessage = document.getElementById("formMessage");
    const partySuggestions = document.getElementById("partySuggestions");
    const searchParty = document.getElementById("searchParty");
    const searchType = document.getElementById("searchType");
    const searchDate = document.getElementById("searchDate");
    const searchStatus = document.getElementById("searchStatus");
    const searchBtn = document.getElementById("searchBtn");
    const resultsBody = document.getElementById("resultsBody");

    let suggestionItems = [];
    let activeSuggestionIndex = -1;
    let isSaving = false;
    let isApproving = false;
    let currentUserRole = "";

    window.onload = async function(){
        txnDate.value = new Date().toISOString().split("T")[0];
        searchDate.value = new Date().toISOString().split("T")[0];
        updateTypeUI();
        await loadCurrentUserRole();
        await generateNextVoucherNo();
        await loadTransactions();
        setupEnterNavigation();
    };

    function normalizeText(value){
        return String(value ?? "").trim().toLowerCase();
    }

    function normalizeLoose(value){
        return String(value ?? "").toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    function escapeHtml(value){
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function formatDate(dateValue){
        if(!dateValue) return "";
        const parts = String(dateValue).split("-");
        if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
        return String(dateValue);
    }

    function getCurrentIsoTime(){
        return new Date().toISOString();
    }

    function parseSalesOrderAdvanceRefId(row){
        const voucher = String(row?.voucher_no || "");
        const match = voucher.match(/AUTO[-_\s]*sales[-_\s]*order[-_\s]*advance[-_\s]*(\d+)/i);
        if(match) return Number(match[1]) || row?.reference_id || null;
        return row?.reference_id || null;
    }

    function rowText(row){
        return `${row?.voucher_no || ""} ${row?.reference_type || ""} ${row?.remarks || ""}`;
    }

    function isSalesOrderAdvance(row){
        const txn = normalizeText(row?.txn_type);
        if(txn && txn !== "receipt") return false;

        const text = normalizeLoose(rowText(row));
        return text.includes("salesorderadvance")
            || text.includes("advanceforsalesorder")
            || text.includes("autosalesorderadvance")
            || text.includes("advanceforsales");
    }

    function isProperSalesOrderAdvance(row){
        return normalizeLoose(row?.reference_type).includes("salesorderadvance");
    }

    function transactionNeedsApproval(row){
        const txn = normalizeText(row?.txn_type);
        const status = normalizeText(row?.approval_status);

        // VERY IMPORTANT: Sales order advance is a receipt, but it must need approval.
        if(isSalesOrderAdvance(row)) return true;

        // All payments need approval.
        if(txn === "payment") return true;

        // Old rows already pending/rejected should continue to show action.
        if(status === "pending" || status === "rejected") return true;

        return false;
    }

    async function loadCurrentUserRole(){
        currentUserRole = "";
        try{
            for(const key of ["role", "user_role", "profile_role"]){
                const val = localStorage.getItem(key);
                if(val){ currentUserRole = normalizeText(val); break; }
            }

            const { data: authData } = await sb.auth.getUser();
            const uid = authData?.user?.id;
            if(uid){
                const { data: profile } = await sb
                    .from("user_profiles")
                    .select("role")
                    .eq("id", uid)
                    .maybeSingle();
                if(profile?.role){
                    currentUserRole = normalizeText(profile.role);
                    localStorage.setItem("role", profile.role);
                }
            }
        }catch(err){
            console.warn("Role load failed", err);
        }
    }

    function getCurrentRole(){
        return currentUserRole || normalizeText(localStorage.getItem("role") || localStorage.getItem("user_role") || localStorage.getItem("profile_role") || "");
    }

    function getLoggedUserName(){
        return localStorage.getItem("username")
            || localStorage.getItem("user_name")
            || localStorage.getItem("staff_name")
            || getCurrentRole()
            || "APPROVER";
    }

    txnType.addEventListener("change", async () => {
        updateTypeUI();
        await generateNextVoucherNo();
    });

    function updateTypeUI(){
        if(txnType.value === "payment"){
            partyLabel.textContent = "Paid To";
            modeBadge.textContent = "Payment Mode";
        }else{
            partyLabel.textContent = "Received From";
            modeBadge.textContent = "Receipt Mode";
        }
    }

    async function generateNextVoucherNo(){
        const prefix = txnType.value === "payment" ? "PAY" : "REC";

        const { data, error } = await sb
            .from("cash_transactions")
            .select("voucher_no")
            .eq("txn_type", txnType.value)
            .order("id", { ascending: false })
            .limit(1);

        if(error){
            console.error(error);
            voucherNo.value = `${prefix}-0001`;
            return;
        }

        let nextNumber = 1;
        if(data && data.length){
            const lastVoucher = data[0].voucher_no || "";
            const match = lastVoucher.match(/(\d+)$/);
            if(match) nextNumber = parseInt(match[1], 10) + 1;
        }
        voucherNo.value = `${prefix}-${String(nextNumber).padStart(4, "0")}`;
    }

    partyName.addEventListener("input", async function(){
        activeSuggestionIndex = -1;
        const q = partyName.value.trim();
        if(!q){
            hideSuggestions();
            return;
        }
        await showPartySuggestions(q);
    });

    partyName.addEventListener("keydown", function(e){
        const items = partySuggestions.querySelectorAll(".autocomplete-item");
        if(partySuggestions.style.display === "block" && items.length){
            if(e.key === "ArrowDown"){
                e.preventDefault();
                activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, items.length - 1);
                setActiveSuggestion(items);
            }else if(e.key === "ArrowUp"){
                e.preventDefault();
                activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
                setActiveSuggestion(items);
            }else if(e.key === "Enter"){
                if(activeSuggestionIndex >= 0 && items[activeSuggestionIndex]){
                    e.preventDefault();
                    items[activeSuggestionIndex].click();
                }
            }else if(e.key === "Escape"){
                hideSuggestions();
            }
        }
    });

    document.addEventListener("click", function(e){
        if(!partyName.contains(e.target) && !partySuggestions.contains(e.target)) hideSuggestions();
    });

    function setActiveSuggestion(items){
        items.forEach(i => i.classList.remove("active"));
        if(items[activeSuggestionIndex]){
            items[activeSuggestionIndex].classList.add("active");
            items[activeSuggestionIndex].scrollIntoView({ block:"nearest" });
        }
    }

    function hideSuggestions(){
        partySuggestions.style.display = "none";
        partySuggestions.innerHTML = "";
        suggestionItems = [];
        activeSuggestionIndex = -1;
    }

    async function showPartySuggestions(q){
        const { data, error } = await sb
            .from("cash_transactions")
            .select("party_name")
            .ilike("party_name", `%${q}%`)
            .limit(30);

        if(error){
            console.error(error);
            hideSuggestions();
            return;
        }

        const names = [...new Set((data || []).map(x => x.party_name).filter(Boolean))].slice(0, 12);
        suggestionItems = names;
        if(!names.length){ hideSuggestions(); return; }

        partySuggestions.innerHTML = names.map(name => `
            <div class="autocomplete-item" data-name="${escapeHtml(name)}">${escapeHtml(name)}</div>
        `).join("");

        partySuggestions.querySelectorAll(".autocomplete-item").forEach(item => {
            item.addEventListener("click", async () => {
                partyName.value = item.dataset.name;
                hideSuggestions();
            });
        });

        partySuggestions.style.display = "block";
    }

    saveBtn.addEventListener("click", saveTransaction);
    clearBtn.addEventListener("click", clearForm);

    async function saveTransaction(){
        if(isSaving) return;

        const amt = parseFloat(amount.value || "0");
        const party = partyName.value.trim();

        if(!txnDate.value){ setMessage("Date is required", false); return; }
        if(!party){ setMessage("Party name is required", false); return; }
        if(!amt || amt <= 0){ setMessage("Enter a valid amount", false); return; }

        isSaving = true;
        saveBtn.disabled = true;

        try{
            // Manual receipts do not need approval. Payments need approval.
            const initialStatus = txnType.value === "payment" ? "pending" : "approved";
            const approvedBy = initialStatus === "approved" ? "AUTO" : null;
            const approvedAt = initialStatus === "approved" ? getCurrentIsoTime() : null;

            const payload = {
                voucher_no: voucherNo.value.trim(),
                txn_date: txnDate.value,
                txn_type: txnType.value,
                party_name: party,
                amount: amt,
                remarks: remarks.value.trim() || null,
                approval_status: initialStatus,
                approved_by: approvedBy,
                approved_at: approvedAt,
                approval_note: null,
                reference_id: null,
                reference_type: null
            };

            const { error } = await sb.from("cash_transactions").insert([payload]);
            if(error) throw error;

            setMessage("Saved successfully", true);
            clearForm(false);
            await generateNextVoucherNo();
            await loadTransactions();
        }catch(err){
            console.error(err);
            setMessage("Save failed: " + (err.message || "Unknown error"), false);
        }finally{
            isSaving = false;
            saveBtn.disabled = false;
        }
    }

    function clearForm(resetVoucher = true){
        amount.value = "";
        partyName.value = "";
        remarks.value = "";
        txnDate.value = new Date().toISOString().split("T")[0];
        hideSuggestions();
        if(resetVoucher) generateNextVoucherNo();
    }

    function setMessage(msg, ok){
        formMessage.textContent = msg;
        formMessage.className = "message " + (ok ? "success-msg" : "error-msg");
        if(ok){
            setTimeout(() => { formMessage.textContent = ""; }, 2500);
        }
    }

    searchBtn.addEventListener("click", () => loadTransactions());
    searchParty.addEventListener("input", debounce(() => loadTransactions(), 350));
    searchType.addEventListener("change", () => loadTransactions());
    searchDate.addEventListener("change", () => loadTransactions());
    searchStatus.addEventListener("change", () => loadTransactions());

    function debounce(fn, delay){
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => fn(...args), delay);
        };
    }

    async function loadTransactions(){
        resultsBody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#64748b;">Loading...</td></tr>`;

        let query = sb
            .from("cash_transactions")
            .select("id,voucher_no,txn_date,txn_type,party_name,amount,remarks,approval_status,approved_by,approved_at,approval_note,reference_id,reference_type")
            .order("txn_date", { ascending:false })
            .order("id", { ascending:false })
            .limit(500);

        const typeVal = searchType.value.trim();
        const dateVal = searchDate.value.trim();
        const textVal = searchParty.value.trim();

        if(typeVal) query = query.eq("txn_type", typeVal);
        if(dateVal) query = query.eq("txn_date", dateVal);

        const { data, error } = await query;
        if(error){
            console.error(error);
            resultsBody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#dc2626;">Load failed: ${escapeHtml(error.message)}</td></tr>`;
            return;
        }

        let rows = data || [];

        if(textVal){
            const needle = normalizeLoose(textVal);
            rows = rows.filter(r => normalizeLoose(`${r.party_name || ""} ${r.voucher_no || ""} ${r.remarks || ""} ${r.reference_type || ""}`).includes(needle));
        }

        const statusFilter = searchStatus.value.trim();
        if(statusFilter){
            rows = rows.filter(row => {
                const needs = transactionNeedsApproval(row);
                const status = normalizeText(row.approval_status || "approved");
                if(statusFilter === "not_needed") return !needs;
                return needs && status === statusFilter;
            });
        }

        renderTransactions(rows);
    }

    function renderTransactions(rows){
        if(!rows.length){
            resultsBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#64748b;">No transactions found</td></tr>`;
            return;
        }

        resultsBody.innerHTML = rows.map(row => {
            const needsApproval = transactionNeedsApproval(row);
            const salesOrderAdvance = isSalesOrderAdvance(row);
            const properAdvance = isProperSalesOrderAdvance(row);
            const approvalStatus = normalizeText(row.approval_status || "approved");

            let approveCell = "";

            if(needsApproval){
                if(approvalStatus === "approved" && (!salesOrderAdvance || properAdvance)){
                    approveCell = `<span class="status-badge status-approved">Approved</span>`;
                }else if(approvalStatus === "approved" && salesOrderAdvance && !properAdvance){
                    approveCell = `<div class="action-stack"><button class="fix-btn" onclick="fixAndApproveSalesOrderAdvance(${row.id})">Fix Advance</button><span class="status-badge status-approved">Approved</span></div>`;
                }else if(approvalStatus === "rejected"){
                    approveCell = `<div class="action-stack"><button class="accept-btn" onclick="approveTransaction(${row.id})">Approve Again</button></div>`;
                }else{
                    approveCell = `<div class="action-stack"><button class="accept-btn" onclick="approveTransaction(${row.id})">Accept</button><button class="reject-btn" onclick="rejectTransaction(${row.id})">Reject</button></div>`;
                }
            }else{
                approveCell = `<span class="status-badge status-info">Not Needed</span>`;
            }

            const typeNote = salesOrderAdvance ? `<span class="type-note">Sales Order Advance</span>` : "";
            const linkedBill = salesOrderAdvance
                ? `SO-${escapeHtml(String(row.reference_id || parseSalesOrderAdvanceRefId(row) || "-"))}`
                : "-";

            const rowClass = needsApproval && approvalStatus !== "approved" ? "need-approval" : (approvalStatus === "approved" ? "approved-row" : "");

            return `
                <tr class="${rowClass}">
                    <td>${formatDate(row.txn_date)}</td>
                    <td>${escapeHtml(row.voucher_no || "")}</td>
                    <td><span class="${escapeHtml(normalizeText(row.txn_type || ""))}">${escapeHtml(row.txn_type || "")}</span>${typeNote}</td>
                    <td>${escapeHtml(row.party_name || "")}</td>
                    <td>${linkedBill}</td>
                    <td class="amount">${Number(row.amount || 0).toFixed(2)}</td>
                    <td>${escapeHtml(row.remarks || "")}</td>
                    <td>${approveCell}</td>
                </tr>
            `;
        }).join("");
    }

    async function getTransactionById(id){
        const { data, error } = await sb
            .from("cash_transactions")
            .select("id,voucher_no,txn_date,txn_type,party_name,amount,remarks,approval_status,approved_by,approved_at,approval_note,reference_id,reference_type")
            .eq("id", id)
            .maybeSingle();
        if(error) throw error;
        return data;
    }

    async function updateApproval(id, status, note = null){
        const txn = await getTransactionById(id);
        if(!txn) throw new Error("Transaction not found");

        const payload = {
            approval_status: status,
            approved_by: status === "approved" ? getLoggedUserName() : null,
            approved_at: status === "approved" ? getCurrentIsoTime() : null,
            approval_note: note
        };

        if(isSalesOrderAdvance(txn)){
            payload.reference_type = "sales_order_advance";
            const refId = parseSalesOrderAdvanceRefId(txn);
            if(refId) payload.reference_id = refId;
        }

        const { error } = await sb
            .from("cash_transactions")
            .update(payload)
            .eq("id", id);

        if(error) throw error;
    }

    async function approveTransaction(id){
        if(isApproving) return;
        isApproving = true;
        try{
            await updateApproval(id, "approved", null);
            await loadTransactions();
        }catch(err){
            console.error(err);
            alert("Approval failed: " + (err.message || "Unknown error"));
        }finally{
            isApproving = false;
        }
    }

    async function rejectTransaction(id){
        if(isApproving) return;
        const note = prompt("Reject reason / note:", "");
        if(note === null) return;
        isApproving = true;
        try{
            await updateApproval(id, "rejected", note || "Rejected");
            await loadTransactions();
        }catch(err){
            console.error(err);
            alert("Reject failed: " + (err.message || "Unknown error"));
        }finally{
            isApproving = false;
        }
    }

    async function fixAndApproveSalesOrderAdvance(id){
        if(isApproving) return;
        isApproving = true;
        try{
            await updateApproval(id, "approved", null);
            await loadTransactions();
        }catch(err){
            console.error(err);
            alert("Fix failed: " + (err.message || "Unknown error"));
        }finally{
            isApproving = false;
        }
    }

    function setupEnterNavigation(){
        const order = [txnType, txnDate, amount, partyName, remarks, saveBtn];
        order.forEach((el, idx) => {
            el.addEventListener("keydown", (e) => {
                if(e.key === "Enter" && el.tagName !== "TEXTAREA"){
                    e.preventDefault();
                    const next = order[idx + 1];
                    if(next) next.focus();
                    else saveBtn.click();
                }
            });
        });

        remarks.addEventListener("keydown", (e) => {
            if(e.key === "Enter" && e.ctrlKey){
                e.preventDefault();
                saveBtn.click();
            }
        });
    }

    window.approveTransaction = approveTransaction;
    window.rejectTransaction = rejectTransaction;
    window.fixAndApproveSalesOrderAdvance = fixAndApproveSalesOrderAdvance;
</script>
</body>
</html>
