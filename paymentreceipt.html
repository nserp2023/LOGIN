<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment / Receipt - VAJRA LIGHTS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
  <script src="page_permissions.js"></script>

<style>
    :root{
        --primary:#2563eb;
        --success:#059669;
        --danger:#dc2626;
        --bg:#f1f5f9;
        --card:#ffffff;
        --text:#1e293b;
        --muted:#64748b;
        --border:#cbd5e1;
        --hover:#eff6ff;
        --shadow:0 10px 25px rgba(0,0,0,0.08);
        --radius:14px;
    }

    *{ box-sizing:border-box; }

    body{
        margin:0;
        font-family:Segoe UI, Roboto, Arial, sans-serif;
        background:burlywood;
        color:var(--text);
        padding:14px;
    }

    .container{
        max-width:1000px;
        margin:auto;
    }

    .card{
        background:var(--card);
        border:1px solid var(--border);
        border-radius:var(--radius);
        box-shadow:var(--shadow);
        padding:16px;
        margin-bottom:16px;
    }

    h1,h2{
        margin:0 0 12px;
    }

    .title-row{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
    }

    .grid{
        display:grid;
        grid-template-columns:repeat(4, 1fr);
        gap:12px;
    }

    .field{
        display:flex;
        flex-direction:column;
        gap:6px;
        position:relative;
    }

    .field.full{
        grid-column:1 / -1;
    }

    label{
        font-size:13px;
        font-weight:600;
        color:var(--muted);
    }

    input, select, textarea, button{
        width:100%;
        min-height:44px;
        border:1px solid var(--border);
        border-radius:10px;
        padding:10px 12px;
        font-size:15px;
        outline:none;
        background:#fff;
    }

    input:focus, select:focus, textarea:focus{
        border-color:var(--primary);
        box-shadow:0 0 0 3px rgba(37,99,235,0.12);
    }

    textarea{
        min-height:90px;
        resize:vertical;
    }

    .btn-row{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        margin-top:12px;
    }

    button{
        cursor:pointer;
        border:none;
        font-weight:700;
    }

    .btn-primary{
        background:var(--primary);
        color:#fff;
    }

    .btn-secondary{
        background:#e2e8f0;
        color:#0f172a;
    }

    .badge{
        background:#dbeafe;
        color:#1d4ed8;
        padding:8px 12px;
        border-radius:999px;
        font-size:13px;
        font-weight:700;
    }

    .autocomplete-list{
        position:absolute;
        top:100%;
        left:0;
        right:0;
        background:#fff;
        border:1px solid var(--border);
        border-radius:10px;
        margin-top:4px;
        box-shadow:var(--shadow);
        max-height:220px;
        overflow:auto;
        z-index:50;
        display:none;
    }

    .autocomplete-item{
        padding:10px 12px;
        cursor:pointer;
        border-bottom:1px solid #f1f5f9;
    }

    .autocomplete-item:last-child{
        border-bottom:none;
    }

    .autocomplete-item.active,
    .autocomplete-item:hover{
        background:var(--hover);
    }

    .search-box{
        display:grid;
        grid-template-columns:2fr 1fr 1fr auto;
        gap:10px;
        align-items:end;
    }

    .table-wrap{
        overflow:auto;
        border:1px solid var(--border);
        border-radius:12px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        min-width:720px;
        background:#fff;
    }

    th, td{
        padding:12px 10px;
        border-bottom:1px solid #e2e8f0;
        text-align:left;
        font-size:14px;
    }

    th{
        background:#f8fafc;
        position:sticky;
        top:0;
        z-index:1;
    }

    .amount{
        text-align:right;
        font-weight:700;
    }

    .payment{
        color:var(--danger);
        font-weight:700;
        text-transform:capitalize;
    }

    .receipt{
        color:var(--success);
        font-weight:700;
        text-transform:capitalize;
    }

    .small{
        font-size:12px;
        color:var(--muted);
    }

    .message{
        margin-top:10px;
        font-weight:700;
    }

    .success-msg{ color:var(--success); }
    .error-msg{ color:var(--danger); }

    @media (max-width: 900px){
        .grid{
            grid-template-columns:repeat(2, 1fr);
        }

        .search-box{
            grid-template-columns:1fr 1fr;
        }
    }

    @media (max-width: 600px){
        body{
            padding:10px;
        }

        .card{
            padding:12px;
        }

        .grid{
            grid-template-columns:1fr;
        }

        .search-box{
            grid-template-columns:1fr;
        }

        input, select, textarea, button{
            font-size:16px;
        }
    }
.accept-btn{
    background:#16a34a;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
}

.accept-btn:hover{
    opacity:0.95;
}

.accept-btn:disabled{
    background:#94a3b8;
    cursor:not-allowed;
}

.status-badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
}

.status-pending{
    background:#fef3c7;
    color:#92400e;
}

.status-approved{
    background:#dcfce7;
    color:#166534;
}

.status-rejected{
    background:#fee2e2;
    color:#991b1b;
}

</style>
</head>
<body>
<div class="container">

    <div class="card">
        <div class="title-row">
            <h1>Payment / Receipt Entry</h1>
            <div class="badge" id="modeBadge">Payment Mode</div>
        </div>

        <div class="grid">
            <div class="field">
                <label for="txnType">Type</label>
                <select id="txnType" name="txnType">
                    <option value="payment">Payment</option>
                    <option value="receipt">Receipt</option>
                </select>
            </div>

            <div class="field">
                <label for="txnDate">Date</label>
                <input type="date" id="txnDate" name="txnDate" />
            </div>

            <div class="field">
                <label for="voucherNo">Voucher Number</label>
                <input type="text" id="voucherNo" name="voucherNo" readonly />
            </div>

            <div class="field">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="Enter amount" />
            </div>

            <div class="field full" id="partyFieldWrap">
                <label for="partyName" id="partyLabel">Paid To</label>
                <input type="text" id="partyName" name="partyName" autocomplete="off" placeholder="Type name..." />
                <div id="partySuggestions" class="autocomplete-list"></div>
                <div class="small">Saved names will appear automatically. Use Arrow keys + Enter.</div>
            </div>

            <div class="field full">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" name="remarks" placeholder="Optional remarks"></textarea>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-primary" id="saveBtn">Save Entry</button>
            <button class="btn-secondary" id="clearBtn" type="button">Clear</button>
        </div>

        <div id="formMessage" class="message"></div>
    </div>

    <div class="card">
        <h2>Search Transaction Details</h2>

        <div class="search-box">
            <div class="field">
                <label for="searchParty">Name Search</label>
                <input type="text" id="searchParty" name="searchParty" placeholder="Search by party name..." />
            </div>

            <div class="field">
                <label for="searchType">Type</label>
                <select id="searchType" name="searchType">
                    <option value="">All</option>
                    <option value="payment">Payment</option>
                    <option value="receipt">Receipt</option>
                </select>
            </div>

            <div class="field">
                <label for="searchDate">Date</label>
                <input type="date" id="searchDate" name="searchDate" />
            </div>

            <div class="field">
                <button class="btn-primary" id="searchBtn" type="button">Search</button>
            </div>
        </div>

        <div style="margin-top:14px;" class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Voucher No</th>
                        <th>Type</th>
                        <th>Party</th>
                        <th class="amount">Amount</th>
                        <th>Remarks</th>
                        <th>Approve</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="7" style="text-align:center; color:#64748b;">No transactions found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // =========================
    // 1. SUPABASE CONNECTION
    // =========================
    const sb = window.sbcc; // supabase client from supabaseClient.js
  document.addEventListener("DOMContentLoaded", async () => {
  const ok = await requirePageAccess("paymentreceipt");
  if (!ok) return;
  });

    // =========================
    // 2. ELEMENTS
    // =========================
    const txnType = document.getElementById("txnType");
    const txnDate = document.getElementById("txnDate");
    const voucherNo = document.getElementById("voucherNo");
    const amount = document.getElementById("amount");
    const partyName = document.getElementById("partyName");
    const remarks = document.getElementById("remarks");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const partyLabel = document.getElementById("partyLabel");
    const modeBadge = document.getElementById("modeBadge");
    const formMessage = document.getElementById("formMessage");
    const partySuggestions = document.getElementById("partySuggestions");

    const searchParty = document.getElementById("searchParty");
    const searchType = document.getElementById("searchType");
    const searchDate = document.getElementById("searchDate");
    const searchBtn = document.getElementById("searchBtn");
    const resultsBody = document.getElementById("resultsBody");

    let suggestionItems = [];
    let activeSuggestionIndex = -1;
    let isSaving = false;

    // =========================
    // 3. INITIAL LOAD
    // =========================
    window.onload = async function(){
        txnDate.value = new Date().toISOString().split("T")[0];
        updateTypeUI();
        await generateNextVoucherNo();
        await loadTransactions();
        setupEnterNavigation();
    };

    // =========================
    // 4. TYPE UI
    // =========================
    txnType.addEventListener("change", async () => {
        updateTypeUI();
        await generateNextVoucherNo();
    });

    function updateTypeUI(){
        if(txnType.value === "payment"){
            partyLabel.textContent = "Paid To";
            modeBadge.textContent = "Payment Mode";
        }else{
            partyLabel.textContent = "Received From";
            modeBadge.textContent = "Receipt Mode";
        }
    }

    // =========================
    // 5. NEXT VOUCHER NUMBER
    // =========================
    async function generateNextVoucherNo(){
        const prefix = txnType.value === "payment" ? "PAY" : "REC";

        const { data, error } = await sb
            .from("cash_transactions")
            .select("voucher_no")
            .eq("txn_type", txnType.value)
            .order("id", { ascending: false })
            .limit(1);

        if(error){
            console.error(error);
            voucherNo.value = `${prefix}-0001`;
            return;
        }

        let nextNumber = 1;

        if(data && data.length){
            const lastVoucher = data[0].voucher_no || "";
            const match = lastVoucher.match(/(\d+)$/);
            if(match){
                nextNumber = parseInt(match[1], 10) + 1;
            }
        }

        voucherNo.value = `${prefix}-${String(nextNumber).padStart(4, "0")}`;
    }

    // =========================
    // 6. PARTY AUTOCOMPLETE
    // =========================
    partyName.addEventListener("input", async function(){
        activeSuggestionIndex = -1;
        const q = partyName.value.trim();

        if(!q){
            hideSuggestions();
            await loadTransactions();
            return;
        }

        await showPartySuggestions(q);
        await loadTransactions(q);
    });

    partyName.addEventListener("keydown", function(e){
        const items = partySuggestions.querySelectorAll(".autocomplete-item");

        if(partySuggestions.style.display === "block" && items.length){
            if(e.key === "ArrowDown"){
                e.preventDefault();
                activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, items.length - 1);
                highlightSuggestion(items);
                return;
            }

            if(e.key === "ArrowUp"){
                e.preventDefault();
                activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
                highlightSuggestion(items);
                return;
            }

            if(e.key === "Enter" && activeSuggestionIndex >= 0){
                e.preventDefault();
                items[activeSuggestionIndex].click();
                return;
            }

            if(e.key === "Escape"){
                hideSuggestions();
            }
        }
    });

    document.addEventListener("click", function(e){
        if(!partySuggestions.contains(e.target) && e.target !== partyName){
            hideSuggestions();
        }
    });

    async function showPartySuggestions(query){
        const { data, error } = await sb
            .from("parties")
            .select("id, party_name")
            .ilike("party_name", `%${query}%`)
            .order("party_name", { ascending: true })
            .limit(8);

        if(error){
            console.error(error);
            hideSuggestions();
            return;
        }

        suggestionItems = data || [];
        renderSuggestions(suggestionItems, query);
    }

    function renderSuggestions(items, query){
        partySuggestions.innerHTML = "";

        if(!items.length){
            hideSuggestions();
            return;
        }

        items.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "autocomplete-item";
            div.dataset.index = index;

            const safeName = item.party_name;
            const regex = new RegExp(`(${escapeRegExp(query)})`, "ig");
            div.innerHTML = safeName.replace(regex, "<strong>$1</strong>");

            div.addEventListener("click", async () => {
                partyName.value = item.party_name;
                hideSuggestions();
                amount.focus();
                await loadTransactions(item.party_name);
            });

            partySuggestions.appendChild(div);
        });

        partySuggestions.style.display = "block";
    }

    function highlightSuggestion(items){
        items.forEach(item => item.classList.remove("active"));
        if(items[activeSuggestionIndex]){
            items[activeSuggestionIndex].classList.add("active");
            items[activeSuggestionIndex].scrollIntoView({ block: "nearest" });
        }
    }

    function hideSuggestions(){
        partySuggestions.style.display = "none";
        partySuggestions.innerHTML = "";
        activeSuggestionIndex = -1;
    }

    function escapeRegExp(string){
        return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    // =========================
    // 7. SAVE PARTY IF NEW
    // =========================
    async function ensurePartyExists(name){
        const cleanName = name.trim();
        if(!cleanName) return null;

        const { data: existing } = await sb
            .from("parties")
            .select("id, party_name")
            .eq("party_name", cleanName)
            .maybeSingle();

        if(existing) return existing.id;

        const { data, error } = await sb
            .from("parties")
            .insert([{ party_name: cleanName }])
            .select("id")
            .single();

        if(error){
            console.error("Party save error:", error);
            return null;
        }

        return data.id;
    }

    // =========================
    // 8. SAVE TRANSACTION
    // =========================
    saveBtn.addEventListener("click", saveTransaction);

    async function saveTransaction(){
        if(isSaving) return;

        const type = txnType.value;
        const date = txnDate.value;
        const voucher = voucherNo.value.trim();
        const party = partyName.value.trim();
        const amt = parseFloat(amount.value || 0);
        const note = remarks.value.trim();

        if(!date){
            showMessage("Please select date", false);
            txnDate.focus();
            return;
        }

        if(!voucher){
            showMessage("Voucher number missing", false);
            return;
        }

        if(!party){
            showMessage(`Please enter ${type === "payment" ? "Paid To" : "Received From"} name`, false);
            partyName.focus();
            return;
        }

        if(!amt || amt <= 0){
            showMessage("Please enter valid amount", false);
            amount.focus();
            return;
        }

        isSaving = true;
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving...";

        try{
            const partyId = await ensurePartyExists(party);

            const { error } = await sb
    .from("cash_transactions")
    .insert([{
        voucher_no: voucher,
        txn_date: date,
        txn_type: type,
        party_id: partyId,
        party_name: party,
        amount: amt,
        remarks: note || null,
        approval_status: type === "receipt" ? "approved" : "pending"
    }]);

            if(error) throw error;

            showMessage("Transaction saved successfully", true);
            await loadTransactions(party);
            clearForm(false);
            await generateNextVoucherNo();
            partyName.focus();

        }catch(err){
            console.error(err);
            showMessage(err.message || "Failed to save transaction", false);
        }finally{
            isSaving = false;
            saveBtn.disabled = false;
            saveBtn.textContent = "Save Entry";
        }
    }

    // =========================
    // 9. CLEAR FORM
    // =========================
    clearBtn.addEventListener("click", () => clearForm(true));

    function clearForm(withVoucherRefresh = true){
        txnDate.value = new Date().toISOString().split("T")[0];
        partyName.value = "";
        amount.value = "";
        remarks.value = "";
        hideSuggestions();
        formMessage.textContent = "";

        if(withVoucherRefresh){
            generateNextVoucherNo();
        }
    }

    function showMessage(msg, ok){
        formMessage.textContent = msg;
        formMessage.className = "message " + (ok ? "success-msg" : "error-msg");
    }

    // =========================
    // 10. LOAD TRANSACTIONS
    // =========================
    searchBtn.addEventListener("click", () => {
        loadTransactions(searchParty.value.trim());
    });

    searchParty.addEventListener("input", () => {
        loadTransactions(searchParty.value.trim());
    });

    searchType.addEventListener("change", () => {
        loadTransactions(searchParty.value.trim());
    });

    searchDate.addEventListener("change", () => {
        loadTransactions(searchParty.value.trim());
    });

    async function loadTransactions(nameFilter = ""){
        let query = sb
            .from("cash_transactions")
            .select("id, txn_date, voucher_no, txn_type, party_name, amount, remarks, approval_status, approved_by, approved_at")
            .order("txn_date", { ascending: false })
            .order("id", { ascending: false })
            .limit(100);

        const partySearchValue = (nameFilter || searchParty.value || "").trim();
        const typeValue = searchType.value;
        const dateValue = searchDate.value;

        if(partySearchValue){
            query = query.ilike("party_name", `%${partySearchValue}%`);
        }

        if(typeValue){
            query = query.eq("txn_type", typeValue);
        }

        if(dateValue){
            query = query.eq("txn_date", dateValue);
        }

        const { data, error } = await query;

        if(error){
            console.error(error);
            resultsBody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align:center; color:red;">Failed to load transactions</td>
                </tr>
            `;
            return;
        }

        renderTransactions(data || []);
    }

function renderTransactions(rows){
    if(!rows.length){
        resultsBody.innerHTML = `
            <tr>
                <td colspan="7" style="text-align:center; color:#64748b;">No transactions found</td>
            </tr>
        `;
        return;
    }

    const role = (localStorage.getItem("role") || "staff").toLowerCase();
    const canApprove = ["manager", "admin", "owner"].includes(role);

    resultsBody.innerHTML = rows.map(row => {
        let approveCell = "-";

        if(row.txn_type === "payment"){
            if(row.approval_status === "approved"){
                approveCell = `<span class="status-badge status-approved">Approved</span>`;
            } else if(row.approval_status === "rejected"){
                approveCell = `<span class="status-badge status-rejected">Rejected</span>`;
            } else if(canApprove){
                approveCell = `<button class="accept-btn" onclick="approvePayment(${row.id})">Accept</button>`;
            } else {
                approveCell = `<span class="status-badge status-pending">Pending</span>`;
            }
        } else {
            approveCell = `<span class="status-badge status-approved">Not Needed</span>`;
        }

        return `
            <tr>
                <td>${formatDate(row.txn_date)}</td>
                <td>${row.voucher_no}</td>
                <td><span class="${row.txn_type}">${row.txn_type}</span></td>
                <td>${escapeHtml(row.party_name || "")}</td>
                <td class="amount">${Number(row.amount).toFixed(2)}</td>
                <td>${escapeHtml(row.remarks || "")}</td>
                <td>${approveCell}</td>
            </tr>
        `;
    }).join("");
}
    function formatDate(dateStr){
        if(!dateStr) return "";
        const d = new Date(dateStr);
        if(isNaN(d)) return dateStr;
        return d.toLocaleDateString("en-GB");
    }

    function escapeHtml(text){
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

async function approvePayment(id) {
    const role = (localStorage.getItem("role") || "staff").toLowerCase();
    const username = localStorage.getItem("username") || "Unknown";

    if (!["admin", "manager", "owner"].includes(role)) {
        alert("Only admin or manager can approve payment.");
        return;
    }

    const ok = confirm("Do you want to approve this payment?");
    if (!ok) return;

    const { error } = await sb
        .from("cash_transactions")
        .update({
            approval_status: "approved",
            approved_by: username,
            approved_at: new Date().toISOString()
        })
        .eq("id", id)
        .eq("txn_type", "payment");

    if (error) {
        alert("Approval failed: " + error.message);
        return;
    }

    alert("Payment approved successfully");
    await loadTransactions(searchParty.value.trim());
}
    // =========================
    // 11. ENTER KEY NAVIGATION
    // =========================
    function setupEnterNavigation(){
        const orderedFields = [
            txnType,
            txnDate,
            partyName,
            amount,
            remarks,
            saveBtn
        ];

        orderedFields.forEach((field, index) => {
            field.addEventListener("keydown", function(e){
                if(e.key !== "Enter") return;

                // allow dropdown selection first
                if(field === partyName && partySuggestions.style.display === "block"){
                    const items = partySuggestions.querySelectorAll(".autocomplete-item");
                    if(items.length && activeSuggestionIndex >= 0){
                        e.preventDefault();
                        items[activeSuggestionIndex].click();
                        return;
                    }
                }

                // textarea: Enter should move, not create new line
                if(field === remarks || field.tagName === "INPUT" || field.tagName === "SELECT" || field.tagName === "BUTTON"){
                    e.preventDefault();
                    const next = orderedFields[index + 1];
                    if(next){
                        next.focus();
                        if(next.select) next.select();
                    }else{
                        saveTransaction();
                    }
                }
            });
        });
    }

    
</script>
</body>
</html>
