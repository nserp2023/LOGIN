<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.ico" type="image/x-icon">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="manifest" href="site.webmanifest">
<title>GST Invoice</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
width:900px;
margin:auto;
font-size:12px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
border:1px solid #000;
padding:10px;
border-bottom:none;
}

.header-left h1{
margin:0;
}

.header-right{

font-weight:bold;
}

.invoice-title{
background:#d9d9d9;
text-align:center;
font-weight:bold;
font-size:18px;

}

.bill-info{

/* PAGE */

/* TABLE */

th,td{

}

.right{text-align:right;}

}

/* BOTTOM SECTION */

.bottom-section{

border-bottom:1px solid #000;   /* ADD THIS */
display:flex;
align-items:stretch;
}
.qr{
width:18%;
border-left:1px solid #000;   /* ADD THIS */
border-right:1px solid #000;
text-align:center;
padding:5px;
}
.qr img{
width:110px;
}

.bank{
width:50%;
padding:6px;
font-size:11px;
}

.summary{
width:32%;
height:100%;
}

.summary td{
border:1px solid #000;
padding:4px;
}

.summary tr:last-child td{
font-weight:bold;
font-size:20px;     /* Bigger text */
border-top:3px solid #000;
padding:8px;        /* More space */
background:#f2f2f2; /* Light highlight */
}
/* GST TABLE */

.gst-summary{
width:100%;
margin-bottom:5px;
}

.gst-summary th,
.gst-summary td{
border:1px solid #000;
font-size:10px;
padding:3px;
}

/* FOOT NOTE */

.note{
font-size:10px;
text-align:center;
padding:3px;
}

/* PRINT */

@media print{

body{margin:0;}

.page{
page-break-after:always;
}

thead{
display:table-header-group;
}

.consignee-name{
  font-weight: bold;
  font-size: 14px;
}

.consignee-details{
  font-weight: bold;
  font-size: 12px;
}

.gst-col {
  width: 35px;       /* adjust 40–55 as you like */
  min-width: 30px;
  max-width: 45px;
  text-align: center;
  padding: 2px;
}

}
.summary td{
border:1px solid #000;
padding:4px;
height:22px;   /* ADD THIS */
width: 40%;   /* ADD THIS */
}
.summary{
width:32%;
height:100%;
}
.summary-box{
width:32%;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.summary-note{
font-size:10px;
text-align:center;
padding:5px;
}
</style>

</head>

<body>

<div id="pages"></div>

<script>

    const sb = window.sbcc; // supabase client from supabaseClient.js

const params=new URLSearchParams(window.location.search);
const id=params.get("id");
const type=params.get("type") || "sales";


function escapeHtml(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function firstNonEmpty(...values){
    for(const value of values){
        if(value === null || value === undefined) continue;
        const text = String(value).trim();
        if(text) return text;
    }
    return "";
}

function formatAddress(value){
    return escapeHtml(value).replace(/\n/g, "<br>");
}

function getDocAddress(head, linkedHead = null, customerHead = null){
    return firstNonEmpty(
        head?.address,
        head?.customer_address,
        head?.consignee_address,
        head?.billing_address,
        head?.delivery_address,
        head?.supplier_address,
        linkedHead?.address,
        linkedHead?.customer_address,
        linkedHead?.consignee_address,
        linkedHead?.billing_address,
        linkedHead?.delivery_address,
        customerHead?.address,
        customerHead?.customer_address
    );
}

function getCustomerName(head, linkedHead = null, customerHead = null){
    return firstNonEmpty(
        head?.customer_name,
        head?.name,
        head?.party_name,
        head?.consignee_name,
        head?.supplier_name,
        linkedHead?.customer_name,
        linkedHead?.name,
        linkedHead?.party_name,
        linkedHead?.consignee_name,
        customerHead?.name,
        customerHead?.customer_name
    );
}

function getCustomerMobile(head, linkedHead = null, customerHead = null){
    return firstNonEmpty(
        head?.customer_mobile,
        head?.mobile,
        head?.phone,
        head?.customer_phone,
        head?.party_mobile,
        head?.supplier_mobile,
        linkedHead?.customer_mobile,
        linkedHead?.mobile,
        linkedHead?.phone,
        linkedHead?.customer_phone,
        customerHead?.mobile,
        customerHead?.customer_mobile
    );
}

function getGstNumber(head, linkedHead = null, customerHead = null){
    return firstNonEmpty(
        head?.gst_number,
        head?.customer_gst,
        head?.gst_no,
        head?.gstin,
        head?.supplier_gst,
        linkedHead?.gst_number,
        linkedHead?.customer_gst,
        linkedHead?.gst_no,
        linkedHead?.gstin,
        customerHead?.gst_number,
        customerHead?.customer_gst,
        customerHead?.gst_no,
        customerHead?.gstin
    );
}

function getSalesman(head){
    return firstNonEmpty(head.salesman, head.sales_man, head.created_by);
}

function normalizeText(value){
    return String(value ?? "").trim().toUpperCase();
}

function getCompanyProfile(isInterlockBill){
    if(isInterlockBill){
        return {
            name: "SN INDUSTRIES",
            ho: "(H.O: SN.TRADERS, KATTAKADA, TRIVANDRUM-72)",
            email: "vajralightsandelectricals.sha@gmail.com",
            address: "KAITHAKONAM, KATTAKADA, TRIVANDRUM-72",
            phone: "8606808063,9495160771",
            state: "KERALA[32]",
            gstin: "32APBPN5593H1ZT",
            upiName: "SN Industries"
        };
    }

    return {
        name: "VAJRA LIGHTS & ELECTRICALS",
        ho: "(H.O: SN.TRADERS, KATTAKADA, TRIVANDRUM-72)",
        email: "vajralightsandelectricals.sha@gmail.com",
        address: "KAITHAKONAM, KATTAKADA, TRIVANDRUM-72",
        phone: "8606808063,9495160771",
        state: "KERALA[32]",
        gstin: "32APBPN5593H1ZT",
        upiName: "Vajra Lights"
    };
}

async function detectInterlockBill(head, linkedHead, items){
    const headerDepartment = firstNonEmpty(
        head?.department,
        head?.department_filter,
        head?.item_department,
        linkedHead?.department,
        linkedHead?.department_filter,
        linkedHead?.item_department
    );

    if(normalizeText(headerDepartment) === "INTERLOCK") return true;

    const itemHasInterlock = (items || []).some(item =>
        normalizeText(firstNonEmpty(item?.department, item?.item_department, item?.department_filter)) === "INTERLOCK"
    );
    if(itemHasInterlock) return true;

    const codes = [...new Set((items || [])
        .map(item => String(item?.item_code || "").trim())
        .filter(Boolean))];

    if(!codes.length) return false;

    try{
        const { data, error } = await sb
            .from("stock_items")
            .select("item_code,department")
            .in("item_code", codes);

        if(error){
            console.warn("Interlock department check failed:", error);
            return false;
        }

        return (data || []).some(row => normalizeText(row.department) === "INTERLOCK");
    }catch(err){
        console.warn("Interlock department check failed:", err);
        return false;
    }
}

async function loadData(){

/* HEADER */

let headerTable;

if(type==="quotation")
headerTable="quotation_details";

else if(type==="sales_order")
headerTable="sales_order_details";

else if(type==="sales_pack")
headerTable="sales_packing_details";   // ✅ FIX

else if(type==="packing")
headerTable="sales_details";

else
headerTable="sales_details";

const { data: head, error: headError } = await sb
.from(headerTable)
.select("*")
.eq("id", id)
.maybeSingle();

if (headError || !head) {
    document.body.innerHTML = "<h2>❌ Document not found</h2>";
    return;
}

// SALES PACK TABLE HAS NO ADDRESS COLUMN.
// So for sales_pack, take address/mobile/GST fallback from linked sales_details using sales_packing_details.sales_id.
let linkedSalesHead = null;
let customerHead = null;

if(type === "sales_pack" && head.sales_id){
    // IMPORTANT: use select("*") because some sales_details tables have only address,
    // not customer_address. Selecting a missing column makes Supabase return 400.
    const { data: linkedData, error: linkedError } = await sb
        .from("sales_details")
        .select("*")
        .eq("id", head.sales_id)
        .maybeSingle();

    if(linkedError){
        console.warn("Sales pack linked sales address fetch failed:", linkedError);
    }

    linkedSalesHead = linkedData || null;
}

// Final fallback: if sales_pack was created without sales_id or old linked bill has no address,
// read address from customers table using mobile number. This keeps old Sales + Packing bills printable.
const fallbackMobile = getCustomerMobile(head, linkedSalesHead);
if(fallbackMobile){
    const cleanMobile = String(fallbackMobile).replace(/\D/g, "");
    let customerQuery = sb.from("customers").select("*");

    if(cleanMobile){
        customerQuery = customerQuery.or(`mobile.eq.${cleanMobile},mobile.ilike.%${cleanMobile}%`);
    }else{
        customerQuery = customerQuery.eq("mobile", fallbackMobile);
    }

    const { data: customerRows, error: customerError } = await customerQuery
        .order("customer_id", { ascending:false })
        .limit(1);

    if(customerError){
        console.warn("Customer address fallback fetch failed:", customerError);
    }

    customerHead = (customerRows && customerRows[0]) ? customerRows[0] : null;
}


/* ITEMS */

let itemTable;
let idField;

if(type==="quotation"){
    itemTable="quotation_item_details";
    idField="quotation_id";
}
else if(type==="sales_order"){
    itemTable="sales_order_item_details";
    idField="sales_order_id";
}
else if(type==="packing"){
    itemTable="sales_item_details";
    idField="sales_id";
}
else if(type==="sales_pack"){
    itemTable="sales_packing_item_details";
    idField="packing_id";
}
else {   // ✅ THIS FIX
    itemTable="sales_item_details";
    idField="sales_id";
}

const { data: items, error: itemError } = await sb
.from(itemTable)
.select("*")
.eq(idField, id);

if (itemError || !items) {
    document.body.innerHTML = "<h2>❌ Items not found</h2>";
    console.error(itemError);
    return;
}

const isInterlockBill = await detectInterlockBill(head, linkedSalesHead, items);
const company = getCompanyProfile(isInterlockBill);

let rowsPerPage = items.length<=10 ? 10 : 40;
let pageClass = items.length<=10 ? "page-half":"page-full";

let pages=Math.ceil(items.length/rowsPerPage);


let container=document.getElementById("pages");

/* TOTALS */

let totalTaxable=0;
let totalGst=0;
let gstMap={};
let titleText =
type==="quotation" ? "QUOTATION" :
type==="sales_order" ? "SALES ORDER" :
type==="packing" ? "PACKING SLIP" :
"GST INVOICE";

for(let p=0;p<pages;p++){

let start=p*rowsPerPage;
let pageItems=items.slice(start,start+rowsPerPage);

let html=`<div class="page ${pageClass}">

<div class="header">

<div class="header-left">
<h1>${escapeHtml(company.name)}</h1>
${escapeHtml(company.ho)}<br>
Email: ${escapeHtml(company.email)}<br>
${escapeHtml(company.address)}<br>
PH: ${escapeHtml(company.phone)}
</div>

<div class="header-right">
STATE: ${escapeHtml(company.state)}<br>
GSTIN: ${escapeHtml(company.gstin)}
</div>

</div>

<div class="invoice-title">${titleText}</div>

<div class="bill-info">

<div class="consignee">
<b>Consignee</b><br>
<span class="consignee-name">${escapeHtml(getCustomerName(head, linkedSalesHead, customerHead))}</span><br>
<span class="consignee-details">${formatAddress(getDocAddress(head, linkedSalesHead, customerHead))}</span><br>
<span class="consignee-details">GSTIN: ${escapeHtml(getGstNumber(head, linkedSalesHead, customerHead) || "NA")}</span><br>
<span class="consignee-details">Mobile: ${escapeHtml(getCustomerMobile(head, linkedSalesHead, customerHead) || "NA")}</span>
</div>

<div class="right">

${type==="packing" ? "" :
`Bill No : ${(head.series_code || "") + "-" + (type === "sales_pack"
    ? head.packing_number
    : head.sales_number || head.quotation_number || head.order_number || head.id)}<br>`}

Date : ${(
    head.bill_date || 
    head.quotation_date || 
    head.order_date ||
    head.packing_date ||
    head.created_at || ""
).split("T")[0]}<br>
S.Man : ${escapeHtml(getSalesman(head))}<br>
Page : ${p+1} / ${pages}

</div>

</div>
<div class="items-area">

<table>

<thead>
<tr>
<th>No</th>
<th>Code</th>
<th class="left">Item</th>
<th>HSN</th>
<th>Qty</th>
<th>Price</th>
<th class="gst-col">GST%</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="itemsBody">`;

let row=1;

pageItems.forEach(item=>{

let qty = parseFloat(item.quantity) || 0;
let gstPercent = parseFloat(item.gst_percent) || 0;
let discountPercent = parseFloat(item.discount_percent) || 0;

// base price before discount and before GST
let basePrice = parseFloat(item.price);
if (isNaN(basePrice)) {
  basePrice = parseFloat(item.sales_price);
}
if (isNaN(basePrice)) {
  let spGst = parseFloat(item.sales_price_gst) || 0;
  basePrice = spGst / (1 + gstPercent / 100);
}

// row price after discount, before GST
let displayPrice = basePrice - (basePrice * discountPercent / 100);

// row amount after discount, before GST
let amount = qty * displayPrice;

// GST on discounted taxable value
let gst = amount * (gstPercent / 100);

// row total after discount, including GST
let amountGst = amount + gst;

// taxable value should be discounted amount before GST
let taxable = amount;

totalTaxable += taxable;
totalGst += gst;

if (!gstMap[gstPercent]) {
  gstMap[gstPercent] = { taxable: 0, gst: 0 };
}

gstMap[gstPercent].taxable += taxable;
gstMap[gstPercent].gst += gst;

html+=`
<tr>
<td>${row}</td>
<td>${item.item_code||""}</td>
<td class="left">${item.item_name}</td>
<td>${item.hsn_code||""}</td>
<td>${qty}</td>
<td>${displayPrice.toFixed(2)}</td>
<td class="gst-col">${gstPercent}</td>
<td>${amount.toFixed(2)}</td>
</tr>`;

row++;

});

for(let i=pageItems.length;i<rowsPerPage;i++){

html+=`
<tr>
<td>&nbsp;</td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>`;

}

html+=`

</tbody>
</table>

</div>

<div class="bottom-section">

<div class="qr">
Scan to Pay<br>
<img class="qrimg">
</div>

<div class="bank">

<table class="gst-summary">`;

if(p === pages-1){

Object.keys(gstMap).forEach(g=>{

let taxable=gstMap[g].taxable;
let gst=gstMap[g].gst;

html+=`
<tr><td>&nbsp;GST%</td><td>AMOUNT</td><td>CGST</td><td>SGST</td><td>Total</td></tr>

<tr>
<td>${g}%</td>
<td>${taxable.toFixed(2)}</td>
<td>${(gst/2).toFixed(2)}</td>
<td>${(gst/2).toFixed(2)}</td>
<td>${(taxable+gst).toFixed(2)}</td>
</tr>`;

});

}else{

html+=`
<tr><td>&nbsp;GST%</td><td>AMOUNT</td><td>CGST</td><td>SGST</td><td>Total</td></tr>
<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>
<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>
`;

}

html+=`
</table>

A/C No : 15490200002687<br>
IFSC : FDRL0001549
<div class="summary-note">
Goods once sold will not be taken back or exchanged without original bill.<br>
Subject to Trivandrum Jurisdiction.<br>
This is a Computer Generated Invoice and does not require signature.<br>
Thank you for your valueable patronage. Visit Again!

</div>

</div>

<table class="summary">`;
if(p === pages-1){

html+=`
<tr>
<td>Amount</td>
<td>${totalTaxable.toFixed(2)}</td>
</tr>

<tr>
<td>GST</td>
<td>${totalGst.toFixed(2)}</td>
</tr>

<tr>
<td>Round Off</td>
<td>${(Math.round(totalTaxable+totalGst)-(totalTaxable+totalGst)).toFixed(2)}</td>
</tr>

<tr>
<td>Total</td>
<td>${Math.round(totalTaxable+totalGst).toFixed(2)}</td>
</tr>
`;

}else{

html+=`
<tr><td>Amount</td><td></td></tr>
<tr><td>GST</td><td></td></tr>
<tr><td>Round Off</td><td></td></tr>
<tr><td>Total</td><td></td></tr>
`;

}

html+=`

</table>

</div>


</div>`;
container.innerHTML+=html;


}
// ===== ADD PACKING COPY =====

if(type==="sales_pack"){

let originalHTML = container.innerHTML;

// create packing copy
let packingHTML = originalHTML
.replace(/GST INVOICE/g,"PACKING SLIP")
.replace(/Bill No\s*:.*?<br>/g,"");   // remove bill number

container.innerHTML = packingHTML + originalHTML;

}

/* QR */

let grand = Math.round(totalTaxable + totalGst);

let qr = `upi://pay?pa=q137103198@ybl&pn=${encodeURIComponent(company.upiName)}&am=${grand}&cu=INR`;

let qrImgs = document.querySelectorAll(".qrimg");

let loaded = 0;
let printCalled = false;

function printOnce(){
    if(printCalled) return;
    printCalled = true;
    window.print();
}

if(qrImgs.length === 0){
    printOnce();
}

// Even if QR internet image fails, print must still open.
setTimeout(printOnce, 2500);

qrImgs.forEach(img => {

    img.onload = () => {
        loaded++;
        if(loaded === qrImgs.length){
            printOnce();
        }
    };

    img.onerror = () => {
        loaded++;
        if(loaded === qrImgs.length){
            printOnce();
        }
    };

    img.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(qr);

});

}

loadData();

</script>

</body>
</html>
