<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>GST Invoice</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
width:900px;
margin:auto;
font-size:12px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
border:1px solid #000;
padding:10px;
border-bottom:none;
}

.header-left h1{
margin:0;
}

.header-right{
text-align:right;
font-weight:bold;
}

.invoice-title{
background:#d9d9d9;
text-align:center;
font-weight:bold;
font-size:18px;
padding:8px;
border:1px solid #000;
border-top:none;
}

.bill-info{
display:flex;
justify-content:space-between;
border:1px solid #000;
border-top:none;
padding:8px;
}

/* PAGE */

.page{
display:flex;
flex-direction:column;
}

.page-half{ height:520px; }

.page-full{ height:1050px; }


/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #000;
padding:4px;
text-align:center;
}

th{
background:#f2f2f2;
}

.left{text-align:left;}
.right{text-align:right;}

#itemsBody td{
border-top:none;
border-bottom:none;
}

/* BOTTOM SECTION */

.bottom-section{
border-top:1px solid #000;
border-bottom:1px solid #000;   /* ADD THIS */
display:flex;
align-items:stretch;
}
.qr{
width:18%;
border-left:1px solid #000;   /* ADD THIS */
border-right:1px solid #000;
text-align:center;
padding:5px;
}
.qr img{
width:110px;
}

.bank{
width:50%;
padding:6px;
font-size:11px;
}

.summary{
width:32%;
height:100%;
}

.summary td{
border:1px solid #000;
padding:4px;
}

.summary tr:last-child td{
font-weight:bold;
font-size:20px;     /* Bigger text */
border-top:3px solid #000;
padding:8px;        /* More space */
background:#f2f2f2; /* Light highlight */
}
/* GST TABLE */

.gst-summary{
width:100%;
margin-bottom:5px;
}

.gst-summary th,
.gst-summary td{
border:1px solid #000;
font-size:10px;
padding:3px;
}

/* FOOT NOTE */

.note{
font-size:10px;
text-align:center;
padding:3px;
}

/* PRINT */

@media print{

body{margin:0;}

.page{
page-break-after:always;
}

thead{
display:table-header-group;
}

}
.summary td{
border:1px solid #000;
padding:4px;
height:22px;   /* ADD THIS */
width: 40%;   /* ADD THIS */
}
.summary{
width:32%;
height:100%;
}
.summary-box{
width:32%;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.summary-note{
font-size:10px;
text-align:center;
padding:5px;
}
</style>

</head>

<body>

<div id="pages"></div>

<script>

const sb = supabase.createClient(
"https://gqxczzijntbvtlmmzppt.supabase.co",
"sb_publishable_kmh1sok1CWBSBW0kvdla7w_T7kDioRs"
);

const params=new URLSearchParams(window.location.search);
const id=params.get("id");
const type=params.get("type") || "sales";

async function loadData(){

/* HEADER */

let headerTable;

if(type==="quotation")
headerTable="quotation_details";

else if(type==="sales_order")
headerTable="sales_order_details";

else if(type==="sales_pack")
headerTable="sales_packing_details";   // ✅ FIX

else if(type==="packing")
headerTable="sales_details";

else
headerTable="sales_details";

const { data: head, error: headError } = await sb
.from(headerTable)
.select("*")
.eq("id", id)
.maybeSingle();

if (headError || !head) {
    document.body.innerHTML = "<h2>❌ Document not found</h2>";
    return;
}


/* ITEMS */

let itemTable;
let idField;

if(type==="quotation"){
    itemTable="quotation_item_details";
    idField="quotation_id";
}
else if(type==="sales_order"){
    itemTable="sales_order_item_details";
    idField="sales_order_id";
}
else if(type==="packing"){
    itemTable="sales_item_details";
    idField="sales_id";
}
else if(type==="sales_pack"){
    itemTable="sales_packing_item_details";
    idField="packing_id";
}
else {   // ✅ THIS FIX
    itemTable="sales_item_details";
    idField="sales_id";
}

const { data: items, error: itemError } = await sb
.from(itemTable)
.select("*")
.eq(idField, id);

if (itemError || !items) {
    document.body.innerHTML = "<h2>❌ Items not found</h2>";
    console.error(itemError);
    return;
}

let rowsPerPage = items.length<=10 ? 10 : 40;
let pageClass = items.length<=10 ? "page-half":"page-full";

let pages=Math.ceil(items.length/rowsPerPage);


let container=document.getElementById("pages");

/* TOTALS */

let totalTaxable=0;
let totalGst=0;
let gstMap={};
let titleText =
type==="quotation" ? "QUOTATION" :
type==="sales_order" ? "SALES ORDER" :
type==="packing" ? "PACKING SLIP" :
"GST INVOICE";

for(let p=0;p<pages;p++){

let start=p*rowsPerPage;
let pageItems=items.slice(start,start+rowsPerPage);

let html=`<div class="page ${pageClass}">

<div class="header">

<div class="header-left">
<h1>VAJRA LIGHTS & ELECTRICALS</h1>
(H.O: SN.TRADERS, KATTAKADA, TRIVANDRUM-72)<br>
Email: vajralightsandelectricals.sha@gmail.com<br>
KAITHAKONAM, KATTAKADA, TRIVANDRUM-72<br>
PH: 8606808063,9495160771
</div>

<div class="header-right">
STATE: KERALA[32]<br>
GSTIN: 32APBPN5593H1ZT
</div>

</div>

<div class="invoice-title">${titleText}</div>

<div class="bill-info">

<div>
<b>Consignee</b><br>
${head.customer_name}<br>
${head.customer_address}<br>
GSTIN: ${head.customer_gst || "NA"}<br>
Mobile: ${head.customer_mobile || "NA"}
</div>

<div class="right">

${type==="packing" ? "" :
`Bill No : ${head.sales_number || head.quotation_number || head.order_number || head.id}<br>`}

Date : ${(
    head.bill_date || 
    head.quotation_date || 
    head.order_date ||
    head.packing_date ||
    head.created_at || ""
).split("T")[0]}<br>
S.Man : ${head.salesman}<br>
Page : ${p+1} / ${pages}

</div>

</div>
<div class="items-area">

<table>

<thead>
<tr>
<th>No</th>
<th>HSN</th>
<th>Code</th>
<th class="left">Item</th>
<th>Qty</th>
<th>Price</th>
<th>GST%</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="itemsBody">`;

let row=1;

pageItems.forEach(item=>{

let qty=parseFloat(item.quantity)||0;
let price=parseFloat(item.sales_price_gst)||0;
let gstPercent=parseFloat(item.gst_percent)||0;

let amount=qty*price;
let taxable=amount/(1+gstPercent/100);
let gst=amount-taxable;

totalTaxable+=taxable;
totalGst+=gst;

if(!gstMap[gstPercent])
gstMap[gstPercent]={taxable:0,gst:0};

gstMap[gstPercent].taxable+=taxable;
gstMap[gstPercent].gst+=gst;

html+=`
<tr>
<td>${row}</td>
<td>${item.hsn_code||""}</td>
<td>${item.item_code||""}</td>
<td class="left">${item.item_name}</td>
<td>${qty}</td>
<td>${price.toFixed(2)}</td>
<td>${gstPercent}%</td>
<td>${amount.toFixed(2)}</td>
</tr>`;

row++;

});

for(let i=pageItems.length;i<rowsPerPage;i++){

html+=`
<tr>
<td>&nbsp;</td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>`;

}

html+=`

</tbody>
</table>

</div>

<div class="bottom-section">

<div class="qr">
Scan to Pay<br>
<img class="qrimg">
</div>

<div class="bank">

<table class="gst-summary">`;

if(p === pages-1){

Object.keys(gstMap).forEach(g=>{

let taxable=gstMap[g].taxable;
let gst=gstMap[g].gst;

html+=`
<tr><td>&nbsp;GST%</td><td>AMOUNT</td><td>CGST</td><td>SGST</td><td>Total</td></tr>

<tr>
<td>${g}%</td>
<td>${taxable.toFixed(2)}</td>
<td>${(gst/2).toFixed(2)}</td>
<td>${(gst/2).toFixed(2)}</td>
<td>${(taxable+gst).toFixed(2)}</td>
</tr>`;

});

}else{

html+=`
<tr><td>&nbsp;GST%</td><td>AMOUNT</td><td>CGST</td><td>SGST</td><td>Total</td></tr>
<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>
<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>
`;

}

html+=`
</table>

A/C No : 15490200002687<br>
IFSC : FDRL0001549
<div class="summary-note">
Goods once sold will not be taken back or exchanged without original bill.<br>
Subject to Trivandrum Jurisdiction.<br>
This is a Computer Generated Invoice and does not require signature.<br>
Thank you for your valueable patronage. Visit Again!

</div>

</div>

<table class="summary">`;
if(p === pages-1){

html+=`
<tr>
<td>Amount</td>
<td>${totalTaxable.toFixed(2)}</td>
</tr>

<tr>
<td>GST</td>
<td>${totalGst.toFixed(2)}</td>
</tr>

<tr>
<td>Round Off</td>
<td>${(Math.round(totalTaxable+totalGst)-(totalTaxable+totalGst)).toFixed(2)}</td>
</tr>

<tr>
<td>Total</td>
<td>${Math.round(totalTaxable+totalGst).toFixed(2)}</td>
</tr>
`;

}else{

html+=`
<tr><td>Amount</td><td></td></tr>
<tr><td>GST</td><td></td></tr>
<tr><td>Round Off</td><td></td></tr>
<tr><td>Total</td><td></td></tr>
`;

}

html+=`

</table>

</div>


</div>`;
container.innerHTML+=html;


}
// ===== ADD PACKING COPY =====

if(type==="sales_pack"){

let originalHTML = container.innerHTML;

// create packing copy
let packingHTML = originalHTML
.replace(/GST INVOICE/g,"PACKING SLIP")
.replace(/Bill No\s*:.*?<br>/g,"");   // remove bill number

container.innerHTML = originalHTML + packingHTML;

}

/* QR */

let grand = Math.round(totalTaxable + totalGst);

let qr = `upi://pay?pa=q137103198@ybl&pn=Vajra Lights&am=${grand}&cu=INR`;

let qrImgs = document.querySelectorAll(".qrimg");

let loaded = 0;

qrImgs.forEach(img => {

    img.onload = () => {
        loaded++;
        if(loaded === qrImgs.length){
            window.print();
        }
    };

    img.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(qr);

});

}

loadData();

</script>

</body>
</html>
