<!DOCTYPE html>
<html>
<head>
<title>Purchase Report - VAJRA LIGHTS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="page_permissions.js"></script>


<style>

/* ===== PAGE BACKGROUND - DARK WOOD ===== */
body {
    font-family: Arial, sans-serif;
    padding:20px;
    background-image: url("https://www.transparenttextures.com/patterns/dark-wood.png");
    background-color: #3b2a1e;
    color: #fff;
}

/* ===== TABLE ===== */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    border-radius:8px;
    overflow:hidden;
}

th, td {
    border:1px solid rgba(255,255,255,0.15);
    padding:10px;
    text-align:left;
}

th {
    background: rgba(0,0,0,0.8);
    color:#ffd700;
}

tr:hover {
    background: rgba(255,255,255,0.05);
    cursor:pointer;
}

.total-row {
    font-weight:bold;
    background: rgba(255,215,0,0.15);
}

input, select {
    padding:6px;
    border-radius:6px;
    border:1px solid #aaa;
    margin:5px;
}

button {
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#ffd700;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    background:#ffcc00;
}

.dropdown-wood {
    background-image: url("https://www.transparenttextures.com/patterns/light-wood.png");
    background-color: #e4c9a8;
    color:#000;
    padding:15px;
    border-radius:6px;
}

.dropdown-wood table {
    background: rgba(255,255,255,0.9);
    color:#000;
}

.dropdown-wood th {
    background:#c89f6d;
    color:#000;
}

</style>
</head>
<body>

<h2>Purchase Report</h2>

From: <input type="date" id="from_date">
To: <input type="date" id="to_date">

Series:
<select id="series_filter">
    <option value="">All</option>
</select>

Supplier Name:
<input type="text" id="supplier_filter" placeholder="Search supplier">

Mobile:
<input type="text" id="mobile_filter" placeholder="Search mobile">

<table>
<thead>
<tr>
<th>Series</th>
<th>Bill No</th>
<th>Date</th>
<th>Supplier</th>
<th>Mobile</th>
<th>Total</th>
<th>Print</th>
<th>Edit</th>
</tr>
</thead>
<tbody id="report_body"></tbody>
</table>

<script>

    const sb = window.sbcc; // supabase client from supabaseClient.js
  document.addEventListener("DOMContentLoaded", async () => {
  const ok = await requirePageAccess("purchase");
  if (!ok) return;
  });




async function loadPurchase() {

    const from = document.getElementById('from_date').value;
    const to = document.getElementById('to_date').value;
    const series = document.getElementById('series_filter').value;
    const supplier = document.getElementById('supplier_filter').value.trim();
    const mobile = document.getElementById('mobile_filter').value.trim();

    let query = sb
        .from('purchase_details')
        .select('*')
        .gte('bill_date', from)
        .lte('bill_date', to)
        .order('purchase_number', { ascending:false });

    if (series) query = query.eq('series_code', series);
    if (supplier) query = query.ilike('supplier_name', `%${supplier}%`);
    if (mobile) query = query.ilike('supplier_mobile', `%${mobile}%`);

    const { data, error } = await query;

    if(error){
        alert(error.message);
        return;
    }

    const body = document.getElementById('report_body');
    body.innerHTML = '';
    data.forEach(row => {

    body.innerHTML += `
    <tr>
        <td>${row.series_code || ''}</td>
        <td>${row.purchase_number || ''}</td>
        <td>${row.bill_date || ''}</td>
        <td>${row.supplier_name || ''}</td>
        <td>${row.supplier_mobile || ''}</td>
        <td>${parseFloat(row.invoice_amount || 0).toFixed(2)}</td>
        <td>
            <button onclick="printPurchase('${row.id}')">Print</button>
        </td>
        <td>
            <button onclick="editPurchase('${row.id}')">Edit</button>
        </td>
    </tr>
    `;
});


    let totalSum = 0;

    for (let p of data) {

        totalSum += parseFloat(p.invoice_amount || 0);

        body.innerHTML += `
<tr onclick="toggleDetails(${p.id})">
    <td>${p.series_code || ''}</td>
    <td>${p.purchase_number || ''}</td>
    <td>${p.bill_date || ''}</td>
    <td>${p.supplier_name || ''}</td>
    <td>${p.supplier_mobile || ''}</td>
    <td>₹${parseFloat(p.invoice_amount || 0).toFixed(2)}</td>
    <td>
        <button onclick="event.stopPropagation(); printBill(${p.id})">
            🖨 Print
        </button>
    </td>
    <td>
        <button onclick="event.stopPropagation(); editBill(${p.id})">
            ✏ Edit
        </button>
    </td>
</tr>

<tr id="details-${p.id}" style="display:none;">
    <td colspan="8">
        <div id="items-${p.id}">Loading...</div>
    </td>
</tr>
`;
    }

    body.innerHTML += `
<tr class="total-row">
    <td colspan="6">TOTAL PURCHASE</td>
    <td>₹${totalSum.toFixed(2)}</td>
</tr>`;
}

function printPurchase(id){
    window.open(`purchase_details.html?id=${id}&print=true`, '_blank');
}

function editPurchase(id){
    window.location.href = `purchasemod.html?edit=${id}`;
}

const editId = new URLSearchParams(window.location.search).get("edit");

if (editId) {
    loadForEdit(editId);
}


async function toggleDetails(id) {

    const row = document.getElementById(`details-${id}`);
    const container = document.getElementById(`items-${id}`);

    if (row.style.display === "table-row") {
        row.style.display = "none";
        return;
    }

    row.style.display = "table-row";
    container.innerHTML = "Loading...";

    const { data, error } = await sb
        .from('purchase_item_details')
        .select('*')
        .eq('purchase_id', id);

    if (error) {
        container.innerHTML = "Error loading items";
        return;
    }

    if (!data.length) {
        container.innerHTML = "No items found.";
        return;
    }

let html = `
<div class="dropdown-wood">
<table style="width:100%; margin-top:10px;">
<tr>
<th>Item Code</th>
<th>Item Name</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
`;

    data.forEach(i => {
        html += `
<tr>
<td>${i.item_code || ''}</td>
<td>${i.item_name || ''}</td>
<td>${i.quantity || 0}</td>
<td>₹${parseFloat(i.price || 0).toFixed(2)}</td>
<td>₹${parseFloat(i.total_price || 0).toFixed(2)}</td>
</tr>
`;
    });

    html += "</table></div>";

    container.innerHTML = html;
}

function printBill(id) {
    window.open(`purchase_details.html?id=${id}&print=true`, '_blank');
}

function editBill(id) {
    window.open(`purchasemod.html?edit=${id}`, '_blank');
}

document.addEventListener("DOMContentLoaded", async () => {

    const today = new Date().toISOString().split("T")[0];

    document.getElementById("from_date").value = today;
    document.getElementById("to_date").value = today;

    await loadSeries();
    loadPurchase();

    document.getElementById("from_date").addEventListener("change", loadPurchase);
    document.getElementById("to_date").addEventListener("change", loadPurchase);
    document.getElementById("series_filter").addEventListener("change", loadPurchase);
    document.getElementById("supplier_filter").addEventListener("input", debounce(loadPurchase, 500));
    document.getElementById("mobile_filter").addEventListener("input", debounce(loadPurchase, 500));
});

function debounce(func, delay) {
    let timeout;
    return function() {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(), delay);
    };
}

async function loadSeries() {

    const { data, error } = await sb
        .from('bill_series')
        .select('series_code');

    if (error) return;

    const select = document.getElementById('series_filter');

    data.forEach(s => {
        select.innerHTML += `<option value="${s.series_code}">
                                ${s.series_code}
                             </option>`;
    });
}

</script>

</body>
</html>
