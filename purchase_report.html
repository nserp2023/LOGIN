<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <title>Purchase Report - VAJRA LIGHTS</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="page_permissions.js"></script>
    <script src="common-ui.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background-image: url("https://www.transparenttextures.com/patterns/dark-wood.png");
    background-color: #3b2a1e;
    color: #fff;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:14px;
}

h2 {
    margin:0;
}

.filters {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    margin-bottom:12px;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    border-radius:8px;
    overflow:hidden;
}

th, td {
    border:1px solid rgba(255,255,255,0.15);
    padding:10px;
    text-align:left;
}

th {
    background: rgba(0,0,0,0.8);
    color:#ffd700;
}

tr:hover {
    background: rgba(255,255,255,0.05);
    cursor:pointer;
}

.total-row {
    font-weight:bold;
    background: rgba(255,215,0,0.15);
}

input, select {
    padding:8px;
    border-radius:6px;
    border:1px solid #aaa;
    margin:0;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#ffd700;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    background:#ffcc00;
}

.btn-new {
    background: linear-gradient(180deg,#22c55e,#16a34a);
    color:white;
}

.btn-new:hover {
    background: linear-gradient(180deg,#2ed065,#15803d);
}

.dropdown-wood {
    background-image: url("https://www.transparenttextures.com/patterns/light-wood.png");
    background-color: #e4c9a8;
    color:#000;
    padding:15px;
    border-radius:6px;
}

.dropdown-wood table {
    background: rgba(255,255,255,0.95);
    color:#000;
    margin-top:10px;
}

.dropdown-wood th {
    background:#c89f6d;
    color:#000;
}

.status-box {
    padding:10px 12px;
    border-radius:8px;
    background: rgba(0,0,0,0.35);
    margin-bottom:10px;
    color:#fff3b0;
}

.right {
    text-align:right;
}

.action-cell {
    white-space:nowrap;
}

.action-cell button {
    margin-right:6px;
}

.action-cell button:last-child {
    margin-right:0;
}

.icon-action {
    width:38px;
    height:38px;
    padding:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    color:#332500;
}

.icon-action svg {
    width:19px;
    height:19px;
    fill:none;
    stroke:currentColor;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.icon-action.edit-action {
    background:#93c5fd;
    color:#102a43;
}

.icon-action.edit-action:hover {
    background:#60a5fa;
}

.problem-row {
    background: rgba(255, 59, 48, 0.22) !important;
}

.problem-row:hover {
    background: rgba(255, 59, 48, 0.32) !important;
}

.warning-badge {
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:5px 9px;
    border-radius:999px;
    background:#ffdddd;
    color:#7f1d1d;
    border:1px solid #ff8a8a;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
}

.ok-badge {
    display:inline-flex;
    align-items:center;
    padding:5px 9px;
    border-radius:999px;
    background:#dcfce7;
    color:#14532d;
    border:1px solid #86efac;
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
}

.problem-note {
    margin-top:8px;
    padding:10px 12px;
    border-radius:8px;
    background:#fff1f2;
    color:#7f1d1d;
    border:1px solid #fecdd3;
    font-weight:bold;
}

@media (max-width: 900px){
    body { padding:12px; }
    .filters > * { width:100%; }
    .topbar > * { width:100%; }
    th, td { font-size:12px; padding:8px; }
}
</style>
</head>
<body>

<div class="topbar">
    <h2>Purchase Report</h2>
    <button class="btn-new" onclick="window.location.href='stock_conversion.html'">Stock Conversion</button>
    <button class="btn-new" onclick="window.location.href='purchase_order_report.html'">Purchase Order Report</button>
    <button class="btn-new" onclick="goToNewPurchase()">+ New Purchase</button>
    <button class="btn-new" onclick="window.location.href='purchasereturnreport.html'">Purchase Return Report</button>
</div>

<div class="filters">
    <label>From:</label>
    <input type="date" id="from_date">

    <label>To:</label>
    <input type="date" id="to_date">

    <label>Series:</label>
    <select id="series_filter">
        <option value="">All</option>
    </select>

    <label>Supplier Name:</label>
    <input type="text" id="supplier_filter" placeholder="Search supplier">
</div>

<div class="status-box" id="statusBox">Ready.</div>

<table>
<thead>
<tr>
<th>Invoice No</th>
<th>Date</th>
<th>Supplier</th>
<th>Warning</th>
<th class="right">Total</th>
<th>Print</th>
<th>Edit</th>
</tr>
</thead>
<tbody id="report_body"></tbody>
</table>

<script>
const sb = window.sbcc;

document.addEventListener("DOMContentLoaded", async () => {
    const ok = await requirePageAccess("purchase");
    if (!ok) return;

    const today = new Date().toISOString().split("T")[0];
    document.getElementById("from_date").value = today;
    document.getElementById("to_date").value = today;

    await loadSeries();
    loadPurchase();

    document.getElementById("from_date").addEventListener("change", loadPurchase);
    document.getElementById("to_date").addEventListener("change", loadPurchase);
    document.getElementById("series_filter").addEventListener("change", loadPurchase);
    document.getElementById("supplier_filter").addEventListener("input", debounce(loadPurchase, 400));
});

function goToNewPurchase(){
    window.location.href = "purchase.html";
}

function debounce(func, delay) {
    let timeout;
    return function() {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(), delay);
    };
}

function money(v){
    return parseFloat(v || 0).toFixed(2);
}

function safeText(v){
    return String(v ?? '').replace(/[&<>'"]/g, ch => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        "'":'&#39;',
        '"':'&quot;'
    }[ch]));
}


function hasValue(v){
    return v !== null && v !== undefined && String(v).trim() !== '';
}

function buildPurchaseWarnings(p, items, itemLoadError){
    const warnings = [];

    if (!hasValue(p.invoice_number)) {
        warnings.push('Invoice no missing');
    }

    if (itemLoadError) {
        warnings.push('Item check failed');
        return warnings;
    }

    if (!items || !items.length) {
        warnings.push('No items in bill');
        return warnings;
    }

    const invalidItems = items.filter(i =>
        !hasValue(i.item_code) ||
        !hasValue(i.item_name) ||
        Number(i.quantity || 0) <= 0
    );

    if (invalidItems.length) {
        warnings.push(`${invalidItems.length} invalid item row(s)`);
    }

    const itemTotal = items.reduce((sum, i) => {
        const qty = Number(i.quantity || 0);
        const price = Number(i.price || 0);
        return sum + (qty * price);
    }, 0);

    if (Number(p.invoice_amount || 0) <= 0 && itemTotal > 0) {
        warnings.push('Invoice amount is zero');
    }

    return warnings;
}

function chunkArray(arr, size){
    const chunks = [];
    for (let i = 0; i < arr.length; i += size) {
        chunks.push(arr.slice(i, i + size));
    }
    return chunks;
}

async function fetchPurchaseItemsForReport(purchaseIds){
    const rows = [];
    const pageSize = 1000;
    const idChunks = chunkArray(purchaseIds, 100);

    for (const ids of idChunks) {
        let from = 0;

        while (true) {
            const to = from + pageSize - 1;
            const { data, error } = await sb
                .from('purchase_item_details')
                .select('purchase_id,item_code,item_name,quantity,price,purchase_price,purchase_price_gst')
                .in('purchase_id', ids)
                .range(from, to);

            if (error) {
                throw error;
            }

            rows.push(...(data || []));

            if (!data || data.length < pageSize) {
                break;
            }

            from += pageSize;
        }
    }

    return rows;
}

async function loadPurchase() {
    const from = document.getElementById('from_date').value;
    const to = document.getElementById('to_date').value;
    const series = document.getElementById('series_filter').value;
    const supplier = document.getElementById('supplier_filter').value.trim();
    const body = document.getElementById('report_body');
    const statusBox = document.getElementById('statusBox');

    body.innerHTML = '';
    statusBox.textContent = 'Loading purchase report...';

    let query = sb
        .from('purchase_details')
        .select('*')
        .gte('bill_date', from)
        .lte('bill_date', to)
        .order('purchase_number', { ascending:false });

    if (series) query = query.eq('series_code', series);
    if (supplier) query = query.ilike('supplier_name', `%${supplier}%`);

    const { data, error } = await query;

    if(error){
        console.error(error);
        statusBox.textContent = error.message;
        return;
    }

    if(!data || !data.length){
        body.innerHTML = '<tr><td colspan="7">No purchase records found.</td></tr>';
        statusBox.textContent = 'No records found.';
        return;
    }

    const purchaseIds = data.map(p => p.id).filter(Boolean);
    const itemsByPurchase = {};
    let itemLoadError = null;

    if (purchaseIds.length) {
        try {
            const allItems = await fetchPurchaseItemsForReport(purchaseIds);
            (allItems || []).forEach(item => {
                const key = item.purchase_id;
                if (!itemsByPurchase[key]) itemsByPurchase[key] = [];
                itemsByPurchase[key].push(item);
            });
        } catch (itemError) {
            console.error(itemError);
            itemLoadError = itemError;
        }
    }

    let totalSum = 0;
    let warningCount = 0;

    for (const p of data) {
        totalSum += parseFloat(p.invoice_amount || 0);

        const items = itemsByPurchase[p.id] || [];
        const warnings = buildPurchaseWarnings(p, items, itemLoadError);
        const hasProblem = warnings.length > 0;
        if (hasProblem) warningCount++;

        const warningHtml = hasProblem
            ? `<span class="warning-badge">⚠ ${safeText(warnings.join(', '))}</span>`
            : `<span class="ok-badge">✓ OK</span>`;

        body.innerHTML += `
<tr onclick="toggleDetails(${p.id})" class="${hasProblem ? 'problem-row' : ''}">
    <td>${safeText(p.invoice_number || p.purchase_number || '')}</td>
    <td>${safeText(p.bill_date || '')}</td>
    <td>${safeText(p.supplier_name || '')}</td>
    <td>${warningHtml}</td>
    <td class="right">₹${money(p.invoice_amount)}</td>
    <td class="action-cell">
        <button class="icon-action" type="button" title="Print purchase" aria-label="Print purchase" onclick="event.stopPropagation(); printPurchase(${p.id})">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
        </button>
    </td>
    <td class="action-cell">
        <button class="icon-action edit-action" type="button" title="Edit purchase" aria-label="Edit purchase" onclick="event.stopPropagation(); editPurchase(${p.id})">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"/></svg>
        </button>
    </td>
</tr>

<tr id="details-${p.id}" style="display:none;">
    <td colspan="7">
        <div id="items-${p.id}" data-warning="${safeText(warnings.join(', '))}">Loading...</div>
    </td>
</tr>
`;
    }

    body.innerHTML += `
<tr class="total-row">
    <td colspan="4">TOTAL PURCHASE</td>
    <td class="right">₹${money(totalSum)}</td>
    <td colspan="2"></td>
</tr>`;

    statusBox.textContent = `${data.length} purchase bill(s) loaded. ${warningCount ? warningCount + ' bill(s) need checking.' : 'No problems found.'}`;
}

function printPurchase(id){
    window.open(`purchase_details.html?id=${id}&print=true`, '_blank');
}

function editPurchase(id){
    window.location.href = `purchasemod.html?edit=${id}`;
}

async function toggleDetails(id) {
    const row = document.getElementById(`details-${id}`);
    const container = document.getElementById(`items-${id}`);

    if (row.style.display === "table-row") {
        row.style.display = "none";
        return;
    }

    row.style.display = "table-row";
    container.innerHTML = "Loading...";

    const { data, error } = await sb
        .from('purchase_item_details')
        .select('*')
        .eq('purchase_id', id)
        .order('id', { ascending: true });

    if (error) {
        console.error(error);
        container.innerHTML = `<div class="problem-note">⚠ Error loading items. Please check this purchase bill.</div>`;
        return;
    }

    if (!data || !data.length) {
        container.innerHTML = `<div class="problem-note">⚠ No items found in this purchase bill. Please edit and correct it.</div>`;
        return;
    }

    let html = `
<div class="dropdown-wood">
<table style="width:100%;">
<tr>
<th>Item Code</th>
<th>Item Name</th>
<th>Qty</th>
<th>Price</th>
<th>Purchase Price</th>
<th>Purchase+GST</th>
</tr>
`;

    data.forEach(i => {
        const invalid = !hasValue(i.item_code) || !hasValue(i.item_name) || Number(i.quantity || 0) <= 0;
        html += `
<tr class="${invalid ? 'problem-row' : ''}">
<td>${safeText(i.item_code || '')}</td>
<td>${safeText(i.item_name || '')}</td>
<td>${safeText(i.quantity || 0)}</td>
<td>₹${money(i.price)}</td>
<td>₹${money(i.purchase_price)}</td>
<td>₹${money(i.purchase_price_gst)}</td>
</tr>
`;
    });

    html += "</table></div>";
    container.innerHTML = html;
}

async function loadSeries() {
    const { data, error } = await sb
        .from('bill_series')
        .select('series_code')
        .order('series_code', { ascending: true });

    if (error) return;

    const select = document.getElementById('series_filter');
    data.forEach(s => {
        select.innerHTML += `<option value="${safeText(s.series_code)}">${safeText(s.series_code)}</option>`;
    });
}
</script>

</body>
</html>
