<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <title>Purchase Report - VAJRA LIGHTS</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="page_permissions.js"></script>
    <script src="common-ui.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background-image: url("https://www.transparenttextures.com/patterns/dark-wood.png");
    background-color: #3b2a1e;
    color: #fff;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:14px;
}

h2 {
    margin:0;
}

.filters {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    margin-bottom:12px;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    border-radius:8px;
    overflow:hidden;
}

th, td {
    border:1px solid rgba(255,255,255,0.15);
    padding:10px;
    text-align:left;
}

th {
    background: rgba(0,0,0,0.8);
    color:#ffd700;
}

tr:hover {
    background: rgba(255,255,255,0.05);
    cursor:pointer;
}

.total-row {
    font-weight:bold;
    background: rgba(255,215,0,0.15);
}

input, select {
    padding:8px;
    border-radius:6px;
    border:1px solid #aaa;
    margin:0;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#ffd700;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    background:#ffcc00;
}

.btn-new {
    background: linear-gradient(180deg,#22c55e,#16a34a);
    color:white;
}

.btn-new:hover {
    background: linear-gradient(180deg,#2ed065,#15803d);
}

.dropdown-wood {
    background-image: url("https://www.transparenttextures.com/patterns/light-wood.png");
    background-color: #e4c9a8;
    color:#000;
    padding:15px;
    border-radius:6px;
}

.dropdown-wood table {
    background: rgba(255,255,255,0.95);
    color:#000;
    margin-top:10px;
}

.dropdown-wood th {
    background:#c89f6d;
    color:#000;
}

.status-box {
    padding:10px 12px;
    border-radius:8px;
    background: rgba(0,0,0,0.35);
    margin-bottom:10px;
    color:#fff3b0;
}

.right {
    text-align:right;
}

.action-cell {
    white-space:nowrap;
}

.action-cell button {
    margin-right:6px;
}

.action-cell button:last-child {
    margin-right:0;
}

@media (max-width: 900px){
    body { padding:12px; }
    .filters > * { width:100%; }
    .topbar > * { width:100%; }
    th, td { font-size:12px; padding:8px; }
}
</style>
</head>
<body>

<div class="topbar">
    <h2>Purchase Report</h2>
    <button class="btn-new" onclick="goToNewPurchase()">+ New Purchase</button>
    <button class="btn-new" onclick="window.location.href='purchasereturnreport.html'">Purchase Return Report</button>

</div>

<div class="filters">
    <label>From:</label>
    <input type="date" id="from_date">

    <label>To:</label>
    <input type="date" id="to_date">

    <label>Series:</label>
    <select id="series_filter">
        <option value="">All</option>
    </select>

    <label>Supplier Name:</label>
    <input type="text" id="supplier_filter" placeholder="Search supplier">

    <label>Mobile:</label>
    <input type="text" id="mobile_filter" placeholder="Search mobile">
</div>

<div class="status-box" id="statusBox">Ready.</div>

<table>
<thead>
<tr>
<th>Series</th>
<th>Bill No</th>
<th>Date</th>
<th>Supplier</th>
<th>Mobile</th>
<th class="right">Total</th>
<th>Print</th>
<th>Edit</th>
</tr>
</thead>
<tbody id="report_body"></tbody>
</table>

<script>
const sb = window.sbcc;

document.addEventListener("DOMContentLoaded", async () => {
    const ok = await requirePageAccess("purchase");
    if (!ok) return;

    const today = new Date().toISOString().split("T")[0];
    document.getElementById("from_date").value = today;
    document.getElementById("to_date").value = today;

    await loadSeries();
    loadPurchase();

    document.getElementById("from_date").addEventListener("change", loadPurchase);
    document.getElementById("to_date").addEventListener("change", loadPurchase);
    document.getElementById("series_filter").addEventListener("change", loadPurchase);
    document.getElementById("supplier_filter").addEventListener("input", debounce(loadPurchase, 400));
    document.getElementById("mobile_filter").addEventListener("input", debounce(loadPurchase, 400));
});

function goToNewPurchase(){
    window.location.href = "purchase.html";
}

function debounce(func, delay) {
    let timeout;
    return function() {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(), delay);
    };
}

function money(v){
    return parseFloat(v || 0).toFixed(2);
}

async function loadPurchase() {
    const from = document.getElementById('from_date').value;
    const to = document.getElementById('to_date').value;
    const series = document.getElementById('series_filter').value;
    const supplier = document.getElementById('supplier_filter').value.trim();
    const mobile = document.getElementById('mobile_filter').value.trim();
    const body = document.getElementById('report_body');
    const statusBox = document.getElementById('statusBox');

    body.innerHTML = '';
    statusBox.textContent = 'Loading purchase report...';

    let query = sb
        .from('purchase_details')
        .select('*')
        .gte('bill_date', from)
        .lte('bill_date', to)
        .order('purchase_number', { ascending:false });

    if (series) query = query.eq('series_code', series);
    if (supplier) query = query.ilike('supplier_name', `%${supplier}%`);
    if (mobile) query = query.ilike('supplier_mobile', `%${mobile}%`);

    const { data, error } = await query;

    if(error){
        console.error(error);
        statusBox.textContent = error.message;
        return;
    }

    if(!data || !data.length){
        body.innerHTML = '<tr><td colspan="8">No purchase records found.</td></tr>';
        statusBox.textContent = 'No records found.';
        return;
    }

    let totalSum = 0;

    for (const p of data) {
        totalSum += parseFloat(p.invoice_amount || 0);

        body.innerHTML += `
<tr onclick="toggleDetails(${p.id})">
    <td>${p.series_code || ''}</td>
    <td>${p.purchase_number || ''}</td>
    <td>${p.bill_date || ''}</td>
    <td>${p.supplier_name || ''}</td>
    <td>${p.supplier_mobile || ''}</td>
    <td class="right">₹${money(p.invoice_amount)}</td>
    <td class="action-cell">
        <button onclick="event.stopPropagation(); printPurchase(${p.id})">🖨 Print</button>
    </td>
    <td class="action-cell">
        <button onclick="event.stopPropagation(); editPurchase(${p.id})">✏ Edit</button>
    </td>
</tr>

<tr id="details-${p.id}" style="display:none;">
    <td colspan="8">
        <div id="items-${p.id}">Loading...</div>
    </td>
</tr>
`;
    }

    body.innerHTML += `
<tr class="total-row">
    <td colspan="5">TOTAL PURCHASE</td>
    <td class="right">₹${money(totalSum)}</td>
    <td colspan="2"></td>
</tr>`;

    statusBox.textContent = `${data.length} purchase bill(s) loaded.`;
}

function printPurchase(id){
    window.open(`purchase_details.html?id=${id}&print=true`, '_blank');
}

function editPurchase(id){
    window.location.href = `purchasemod.html?edit=${id}`;
}

async function toggleDetails(id) {
    const row = document.getElementById(`details-${id}`);
    const container = document.getElementById(`items-${id}`);

    if (row.style.display === "table-row") {
        row.style.display = "none";
        return;
    }

    row.style.display = "table-row";
    container.innerHTML = "Loading...";

    const { data, error } = await sb
        .from('purchase_item_details')
        .select('*')
        .eq('purchase_id', id)
        .order('id', { ascending: true });

    if (error) {
        console.error(error);
        container.innerHTML = "Error loading items";
        return;
    }

    if (!data || !data.length) {
        container.innerHTML = "No items found.";
        return;
    }

    let html = `
<div class="dropdown-wood">
<table style="width:100%;">
<tr>
<th>Item Code</th>
<th>Item Name</th>
<th>Qty</th>
<th>Price</th>
<th>Purchase Price</th>
<th>Purchase+GST</th>
</tr>
`;

    data.forEach(i => {
        html += `
<tr>
<td>${i.item_code || ''}</td>
<td>${i.item_name || ''}</td>
<td>${i.quantity || 0}</td>
<td>₹${money(i.price)}</td>
<td>₹${money(i.purchase_price)}</td>
<td>₹${money(i.purchase_price_gst)}</td>
</tr>
`;
    });

    html += "</table></div>";
    container.innerHTML = html;
}

async function loadSeries() {
    const { data, error } = await sb
        .from('bill_series')
        .select('series_code')
        .order('series_code', { ascending: true });

    if (error) return;

    const select = document.getElementById('series_filter');
    data.forEach(s => {
        select.innerHTML += `<option value="${s.series_code}">${s.series_code}</option>`;
    });
}
</script>

</body>
</html>
