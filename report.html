<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <title>Sales Report - VAJRA LIGHTS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="page_permissions.js"></script>
    <script src="common-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-image: url("https://www.transparenttextures.com/patterns/dark-wood.png");
            background-color: #3b2a1e;
            color: #fff;
        }

        .filter-bar{
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            gap:8px;
            margin-bottom:10px;
        }

        .filter-bar label{
            font-weight:bold;
            margin-right:2px;
        }

        table {
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius:8px;
            overflow:hidden;
        }

        th, td {
            border:1px solid rgba(255,255,255,0.15);
            padding:10px;
            text-align:left;
            vertical-align:top;
        }

        th {
            background: rgba(0,0,0,0.8);
            color:#ffd700;
            font-weight:bold;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
            cursor:pointer;
        }

        .total-row {
            font-weight:bold;
            background: rgba(255,215,0,0.15);
        }

        .converted-row{
            background: rgba(0,200,0,0.25);
        }

        .missing-item-row {
            background: rgba(255, 105, 180, 0.32) !important;
        }

        .missing-item-row:hover {
            background: rgba(255, 105, 180, 0.48) !important;
        }

        .missing-item-cell {
            background: rgba(255, 80, 120, 0.22) !important;
            color: #ffd6df;
            font-weight: bold;
        }

        .warn-badge{
            display:inline-block;
            margin-left:6px;
            color:#ff6b9a;
            font-weight:900;
        }

        input, select {
            padding:6px;
            border-radius:6px;
            border:1px solid #aaa;
            margin:5px;
        }

        button {
            padding:6px 10px;
            border:none;
            border-radius:6px;
            background:#ffd700;
            cursor:pointer;
            font-weight:bold;
            margin:2px;
        }

        button:hover {
            background:#ffcc00;
        }

        button:disabled {
            background: #9ca3af;
            color: #f8fafc;
            cursor: not-allowed;
        }

        .dropdown-wood {
            background-image: url("https://www.transparenttextures.com/patterns/light-wood.png");
            background-color: #e4c9a8;
            color:#000;
            padding:15px;
            border-radius:6px;
        }

        .dropdown-wood table {
            background: rgba(255,255,255,0.85);
            color:#000;
        }

        .dropdown-wood th {
            background:#c89f6d;
            color:#000;
        }

        .small-note{
            opacity:.85;
            font-size:12px;
            margin-top:6px;
        }

        .wa-col button{
            min-width: 86px;
        }

        .cancel-btn {
            background:#dc2626;
            color:white;
        }

        .cancel-btn:hover {
            background:#b91c1c;
        }

        .cancelled-row {
            background: rgba(255, 0, 0, 0.28) !important;
            opacity: 0.78;
        }

        .cancelled-row:hover {
            background: rgba(255, 0, 0, 0.38) !important;
        }

        .cancelled-badge {
            display:inline-block;
            padding:3px 7px;
            border-radius:999px;
            background:#dc2626;
            color:white;
            font-size:11px;
            font-weight:900;
            margin-left:6px;
        }

        .cancel-info {
            color:#ffd6d6;
            font-size:11px;
            margin-top:4px;
            line-height:1.35;
        }

        .remark-report-cell {
            color:#ffe4b5;
            font-weight:700;
            max-width:220px;
            white-space:normal;
            line-height:1.35;
        }
    </style>
</head>
<body>

<h2 id="report_title">Sales Report</h2>

<div class="filter-bar">
    <label>Report Type:</label>
    <select id="report_type">
        <option value="sales">Sales</option>
        <option value="quotation">Quotation</option>
        <option value="sales_order">Sales Order</option>
    </select>

    <label>From:</label>
    <input type="date" id="from_date">

    <label>To:</label>
    <input type="date" id="to_date">

    <label>Series:</label>
    <select id="series_filter">
        <option value="">All</option>
    </select>

    <label>Customer Name:</label>
    <input type="text" id="customer_filter" placeholder="Search name">

    <label>Mobile:</label>
    <input type="text" id="mobile_filter" placeholder="Search mobile">

    <label>Salesman:</label>
    <input type="text" id="salesman_filter" placeholder="Search salesman">

    <label>Created By:</label>
    <input type="text" id="created_by_filter" placeholder="Search created user">
</div>

<table>
    <thead>
        <tr>
            <th>Series</th>
            <th>Bill No</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Mobile</th>
            <th>Salesman</th>
            <th>Created By</th>
            <th>Total</th>
            <th id="remark_header" style="display:none;">Remark</th>
            <th>WhatsApp</th>
            <th>Print</th>
            <th>Edit / Cancel</th>
        </tr>
    </thead>
    <tbody id="report_body"></tbody>
</table>

<script>
    const sb = window.sbcc;
    let canEditBills = false;
    let currentRows = [];
    let packingUnlocked = false;

    function normalizeText(v){
        return String(v || "").trim().toLowerCase();
    }

    function getCreatedByValue(row){
        return row.created_by || row.created_user || row.created_by_user || row.user_name || row.username || "";
    }

    function getCurrentTypeConfig() {
        let type = document.getElementById("report_type").value;

        // Sales + Packing is hidden and locked by default.
        // Only Shift + P unlocks this report type in the dropdown.
        if(type === "sales_pack" && !packingUnlocked){
            alert("Access Denied");
            type = "sales";
            document.getElementById("report_type").value = "sales";
        }

        let table = "sales_details";
        let numberField = "sales_number";
        let dateField = "bill_date";
        let amountField = "invoice_amount";
        let label = "Sales Bill";

        if(type === "sales_pack"){
            table = "sales_packing_details";
            numberField = "packing_number";
            dateField = "packing_date";
            amountField = "packing_amount";
            label = "Sales + Packing";
        }

        if(type === "quotation"){
            table = "quotation_details";
            numberField = "quotation_number";
            dateField = "quotation_date";
            amountField = "total_amount";
            label = "Quotation";
        }

        if(type === "sales_order"){
            table = "sales_order_details";
            numberField = "order_number";
            dateField = "order_date";
            amountField = "total_amount";
            label = "Sales Order";
        }

        return { type, table, numberField, dateField, amountField, label };
    }

    function findReportRow(id){
        return currentRows.find(r => Number(r.id) === Number(id));
    }

    async function getBillIssueMap(type, billIds){
        const result = new Map();
        if(!billIds || !billIds.length) return result;

        let table = "sales_item_details";
        let idField = "sales_id";

        if(type === "sales_pack"){
            table = "sales_packing_item_details";
            idField = "packing_id";
        }

        if(type === "quotation"){
            table = "quotation_item_details";
            idField = "quotation_id";
        }

        if(type === "sales_order"){
            table = "sales_order_item_details";
            idField = "sales_order_id";
        }

        const normalizedBillIds = [...new Set((billIds || []).map(v => Number(v)).filter(Boolean))];
        const allItems = [];
        const chunkSize = 100;

        for(let i = 0; i < normalizedBillIds.length; i += chunkSize){
            const chunk = normalizedBillIds.slice(i, i + chunkSize);
            let from = 0;
            const pageSize = 1000;

            while(true){
                const { data, error } = await sb
                    .from(table)
                    .select(`${idField}, item_code, item_name`)
                    .in(idField, chunk)
                    .range(from, from + pageSize - 1);

                if(error){
                    console.error("Bill issue check failed:", error);
                    return result;
                }

                const rows = data || [];
                allItems.push(...rows);

                if(rows.length < pageSize) break;
                from += pageSize;
            }
        }

        const foundBillIds = new Set();

        allItems.forEach((item, index) => {
            const parentId = Number(item[idField]);
            foundBillIds.add(parentId);

            if(!result.has(parentId)){
                result.set(parentId, []);
            }

            const reasons = result.get(parentId);
            const codeMissing = !String(item.item_code || "").trim();
            const nameMissing = !String(item.item_name || "").trim();

            if(codeMissing){
                reasons.push(`Missing item code`);
            }

            if(nameMissing){
                reasons.push(`Missing item name`);
            }
        });

        normalizedBillIds.forEach(id => {
            if(!foundBillIds.has(id)){
                result.set(id, ["No item rows found"]);
            }
        });

        for(const [id, reasons] of result.entries()){
            const uniqueReasons = [...new Set(reasons)];
            result.set(id, uniqueReasons);
        }

        return result;
    }

    function formatMoney(v){
        return `₹${Number(v || 0).toFixed(2)}`;
    }

    function getBaseUrl(){
        const here = window.location.href;
        return here.substring(0, here.lastIndexOf('/') + 1);
    }

    function getPrintUrl(id){
        const { type } = getCurrentTypeConfig();
        return `${getBaseUrl()}print.html?id=${id}&type=${type}`;
    }

    function buildWhatsAppMessage(row){
        const { numberField, dateField, amountField, label, type } = getCurrentTypeConfig();
        const billNo = `${row.series_code || ''}${row.series_code ? '-' : ''}${row[numberField] || ''}`;

        if(type === "quotation"){
            return [
                '*VAJRA LIGHTS & ELECTRICALS*',
                'QUOTATION',
                `Quotation No: ${billNo}`,
                `Date: ${row[dateField] || ''}`,
                `Customer: ${row.customer_name || ''}`,
                `Mobile: ${row.customer_mobile || ''}`,
                '',
                `TOTAL Item Amount : ₹  ${Number(row[amountField] || 0).toFixed(0)}`,
                '',
                '✨ Special Price Prepared Just For You!',
                '💡 Quality Products • Best Value • Trusted Service',
                '👉 Confirm your order to lock this price.',
                '',
                'CONTACT: 9495160771, 8606808063'
            ].join('\n');
        }

        return [
            '*VAJRA LIGHTS & ELECTRICALS*',
            `${label}`,
            `Bill No: ${billNo}`,
            `Date: ${row[dateField] || ''}`,
            `Customer: ${row.customer_name || ''}`,
            `Mobile: ${row.customer_mobile || ''}`,
            `Amount: ${formatMoney(row[amountField] || 0)}`,
            '',
            'THANK YOU FOR YOUR BUSINESS!',
            'CONTACT FOR ANY INFO: 9495160771, 8606808063',
        ].join('\n');
    }

    function shareWhatsAppText(id){
        const row = findReportRow(id);
        if(!row){
            alert("Bill not found.");
            return;
        }

        if(row.status === "CANCELLED"){
            alert("Cancelled bill cannot be shared.");
            return;
        }

        const text = encodeURIComponent(buildWhatsAppMessage(row));
        const mobile = String(row.customer_mobile || '').replace(/\D/g, '');
        const url = mobile
            ? `https://wa.me/91${mobile}?text=${text}`
            : `https://wa.me/?text=${text}`;

        window.open(url, '_blank');
    }

    async function generateBillImageBlob(id){
        const { type } = getCurrentTypeConfig();

        const iframe = document.createElement('iframe');
        iframe.style.position = 'fixed';
        iframe.style.left = '-99999px';
        iframe.style.top = '0';
        iframe.style.width = '1000px';
        iframe.style.height = '1400px';
        iframe.style.border = '0';
        iframe.src = `print.html?id=${id}&type=${type}`;
        document.body.appendChild(iframe);

        try {
            await new Promise((resolve, reject) => {
                iframe.onload = () => setTimeout(resolve, 1800);
                setTimeout(() => reject(new Error('Print page load timeout')), 12000);
            });

            const doc = iframe.contentDocument || iframe.contentWindow.document;
            const target = doc.body;

            const canvas = await html2canvas(target, {
                scale: 2,
                backgroundColor: '#ffffff',
                useCORS: true
            });

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1));
            if(!blob) throw new Error('Could not create image blob');

            return blob;
        } finally {
            iframe.remove();
        }
    }

    function getCleanIndianMobile(mobile){
        let m = String(mobile || '').replace(/\D/g, '');
        if(m.length > 10 && m.startsWith('91')) m = m.slice(-10);
        if(m.length > 10) m = m.slice(-10);
        return m;
    }

    function downloadBlob(blob, fileName){
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function showWhatsAppGodModeHelper({ copied, downloaded, mobile, text }){
        const old = document.getElementById('waGodModeOverlay');
        if(old) old.remove();

        const overlay = document.createElement('div');
        overlay.id = 'waGodModeOverlay';
        overlay.style.cssText = `
            position:fixed; inset:0; z-index:999999;
            background:rgba(0,0,0,.72); backdrop-filter:blur(6px);
            display:flex; align-items:center; justify-content:center; padding:18px;
        `;

        overlay.innerHTML = `
            <div style="width:min(520px,96vw); background:linear-gradient(135deg,#092018,#064e3b); color:white; border:1px solid rgba(255,255,255,.18); border-radius:22px; box-shadow:0 28px 80px rgba(0,0,0,.5); overflow:hidden; font-family:Arial,sans-serif;">
                <div style="padding:18px 20px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:space-between; gap:12px;">
                    <div style="font-size:20px; font-weight:900;">🚀 WhatsApp God Mode</div>
                    <button type="button" id="waGodClose" style="background:#ef4444;color:white;border:0;border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer;">✕</button>
                </div>
                <div style="padding:22px; line-height:1.55;">
                    <div style="font-size:17px;font-weight:800;margin-bottom:12px;">WhatsApp Web opened ${mobile ? 'for +' + '91' + mobile : ''}</div>
                    ${copied ? `
                        <div style="background:rgba(34,197,94,.20); border:1px solid rgba(34,197,94,.45); padding:14px; border-radius:16px; margin-bottom:12px;">
                            ✅ Bill image copied to clipboard.<br>
                            <b>Go to WhatsApp chat and press CTRL + V</b>, then press Enter/send.
                        </div>
                    ` : `
                        <div style="background:rgba(245,158,11,.20); border:1px solid rgba(245,158,11,.50); padding:14px; border-radius:16px; margin-bottom:12px;">
                            ⚠ Browser blocked image clipboard copy.
                            ${downloaded ? '<br>✅ Bill image downloaded. Attach it in WhatsApp Web.' : ''}
                        </div>
                    `}
                    <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;">
                        <button type="button" id="waCopyTextBtn" style="flex:1;min-width:150px;background:#22c55e;color:#052e1a;border:0;border-radius:14px;padding:12px;font-weight:900;cursor:pointer;">Copy Text</button>
                        <button type="button" id="waOpenAgainBtn" style="flex:1;min-width:150px;background:#facc15;color:#3b2500;border:0;border-radius:14px;padding:12px;font-weight:900;cursor:pointer;">Open Again</button>
                    </div>
                    <div style="font-size:12px;opacity:.8;margin-top:14px;">Desktop browsers do not allow websites to auto-paste or auto-send files inside WhatsApp Web. This is the fastest allowed method.</div>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);

        document.getElementById('waGodClose').onclick = () => overlay.remove();
        overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });

        document.getElementById('waCopyTextBtn').onclick = async () => {
            try {
                await navigator.clipboard.writeText(text || '');
                alert('✅ WhatsApp text copied.');
            } catch(e) {
                alert('Could not copy text.');
            }
        };

        document.getElementById('waOpenAgainBtn').onclick = () => {
            const encodedText = encodeURIComponent(text || '');
            const waUrl = mobile
                ? `https://web.whatsapp.com/send?phone=91${mobile}&text=${encodedText}`
                : `https://web.whatsapp.com/?text=${encodedText}`;
            window.open(waUrl, '_blank');
        };
    }

    async function shareWhatsAppImage(id){
        const row = findReportRow(id);
        if(!row){
            alert("Bill not found.");
            return;
        }

        if(row.status === "CANCELLED"){
            alert("Cancelled bill cannot be shared.");
            return;
        }

        try {
            const blob = await generateBillImageBlob(id);
            const { numberField } = getCurrentTypeConfig();
            const fileName = `bill_${row.series_code || ''}_${row[numberField] || id}.png`.replace(/\s+/g, '_');
            const file = new File([blob], fileName, { type: 'image/png' });
            const text = buildWhatsAppMessage(row);
            const encodedText = encodeURIComponent(text);
            const mobile = getCleanIndianMobile(row.customer_mobile);
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            // MOBILE: Direct system share with image + text
            if (isMobile && navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
                await navigator.share({
                    title: 'VAJRA Bill',
                    text,
                    files: [file]
                });
                return;
            }

            // DESKTOP: Best allowed method — copy image, open exact WhatsApp chat
            let copied = false;
            let downloaded = false;

            try {
                if(navigator.clipboard && window.ClipboardItem){
                    await navigator.clipboard.write([
                        new ClipboardItem({ 'image/png': blob })
                    ]);
                    copied = true;
                }
            } catch(clipErr){
                console.warn('Image clipboard copy failed:', clipErr);
            }

            if(!copied){
                downloadBlob(blob, fileName);
                downloaded = true;
            }

            const waUrl = mobile
                ? `https://web.whatsapp.com/send?phone=91${mobile}&text=${encodedText}`
                : `https://web.whatsapp.com/?text=${encodedText}`;

            window.open(waUrl, '_blank');

            showWhatsAppGodModeHelper({
                copied,
                downloaded,
                mobile,
                text
            });

        } catch (err) {
            console.error(err);
            shareWhatsAppText(id);
            alert('Could not generate bill image. Opened WhatsApp text share instead.');
        }
    }

    function toggleRemarkColumn(){
        const type = document.getElementById("report_type").value;
        const header = document.getElementById("remark_header");

        if(header){
            header.style.display = (type === "quotation") ? "" : "none";
        }
    }

    async function loadReport() {
        const cfg = getCurrentTypeConfig();
        const type = cfg.type;
        toggleRemarkColumn();

        const from = document.getElementById('from_date').value;
        const to = document.getElementById('to_date').value;
        const series = document.getElementById('series_filter').value;
        const customer = document.getElementById('customer_filter').value.trim();
        const mobile = document.getElementById('mobile_filter').value.trim();
        const salesmanFilter = document.getElementById('salesman_filter').value.trim();
        const createdByFilter = document.getElementById('created_by_filter').value.trim();

        document.getElementById("report_title").innerText =
            type === "sales_pack" ? "Sales + Packing Report" :
            type === "quotation" ? "Quotation Report" :
            type === "sales_order" ? "Sales Order Report" :
            "Sales Report";

        let query = sb
            .from(cfg.table)
            .select('*')
            .order(cfg.numberField, { ascending:false });

        if(from) query = query.gte(cfg.dateField, from);
        if(to) query = query.lte(cfg.dateField, to);
        if(series) query = query.eq('series_code', series);
        if(customer) query = query.ilike('customer_name', `%${customer}%`);
        if(mobile) query = query.ilike('customer_mobile', `%${mobile}%`);

        const { data, error } = await query;

        if(error){
            alert(error.message);
            console.error(error);
            return;
        }

        let rows = data || [];

        if(salesmanFilter){
            rows = rows.filter(r =>
                normalizeText(r.salesman).includes(normalizeText(salesmanFilter))
            );
        }

        if(createdByFilter){
            rows = rows.filter(r =>
                normalizeText(getCreatedByValue(r)).includes(normalizeText(createdByFilter))
            );
        }

        const billIds = rows.map(r => Number(r.id)).filter(Boolean);
        const billIssueMap = await getBillIssueMap(type, billIds);

        rows = rows.map(r => ({
            ...r,
            issueReasons: billIssueMap.get(Number(r.id)) || [],
            hasMissingItem: (billIssueMap.get(Number(r.id)) || []).length > 0
        }));

        currentRows = rows;

        const body = document.getElementById('report_body');
        body.innerHTML = '';

        let totalSum = 0;

        for(let s of rows){
            const amount = parseFloat(s[cfg.amountField] || 0);
            if(s.status !== "CANCELLED") totalSum += amount;

            const cancelInfo = s.status === "CANCELLED"
                ? `<div class="cancel-info">
                        Cancelled By: ${s.cancelled_by || ''}<br>
                        Reason: ${s.cancel_reason || ''}
                   </div>`
                : '';

            body.innerHTML += `
            <tr class="${
                s.status === "CANCELLED" ? 'cancelled-row' : ''
            } ${
                s.hasMissingItem ? 'missing-item-row' : ''
            } ${
                ((type === 'quotation' || type === 'sales_order') && s.converted)
                ? 'converted-row' : ''
            }" onclick="toggleDetails(${s.id})">

                <td>${s.series_code || ''}</td>

                <td>
                    ${s[cfg.numberField] || ''}
                    ${s.hasMissingItem ? '<span class="warn-badge">⚠</span>' : ''}
                    ${s.status === "CANCELLED" ? '<span class="cancelled-badge">CANCELLED</span>' : ''}
                    ${cancelInfo}
                </td>

                <td>${s[cfg.dateField] || ''}</td>
                <td title="${(s.issueReasons || []).join(', ')}">${s.customer_name || ''}${s.hasMissingItem ? `<div style="font-size:11px;color:#ffd6df;margin-top:4px;">${(s.issueReasons || []).join(', ')}</div>` : ''}</td>
                <td>${s.customer_mobile || ''}</td>
                <td>${s.salesman || ''}</td>
                <td>${getCreatedByValue(s) || ''}</td>
                <td>₹${amount.toFixed(2)}</td>

                ${type === "quotation" ? `
                    <td class="remark-report-cell">${s.remark || ''}</td>
                ` : ''}

                <td class="wa-col">
                    <button ${s.status === "CANCELLED" ? 'disabled title="Cancelled bill"' : ''} onclick="event.stopPropagation(); shareWhatsAppText(${s.id})">💬 Text</button>
                    <button ${s.status === "CANCELLED" ? 'disabled title="Cancelled bill"' : ''} onclick="event.stopPropagation(); shareWhatsAppImage(${s.id})">🖼 Image</button>
                </td>

                <td>
                    ${
                        type === "sales_pack"
                        ? `<button ${s.status === "CANCELLED" ? 'disabled title="Cancelled bill"' : ''} onclick="event.stopPropagation(); printSalesPacking(${s.id})">🧾📦 Sales + Packing</button>`
                        : `<button ${s.status === "CANCELLED" ? 'disabled title="Cancelled bill"' : ''} onclick="event.stopPropagation(); printDoc(${s.id})">🖨 Invoice</button>`
                    }

                    ${type === "sales" ? `
                        <button ${s.status === "CANCELLED" ? 'disabled title="Cancelled bill"' : ''} onclick="event.stopPropagation(); printPacking(${s.id})">📦 Packing</button>
                    ` : ""}
                </td>

                <td>
                    ${
                        canEditBills && s.status !== "CANCELLED"
                        ? `<button onclick="event.stopPropagation(); editDoc(${s.id})">✏ Edit</button>`
                        : s.status === "CANCELLED"
                            ? `<button disabled title="Cancelled bill">✏ Edit</button>`
                            : `<button disabled title="No permission">✏ Edit</button>`
                    }

                    ${
                        canEditBills && s.status !== "CANCELLED"
                        ? `<button class="cancel-btn" onclick="event.stopPropagation(); cancelDoc(${s.id})">❌ Cancel</button>`
                        : s.status === "CANCELLED"
                            ? `<span class="cancelled-badge">CANCELLED</span>`
                            : ""
                    }

                    ${(type === "quotation" || type === "sales_order") && !s.converted && s.status !== "CANCELLED" ? `
                        <br>
                        <button onclick="event.stopPropagation(); convertToSales(${s.id})">🔄 Convert</button>
                    ` : ""}
                </td>
            </tr>

            <tr id="details-${s.id}" style="display:none;">
                <td colspan="${type === 'quotation' ? 12 : 11}">
                    <div id="items-${s.id}">Loading...</div>
                </td>
            </tr>
            `;
        }

        body.innerHTML += `
        <tr class="total-row">
            <td colspan="7">TOTAL ACTIVE BILLS ONLY</td>
            <td>₹${totalSum.toFixed(2)}</td>
            ${type === "quotation" ? `<td></td>` : ''}
            <td colspan="3"></td>
        </tr>
        `;
    }

    async function toggleDetails(id){
        const type = document.getElementById("report_type").value;

        let table = "sales_item_details";
        let idField = "sales_id";

        if(type === "sales_pack"){
            table = "sales_packing_item_details";
            idField = "packing_id";
        }

        if(type === "quotation"){
            table = "quotation_item_details";
            idField = "quotation_id";
        }

        if(type === "sales_order"){
            table = "sales_order_item_details";
            idField = "sales_order_id";
        }

        const row = document.getElementById(`details-${id}`);
        const container = document.getElementById(`items-${id}`);

        if(row.style.display === "table-row"){
            row.style.display = "none";
            return;
        }

        row.style.display = "table-row";

        const { data, error } = await sb
            .from(table)
            .select('*')
            .eq(idField, id);

        if(error){
            container.innerHTML = "Error loading items";
            console.error(error);
            return;
        }

        if(!data || data.length === 0){
            container.innerHTML = `
                <div class="dropdown-wood">
                    <div class="missing-item-cell" style="padding:12px; border-radius:8px;">
                        ⚠ No item rows found in this bill.
                    </div>
                </div>
            `;
            return;
        }

        let html = `
        <div class="dropdown-wood">
        <table>
        <tr>
            <th>Item Code</th>
            <th>Item Name</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
        </tr>
        `;

        data.forEach(i => {
            const isMissing =
                !String(i.item_code || '').trim() ||
                !String(i.item_name || '').trim();

            const qty = parseFloat(i.quantity || 0);
            const basePrice = parseFloat(i.price || 0);
            const disc = parseFloat(i.discount_percent || 0);
            const price = basePrice - (basePrice * disc / 100);
            const total = parseFloat(i.sales_price_gst || 0) * qty;

            html += `
            <tr class="${isMissing ? 'missing-item-cell' : ''}">
                <td>${i.item_code || '❌ MISSING CODE'}</td>
                <td>${i.item_name || '❌ MISSING NAME'}</td>
                <td>${qty}</td>
                <td>₹${price.toFixed(2)}</td>
                <td>₹${total.toFixed(2)}</td>
            </tr>
            `;
        });

        html += "</table></div>";
        container.innerHTML = html;
    }

    function debounce(func, delay) {
        let timeout;
        return function() {
            clearTimeout(timeout);
            timeout = setTimeout(() => func(), delay);
        };
    }

    async function loadSeries() {
        const { data, error } = await sb
            .from('bill_series')
            .select('series_code');

        if (error) {
            console.error(error);
            return;
        }

        const select = document.getElementById('series_filter');
        select.innerHTML = `<option value="">All</option>`;

        (data || []).forEach(s => {
            select.innerHTML += `<option value="${s.series_code}">${s.series_code}</option>`;
        });

    async function getCancelAllowedProfile(){
        const profile = typeof getLoggedInProfile === "function" ? await getLoggedInProfile() : null;
        const role = String(profile?.role || "").toUpperCase();

        if(role !== "OWNER" && role !== "ADMIN"){
            return { allowed:false, profile, reason:"Only OWNER / ADMIN can cancel bills." };
        }

        return { allowed:true, profile, reason:"" };
    }

    function getProfileName(profile){
        return profile?.username || profile?.name || profile?.email || profile?.id || "UNKNOWN";
    }

    async function hasPaymentForBill(id, cfg){
        // This check is intentionally soft because some databases use different reference columns.
        // If the columns do not exist, it will not block cancellation.
        const possibleQueries = [
            { reference_id: id },
            { sales_id: id },
            { bill_id: id }
        ];

        for(const filter of possibleQueries){
            try {
                let q = sb.from("cash_transactions").select("id").limit(1);
                Object.entries(filter).forEach(([key, value]) => {
                    q = q.eq(key, value);
                });

                const { data, error } = await q;
                if(!error && data && data.length > 0){
                    return true;
                }
            } catch(e){
                console.warn("Payment check skipped for filter", filter, e);
            }
        }

        return false;
    }

    async function reverseStockForCancel(id, cfg, reason){
        if(cfg.type !== "sales" && cfg.type !== "sales_pack"){
            return { ok:true, message:"No stock reversal needed." };
        }

        let itemTable = "sales_item_details";
        let idField = "sales_id";
        let refType = "SALES_CANCEL";

        if(cfg.type === "sales_pack"){
            itemTable = "sales_packing_item_details";
            idField = "packing_id";
            refType = "SALES_PACK_CANCEL";
        }

        const { data: alreadyReversed, error: alreadyErr } = await sb
            .from("stock_ledger")
            .select("id")
            .eq("reference_id", id)
            .eq("txn_type", refType)
            .limit(1);

        if(alreadyErr){
            console.warn("Stock duplicate reverse check failed:", alreadyErr);
        }

        if(alreadyReversed && alreadyReversed.length > 0){
            return { ok:true, message:"Stock reversal was already done earlier." };
        }

        const { data: items, error: itemErr } = await sb
            .from(itemTable)
            .select("*")
            .eq(idField, id);

        if(itemErr){
            console.error(itemErr);
            return { ok:false, message:"Could not read bill items for stock reversal." };
        }

        const ledgerRows = (items || [])
            .filter(item => String(item.item_code || "").trim() && Number(item.quantity || 0) > 0)
            .map(item => ({
                item_code: item.item_code,
                qty_in: Number(item.quantity || 0),
                qty_out: 0,
                reference_id: id,
                txn_type: refType,
                remarks: `Cancelled ${cfg.label}: ${reason}`
            }));

        if(!ledgerRows.length){
            return { ok:true, message:"No valid stock items found to reverse." };
        }

        const { error: ledgerErr } = await sb
            .from("stock_ledger")
            .insert(ledgerRows);

        if(ledgerErr){
            console.error(ledgerErr);
            return { ok:false, message:"Stock reverse failed: " + ledgerErr.message };
        }

        return { ok:true, message:"Stock reversed successfully." };
    }

    async function cancelDoc(id){
        const cfg = getCurrentTypeConfig();
        const row = findReportRow(id);

        if(!row){
            alert("Bill not found.");
            return;
        }

        if(row.status === "CANCELLED"){
            alert("This bill is already cancelled.");
            return;
        }

        const access = await getCancelAllowedProfile();
        if(!access.allowed){
            alert("❌ " + access.reason);
            return;
        }

        const hasPayment = await hasPaymentForBill(id, cfg);
        if(hasPayment){
            alert("❌ Cannot cancel. Payment / cash transaction already exists for this bill.");
            return;
        }

        const billNo = `${row.series_code || ''}${row.series_code ? '-' : ''}${row[cfg.numberField] || id}`;
        const reason = prompt(`Enter cancel reason for ${cfg.label} ${billNo}:`);

        if(!reason || !reason.trim()){
            alert("Cancel reason is required.");
            return;
        }

        const impactMsg = `⚠ Cancel Impact:\n\n` +
            `Document: ${cfg.label}\n` +
            `Bill No: ${billNo}\n` +
            `Amount: ${formatMoney(row[cfg.amountField] || 0)}\n\n` +
            `• Bill will be marked as CANCELLED\n` +
            `${(cfg.type === "sales" || cfg.type === "sales_pack") ? "• Stock will be returned automatically\n" : "• No stock reversal needed\n"}` +
            `• Edit / Print / WhatsApp will be disabled\n` +
            `• Cancel reason, user and time will be saved\n\n` +
            `Continue?`;

        if(!confirm(impactMsg)) return;

        try {
            const profileName = getProfileName(access.profile);

            const { data: updatedRows, error } = await sb
                .from(cfg.table)
                .update({
                    status: "CANCELLED",
                    cancelled_at: new Date().toISOString(),
                    cancelled_by: profileName,
                    cancel_reason: reason.trim()
                })
                .eq("id", id)
                .neq("status", "CANCELLED")
                .select("id");

            if(error){
                alert("Cancel failed: " + error.message);
                console.error(error);
                return;
            }

            if(!updatedRows || updatedRows.length === 0){
                alert("This bill may already be cancelled or could not be updated.");
                loadReport();
                return;
            }

            const stockResult = await reverseStockForCancel(id, cfg, reason.trim());

            if(!stockResult.ok){
                alert("Bill cancelled, but stock reverse failed.\n\n" + stockResult.message);
                loadReport();
                return;
            }

            alert("✅ Cancelled successfully.\n" + stockResult.message);
            loadReport();

        } catch(err){
            console.error(err);
            alert("Something went wrong while cancelling.");
        }
    }

    async function editDoc(id){
        let allowed = false;

        if (typeof hasActionAccess === "function") {
            allowed = await hasActionAccess("sales_edit");
        } else {
            const profile = await getLoggedInProfile();
            if (profile) {
                const role = String(profile.role || "").toUpperCase();
                if (role === "OWNER" || role === "ADMIN") {
                    allowed = true;
                } else {
                    const { data, error } = await sb
                        .from("user_page_access")
                        .select("allowed")
                        .eq("user_id", profile.id)
                        .eq("page_key", "sales_edit")
                        .maybeSingle();

                    if (!error && data && data.allowed === true) {
                        allowed = true;
                    }
                }
            }
        }

        if(!allowed){
            alert("You do not have permission to edit bills.");
            return;
        }

        const row = findReportRow(id);
        if(row && row.status === "CANCELLED"){
            alert("Cancelled bill cannot be edited.");
            return;
        }

        const type = document.getElementById("report_type").value;

        if(type === "sales"){
            window.location = `newsoq.html?edit=${id}&type=sales`;
        }

        if(type === "sales_pack"){
            window.location = `newsoq.html?edit=${id}&type=sales_pack`;
        }

        if(type === "quotation"){
            window.location = `newsoq.html?edit=${id}&type=quotation`;
        }

        if(type === "sales_order"){
            window.location = `newsoq.html?edit=${id}&type=sales_order`;
        }
    }

    function convertToSales(id){
        const type = document.getElementById("report_type").value;
        const row = findReportRow(id);

        if(row && row.status === "CANCELLED"){
            alert("Cancelled document cannot be converted.");
            return;
        }

        if(!confirm("Convert this document to Sales?")) return;

        if(type === "quotation"){
            window.open(`newsoq.html?convert=${id}`, "_blank");
        }

        if(type === "sales_order"){
            window.open(`newsoq.html?convert_so=${id}`, "_blank");
        }
    }


    function unlockSalesPackingReport(){
        if(packingUnlocked) return;

        packingUnlocked = true;

        const select = document.getElementById("report_type");
        let option = select.querySelector('option[value="sales_pack"]');

        if(!option){
            option = document.createElement("option");
            option.value = "sales_pack";
            option.textContent = "Sales + Packing";

            const quotationOption = select.querySelector('option[value="quotation"]');
            if(quotationOption){
                select.insertBefore(option, quotationOption);
            } else {
                select.appendChild(option);
            }
        }

        select.value = "sales_pack";
        loadReport();
        alert("🔓 Sales + Packing Report Unlocked");
    }

    document.addEventListener("keydown", (e) => {
        // Secret shortcut: Shift + P
        if(e.shiftKey && e.key.toLowerCase() === "p"){
            e.preventDefault();
            unlockSalesPackingReport();
        }
    });

    document.addEventListener("DOMContentLoaded", async () => {
        const ok = await requirePageAccess("sales");
        if (!ok) return;

        const today = new Date().toISOString().split("T")[0];
        document.getElementById("from_date").value = today;
        document.getElementById("to_date").value = today;

        if (typeof hasActionAccess === "function") {
            canEditBills = await hasActionAccess("sales_edit");
        } else {
            const profile = await getLoggedInProfile();
            if (profile) {
                const role = String(profile.role || "").toUpperCase();
                if (role === "OWNER" || role === "ADMIN") {
                    canEditBills = true;
                } else {
                    const { data, error } = await sb
                        .from("user_page_access")
                        .select("allowed")
                        .eq("user_id", profile.id)
                        .eq("page_key", "sales_edit")
                        .maybeSingle();

                    if (!error && data && data.allowed === true) {
                        canEditBills = true;
                    }
                }
            }
        }

        toggleRemarkColumn();
        await loadSeries();
        loadReport();

        document.getElementById("from_date").addEventListener("change", loadReport);
        document.getElementById("to_date").addEventListener("change", loadReport);
        document.getElementById("series_filter").addEventListener("change", loadReport);
        document.getElementById("report_type").addEventListener("change", () => {
            toggleRemarkColumn();
            loadReport();
        });

        document.getElementById("customer_filter").addEventListener("input", debounce(loadReport, 400));
        document.getElementById("mobile_filter").addEventListener("input", debounce(loadReport, 400));
        document.getElementById("salesman_filter").addEventListener("input", debounce(loadReport, 400));
        document.getElementById("created_by_filter").addEventListener("input", debounce(loadReport, 400));
    });
