<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" type="image/x-icon">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="manifest" href="site.webmanifest">

<style>
:root {
    --primary:#2563eb;
    --accent:#059669;
    --danger:#dc2626;
    --border:#cbd5e1;
    --text:#1e293b;
}
body{
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    margin:0;
    padding:10px;
    background-image:url('background.jpg');
    background-size:cover;
    background-attachment:fixed;
    color:var(--text);
    height:100vh;
    overflow:hidden;
    font-size:14px;
}
.container{
    max-width:100%;
    height:96vh;
    display:flex;
    flex-direction:column;
    background:rgba(255,255,255,0.04);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}
.header-section{
    padding:12px 15px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:12px;
    align-items:flex-end;
    background:#020617;
    flex-wrap:wrap;
}
.form-group{
    display:flex;
    flex-direction:column;
}
.form-group label{
    font-size:11px;
    font-weight:700;
    color:#94a3b8;
    margin-bottom:3px;
    text-transform:uppercase;
}
.form-control{
    padding:6px 10px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    font-size:14px;
    height:32px;
    box-sizing:border-box;
}
.w-sm{ width:120px; }
.w-md{ width:170px; }
.w-lg{ width:240px; }
.w-xl{ width:280px; }

.grand-total-box{
    margin-left:auto;
    background:#111827;
    color:#fff;
    padding:5px 20px;
    border-radius:6px;
    min-width:180px;
    text-align:right;
}
.grand-total-box span{
    font-size:10px;
    display:block;
    opacity:.8;
}
.grand-total-box div{
    font-size:24px;
    font-weight:800;
}

.items-container{
    flex:1;
    overflow:auto;
    background:rgba(0,0,0,.72);
}
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}
thead{
    background:#f1f5f9;
    position:sticky;
    top:0;
    z-index:5;
}
th{
    padding:8px;
    text-align:left;
    font-size:11px;
    border-bottom:1px solid #cbd5e1;
    color:#475569;
}
td{
    border-bottom:1px solid #1e293b;
    padding:0;
}
td input{
    width:100%;
    border:none;
    padding:8px 5px;
    font-size:13px;
    color:#fff;
    background:transparent;
    box-sizing:border-box;
}
td input:focus{
    outline:none;
    box-shadow:inset 0 0 0 2px var(--primary);
}
.readonly-cell{
    color:#e2e8f0;
    padding:8px 5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.readonly-strong{
    color:#fff;
    font-weight:700;
}
.footer-section{
    padding:10px 20px;
    border-top:1px solid var(--border);
    background:#000;
    display:flex;
    justify-content:flex-end;
    gap:12px;
    flex-wrap:wrap;
}
.btn{
    padding:10px 22px;
    border:none;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
}
.btn-update{ background:var(--accent); color:#fff; }
.btn-back{ background:#e2e8f0; color:#0f172a; }

.col-idx{ width:40px; text-align:center; }
.col-code{ width:120px; }
.col-name{ width:auto; }
.col-sold{ width:100px; }
.col-old{ width:110px; }
.col-new{ width:110px; }
.col-price{ width:110px; }
.col-amt{ width:120px; }
.col-mode{ width:150px; }
.mode-badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    background:#fef3c7;
    color:#92400e;
    font-size:11px;
    font-weight:800;
}
.price-input{
    font-weight:700;
    color:#fff;
}

.col-act{ width:80px; }
.manual-add-only{ display:none; }
body.without-bill-mode .manual-add-only{ display:inline-block; }
.autocomplete-wrapper{ position:relative; width:100%; height:100%; }
.autocomplete-list{
    position:absolute;
    top:100%;
    left:0;
    width:min(900px, calc(100vw - 60px));
    max-height:260px;
    overflow:auto;
    background:#fff;
    border:1px solid #94a3b8;
    box-shadow:0 8px 25px rgba(0,0,0,.35);
    z-index:9999;
    display:none;
}
.autocomplete-table{ width:100%; border-collapse:collapse; min-width:720px; table-layout:auto; }
.autocomplete-table th,.autocomplete-table td{ color:#111827; background:#fff; border:1px solid #cbd5e1; padding:6px; font-size:12px; white-space:nowrap; }
.autocomplete-table th{ background:#e2e8f0; }
.autocomplete-row:hover,.autocomplete-row.selected{ background:#dbeafe !important; cursor:pointer; }
.btn-add{ background:#7c3aed; color:#fff; }
.btn-remove{ background:#dc2626; color:#fff; padding:7px 10px; border:none; border-radius:5px; cursor:pointer; font-weight:800; }
body:not(.without-bill-mode) .col-act, body:not(.without-bill-mode) .manual-add-only{ display:none; }

</style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="form-group">
            <label>Return ID</label>
            <input id="return_id" class="form-control w-sm" readonly>
        </div>
        <div class="form-group">
            <label>Original Sale ID / Mode</label>
            <input id="sale_ref" class="form-control w-md" readonly>
        </div>
        <div class="form-group">
            <label>Customer Name</label>
            <input id="cust_name" class="form-control w-lg" readonly>
        </div>
        <div class="form-group">
            <label>Customer Mobile</label>
            <input id="cust_mobile" class="form-control w-md" readonly>
        </div>
        <div class="form-group">
            <label>Bill No</label>
            <input id="bill_no" class="form-control w-md" readonly>
        </div>

        <div class="grand-total-box">
            <span>UPDATED RETURN TOTAL</span>
            <div id="return_total">₹0.00</div>
        </div>
    </div>

    <div class="items-container">
        <table>
            <thead>
                <tr>
                    <th class="col-idx">#</th>
                    <th class="col-code">Item Code</th>
                    <th class="col-name">Item Name</th>
                    <th class="col-sold" id="qty_head_label">Sold Qty</th>
                    <th class="col-old">Old Return</th>
                    <th class="col-new">New Return</th>
                    <th class="col-price">Price+GST</th>
                    <th class="col-amt">Amount</th>
                    <th class="col-act manual-add-only">Remove</th>
                </tr>
            </thead>
            <tbody id="items_body"></tbody>
        </table>
    </div>

    <div class="footer-section">
        <button class="btn btn-add manual-add-only" onclick="addManualModifyRow()">+ Add Item</button>
        <button class="btn btn-back" onclick="window.location.href='sales_return_report.html'">Back</button>
        <button class="btn btn-update" id="btn_update_return" onclick="updateReturn()">Update Return</button>
    </div>
</div>

<script>
    const sb = window.sbcc; // supabase client from supabaseClient.js
  document.addEventListener("DOMContentLoaded", async () => {
  const ok = await requirePageAccess("sales");
  if (!ok) return;
  });

let currentReturnId = null;
let currentSaleId = null;
let oldReturnItems = [];
let isWithoutBillReturn = false;
let stockMaster = [];
let stockLoaded = false;

function hasValidOriginalSaleId(value){
    const v = String(value ?? "").trim();
    if(!v) return false;
    if(v === "0") return false;
    if(v.toUpperCase() === "NULL") return false;
    if(v.toUpperCase().includes("WITHOUT")) return false;
    return true;
}

window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const returnId = params.get("id");

    if(!returnId){
        alert("Return id missing");
        window.location.href = "sales_return_report.html";
        return;
    }

    currentReturnId = returnId;
    await loadStockMaster();
    await loadSavedReturn(returnId);
};

async function loadSavedReturn(returnId){
    const { data: returnHead, error: headErr } = await sb
        .from("sales_return_details")
        .select("*")
        .eq("id", returnId)
        .maybeSingle();

    if(headErr || !returnHead){
        alert("Saved return not found");
        return;
    }

    if(returnHead.is_accepted){
        alert("This return is already accepted and cannot be modified.");
        window.location.href = "sales_return_report.html";
        return;
    }

    currentSaleId = hasValidOriginalSaleId(returnHead.original_sales_id) ? returnHead.original_sales_id : null;
    isWithoutBillReturn = !hasValidOriginalSaleId(returnHead.original_sales_id);
    document.body.classList.toggle("without-bill-mode", isWithoutBillReturn);

    document.getElementById("return_id").value = returnHead.id || "";
    document.getElementById("sale_ref").value = isWithoutBillReturn ? "WITHOUT BILL" : currentSaleId;
    document.getElementById("qty_head_label").innerText = isWithoutBillReturn ? "Ref Qty" : "Sold Qty";

    const { data: returnItems, error: retItemsErr } = await sb
        .from("sales_return_item_details")
        .select("*")
        .eq("return_id", returnId)
        .order("id", { ascending:true });

    if(retItemsErr){
        console.error(retItemsErr);
        alert("Error loading saved return items");
        return;
    }

    oldReturnItems = returnItems || [];

    if(isWithoutBillReturn){
        document.getElementById("cust_name").value = returnHead.customer_name || "";
        document.getElementById("cust_mobile").value = returnHead.customer_mobile || "";
        document.getElementById("bill_no").value = "WITHOUT BILL";
        renderWithoutBillReturnItems(oldReturnItems);
        return;
    }

    const { data: sale, error: saleErr } = await sb
        .from("sales_details")
        .select("*")
        .eq("id", currentSaleId)
        .maybeSingle();

    if(saleErr || !sale){
        console.warn("Original sales bill not found. Loading this return as WITHOUT BILL / missing bill return.", saleErr);
        isWithoutBillReturn = true;
        document.body.classList.add("without-bill-mode");
        currentSaleId = null;
        document.getElementById("sale_ref").value = "WITHOUT BILL";
        document.getElementById("qty_head_label").innerText = "Ref Qty";
        document.getElementById("cust_name").value = returnHead.customer_name || "";
        document.getElementById("cust_mobile").value = returnHead.customer_mobile || "";
        document.getElementById("bill_no").value = "WITHOUT BILL";
        renderWithoutBillReturnItems(oldReturnItems);
        return;
    }

    document.getElementById("cust_name").value = sale.customer_name || "";
    document.getElementById("cust_mobile").value = sale.customer_mobile || "";
    document.getElementById("bill_no").value = `${sale.series_code || ""}-${sale.sales_number || ""}`;

    const { data: salesItems, error: itemsErr } = await sb
        .from("sales_item_details")
        .select("*")
        .eq("sales_id", currentSaleId);

    if(itemsErr){
        console.error(itemsErr);
        alert("Error loading sales items");
        return;
    }

    const oldMap = {};
    oldReturnItems.forEach(item => {
        oldMap[item.item_code] = item;
    });

    const tbody = document.getElementById("items_body");
    tbody.innerHTML = "";

    (salesItems || []).forEach((item, idx) => {
        const oldRet = oldMap[item.item_code]?.return_qty || 0;
        const price = parseFloat(item.sales_price || 0);
        const priceGst = parseFloat(item.sales_price_gst || 0);
        const gstPercent = parseFloat(item.gst_percent || 0);
        const hsnCode = item.hsn_code || "";
        const amount = parseFloat(oldRet || 0) * priceGst;

        const tr = document.createElement("tr");
        tr.setAttribute("data-item-code", item.item_code || "");
        tr.innerHTML = `
            <td><div class="readonly-cell">${idx + 1}</div></td>
            <td><div class="readonly-cell">${item.item_code || ""}</div></td>
            <td><div class="readonly-cell readonly-strong">${item.item_name || ""}</div></td>
            <td><div class="readonly-cell sold-qty">${parseFloat(item.quantity || 0).toFixed(2)}</div></td>
            <td><div class="readonly-cell old-ret">${parseFloat(oldRet || 0).toFixed(2)}</div></td>
            <td>
                <input type="number"
                       class="new-ret-qty"
                       min="0"
                       max="${parseFloat(item.quantity || 0)}"
                       step="0.01"
                       value="${parseFloat(oldRet || 0).toFixed(2)}">
            </td>
            <td><div class="readonly-cell price-gst">${priceGst.toFixed(2)}</div></td>
            <td><input type="text" class="ret-amount" readonly value="${amount.toFixed(2)}"></td>
            <td style="display:none"><div class="price">${price.toFixed(2)}</div></td>
            <td style="display:none"><div class="gst-percent">${gstPercent.toFixed(2)}</div></td>
            <td style="display:none"><div class="hsn-code">${hsnCode}</div></td>
            <td class="col-act manual-add-only"></td>
        `;
        tbody.appendChild(tr);
    });

    bindEvents();
    calcTotal();
}

function renderWithoutBillReturnItems(returnItems){
    const tbody = document.getElementById("items_body");
    tbody.innerHTML = "";

    (returnItems || []).forEach((item, idx) => {
        const returnQty = parseFloat(item.return_qty || item.quantity || 0) || 0;
        const oldRet = returnQty;
        const soldQty = parseFloat(item.sold_qty || returnQty || 0) || 0;
        const priceGst = parseFloat(item.price_gst || item.sales_price_gst || 0) || 0;
        const gstPercent = parseFloat(item.gst_percent || 0) || 0;
        let price = parseFloat(item.price || 0) || 0;
        if(!price && priceGst && gstPercent){
            price = priceGst / (1 + (gstPercent / 100));
        }
        const amount = returnQty * priceGst;

        const tr = document.createElement("tr");
        tr.setAttribute("data-item-code", item.item_code || "");
        tr.innerHTML = `
            <td><div class="readonly-cell">${idx + 1}</div></td>
            <td><div class="readonly-cell">${item.item_code || ""}</div></td>
            <td><div class="readonly-cell readonly-strong">${item.item_name || ""}</div></td>
            <td><div class="readonly-cell sold-qty">${soldQty.toFixed(2)}</div></td>
            <td><div class="readonly-cell old-ret">${oldRet.toFixed(2)}</div></td>
            <td>
                <input type="number"
                       class="new-ret-qty"
                       min="0"
                       step="0.01"
                       value="${returnQty.toFixed(2)}">
            </td>
            <td><input type="number" class="price-gst price-input" min="0" step="0.01" value="${priceGst.toFixed(2)}"></td>
            <td><input type="text" class="ret-amount" readonly value="${amount.toFixed(2)}"></td>
            <td style="display:none"><div class="price">${price.toFixed(2)}</div></td>
            <td style="display:none"><div class="gst-percent">${gstPercent.toFixed(2)}</div></td>
            <td style="display:none"><div class="hsn-code">${item.hsn_code || ""}</div></td>
            <td class="col-act manual-add-only"></td>
        `;
        tbody.appendChild(tr);
    });

    bindEvents();
    calcTotal();
}


async function loadStockMaster(){
    stockLoaded = false;
    stockMaster = [];
    let allItems = [];
    let from = 0;
    const pageSize = 1000;

    while(true){
        const { data, error } = await sb
            .from("stock_balance_view")
            .select("item_code,item_name,barcode,price1,price2,price3,price3_gst,landing,balance,gst_percent,hsn_code,department")
            .order("item_code", { ascending:true })
            .range(from, from + pageSize - 1);

        if(error){
            console.error(error);
            alert("Error loading stock items for adding new return item");
            return;
        }

        if(!data || !data.length) break;
        allItems = allItems.concat(data);
        if(data.length < pageSize) break;
        from += pageSize;
    }

    const unique = new Map();
    allItems.forEach(item => {
        const code = String(item.item_code || "").trim().toUpperCase();
        if(code) unique.set(code, item);
    });
    stockMaster = Array.from(unique.values());
    stockLoaded = true;
}

function normalizeSearchText(value){
    return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g," ").replace(/\s+/g," ").trim();
}

function searchReturnStock(query, field){
    const normalizedQuery = normalizeSearchText(query);
    if(!normalizedQuery) return [];
    const terms = normalizedQuery.split(" ").filter(Boolean);

    const scored = stockMaster.map(item => {
        const codeRaw = String(item.item_code || "");
        const nameRaw = String(item.item_name || "");
        const barcodeRaw = String(item.barcode || "");
        const code = normalizeSearchText(codeRaw);
        const name = normalizeSearchText(nameRaw);
        const barcode = normalizeSearchText(barcodeRaw);
        const primary = field === "item_code" ? code : name;
        const secondary = field === "item_code" ? name : code;
        const all = `${code} ${name} ${barcode}`;

        const matched = terms.every(t => primary.includes(t)) || terms.every(t => secondary.includes(t)) || terms.every(t => all.includes(t));
        if(!matched) return null;

        let score = 0;
        if(primary === normalizedQuery) score += 1000;
        if(secondary === normalizedQuery) score += 900;
        if(barcode === normalizedQuery) score += 850;
        if(primary.startsWith(normalizedQuery)) score += 700;
        if(secondary.startsWith(normalizedQuery)) score += 650;
        if(barcode.startsWith(normalizedQuery)) score += 600;
        for(const t of terms){
            if(code.includes(t)) score += 40;
            if(name.includes(t)) score += 40;
            if(barcode.includes(t)) score += 35;
        }
        return { item, score };
    }).filter(Boolean);

    scored.sort((a,b) => b.score - a.score || String(a.item.item_name || "").localeCompare(String(b.item.item_name || "")));
    return scored.slice(0, 40).map(x => x.item);
}

function closeAllDropdowns(){
    document.querySelectorAll(".autocomplete-list").forEach(list => {
        list.style.display = "none";
        list.innerHTML = "";
    });
}

document.addEventListener("click", (e) => {
    if(!e.target.closest(".autocomplete-wrapper")) closeAllDropdowns();
});

function addManualModifyRow(itemData = {}){
    if(!isWithoutBillReturn){
        alert("Add item is available only for WITHOUT BILL returns.");
        return;
    }

    const tbody = document.getElementById("items_body");
    const idx = tbody.querySelectorAll("tr").length + 1;
    const gstPercent = parseFloat(itemData.gst_percent || 0) || 0;
    const basePrice = parseFloat(itemData.price3 || itemData.price || 0) || 0;
    let priceGst = parseFloat(itemData.price3_gst || itemData.price_gst || 0) || 0;
    if(!priceGst && basePrice){
        priceGst = basePrice * (1 + gstPercent / 100);
    }

    const tr = document.createElement("tr");
    tr.setAttribute("data-item-code", itemData.item_code || "");
    tr.setAttribute("data-new-manual-row", "1");
    tr.innerHTML = `
        <td><div class="readonly-cell">${idx}</div></td>
        <td>
            <div class="autocomplete-wrapper">
                <input type="text" class="manual-code" value="${itemData.item_code || ""}" placeholder="Item code" autocomplete="off">
                <div class="autocomplete-list code-list"></div>
            </div>
        </td>
        <td>
            <div class="autocomplete-wrapper">
                <input type="text" class="manual-name" value="${itemData.item_name || ""}" placeholder="Item name" autocomplete="off">
                <div class="autocomplete-list name-list"></div>
            </div>
        </td>
        <td><input type="number" class="sold-qty" value="0" step="0.01" min="0" placeholder="0.00"></td>
        <td><div class="readonly-cell old-ret">0.00</div></td>
        <td><input type="number" class="new-ret-qty" min="0" step="0.01" value="0"></td>
        <td><input type="number" class="price-gst price-input" min="0" step="0.01" value="${priceGst.toFixed(2)}"></td>
        <td><input type="text" class="ret-amount" readonly value="0.00"></td>
        <td style="display:none"><div class="price">${basePrice.toFixed(2)}</div></td>
        <td style="display:none"><div class="gst-percent">${gstPercent.toFixed(2)}</div></td>
        <td style="display:none"><div class="hsn-code">${itemData.hsn_code || ""}</div></td>
        <td class="col-act manual-add-only"><button type="button" class="btn-remove" onclick="removeManualModifyRow(this)">X</button></td>
    `;
    tbody.appendChild(tr);
    bindManualModifyRowEvents(tr);
    bindEvents();
    renumberRows();

    const code = tr.querySelector(".manual-code");
    if(code){ code.focus(); code.select(); }
}

function removeManualModifyRow(btn){
    const tr = btn.closest("tr");
    if(tr) tr.remove();
    renumberRows();
    calcTotal();
}

function renumberRows(){
    document.querySelectorAll("#items_body tr").forEach((tr, idx) => {
        const first = tr.querySelector("td:first-child .readonly-cell");
        if(first) first.innerText = idx + 1;
    });
}

function bindManualModifyRowEvents(tr){
    const codeInput = tr.querySelector(".manual-code");
    const nameInput = tr.querySelector(".manual-name");
    const codeList = tr.querySelector(".code-list");
    const nameList = tr.querySelector(".name-list");
    const refQtyInput = tr.querySelector(".sold-qty");
    const priceInput = tr.querySelector(".price-gst");
    const qtyInput = tr.querySelector(".new-ret-qty");

    const applyItem = (item) => {
        if(!item) return;
        const gstPercent = parseFloat(item.gst_percent || 0) || 0;
        const basePrice = parseFloat(item.price3 || 0) || 0;
        let priceGst = parseFloat(item.price3_gst || 0) || 0;
        if(!priceGst && basePrice){
            priceGst = basePrice * (1 + gstPercent / 100);
        }

        tr.setAttribute("data-item-code", item.item_code || "");
        codeInput.value = item.item_code || "";
        nameInput.value = item.item_name || "";
        priceInput.value = (priceGst || 0).toFixed(2);
        tr.querySelector(".price").innerText = basePrice.toFixed(2);
        tr.querySelector(".gst-percent").innerText = gstPercent.toFixed(2);
        tr.querySelector(".hsn-code").innerText = item.hsn_code || "";
        closeAllDropdowns();
        calcRow(qtyInput);
        qtyInput.focus();
        qtyInput.select();
    };

    const renderMatches = (input, list, field) => {
        if(!stockLoaded){
            list.innerHTML = `<div style="padding:8px;color:#111827;background:#fff;">Loading stock...</div>`;
            list.style.display = "block";
            return;
        }
        const val = input.value || "";
        if(val.trim().length < 1){
            list.style.display = "none";
            list.innerHTML = "";
            return;
        }
        const matches = searchReturnStock(val, field);
        if(!matches.length){
            list.style.display = "none";
            list.innerHTML = "";
            return;
        }

        let html = `<table class="autocomplete-table"><tr><th>Item</th><th>Code</th><th>Stock</th><th>P3</th><th>Landing</th></tr>`;
        matches.forEach((item, idx) => {
            html += `<tr class="autocomplete-row" data-idx="${idx}"><td>${item.item_name || ""}</td><td>${item.item_code || ""}</td><td>${item.balance || 0}</td><td>₹${item.price3 || item.price3_gst || 0}</td><td>₹${item.landing || 0}</td></tr>`;
        });
        html += `</table>`;
        list.innerHTML = html;
        list.style.display = "block";
        list.querySelectorAll(".autocomplete-row").forEach((row, idx) => row.addEventListener("click", () => applyItem(matches[idx])));
        const first = list.querySelector(".autocomplete-row");
        if(first) first.classList.add("selected");
    };

    const listNav = (e, list) => {
        if(getComputedStyle(list).display === "none") return false;
        const rows = Array.from(list.querySelectorAll(".autocomplete-row"));
        if(!rows.length) return false;
        let idx = rows.findIndex(r => r.classList.contains("selected"));
        if(e.key === "ArrowDown"){
            e.preventDefault(); idx = Math.min(idx + 1, rows.length - 1);
        } else if(e.key === "ArrowUp"){
            e.preventDefault(); idx = Math.max(idx - 1, 0);
        } else if(e.key === "Enter"){
            e.preventDefault(); (rows[idx] || rows[0]).click(); return true;
        } else if(e.key === "Escape"){
            list.style.display = "none"; return true;
        } else return false;
        rows.forEach(r => r.classList.remove("selected"));
        if(rows[idx]){ rows[idx].classList.add("selected"); rows[idx].scrollIntoView({ block:"nearest" }); }
        return true;
    };

    [codeInput, nameInput].forEach(inp => inp.addEventListener("input", () => inp.value = inp.value.toUpperCase()));
    codeInput.addEventListener("input", () => renderMatches(codeInput, codeList, "item_code"));
    nameInput.addEventListener("input", () => renderMatches(nameInput, nameList, "item_name"));
    codeInput.addEventListener("keydown", (e) => {
        if(listNav(e, codeList)) return;
        if(e.key === "Enter"){
            e.preventDefault();
            const code = String(codeInput.value || "").trim().toUpperCase();
            const exact = stockMaster.find(i => String(i.item_code || "").trim().toUpperCase() === code);
            if(exact) applyItem(exact); else nameInput.focus();
        }
    });
    nameInput.addEventListener("keydown", (e) => {
        if(listNav(e, nameList)) return;
        if(e.key === "Enter"){
            e.preventDefault();
            refQtyInput.focus(); refQtyInput.select();
        }
    });
    refQtyInput.addEventListener("input", () => calcRow(refQtyInput));
    refQtyInput.addEventListener("keydown", (e) => { if(e.key === "Enter"){ e.preventDefault(); priceInput.focus(); priceInput.select(); } });
    priceInput.addEventListener("keydown", (e) => { if(e.key === "Enter"){ e.preventDefault(); qtyInput.focus(); qtyInput.select(); } });
}

function getRowItemName(row){
    const manualName = row.querySelector(".manual-name");
    if(manualName) return manualName.value.trim();
    return row.children[2]?.innerText.trim() || "";
}

function getRowItemCode(row){
    const manualCode = row.querySelector(".manual-code");
    if(manualCode) return manualCode.value.trim();
    return row.getAttribute("data-item-code") || row.children[1]?.innerText.trim() || "";
}


function bindEvents(){
    document.querySelectorAll(".new-ret-qty").forEach(inp => {
        if(inp.dataset.boundModify === "1") return;
        inp.dataset.boundModify = "1";
        inp.addEventListener("input", () => calcRow(inp));
        inp.addEventListener("keydown", (e) => {
            if(["e","+","-"].includes(e.key)) e.preventDefault();
            moveFocus(e);
        });
        inp.addEventListener("focus", () => inp.select());
    });

    document.querySelectorAll(".price-gst.price-input").forEach(inp => {
        if(inp.dataset.boundPriceModify === "1") return;
        inp.dataset.boundPriceModify = "1";
        inp.addEventListener("input", () => calcRow(inp));
        inp.addEventListener("keydown", (e) => {
            if(["e","+","-"].includes(e.key)) e.preventDefault();
        });
        inp.addEventListener("focus", () => inp.select());
    });
}

function moveFocus(e){
    const inputs = Array.from(document.querySelectorAll(".new-ret-qty"));
    const idx = inputs.indexOf(e.target);
    if(idx === -1) return;

    if(e.key === "Enter" || e.key === "ArrowDown"){
        e.preventDefault();
        if(inputs[idx + 1]){
            inputs[idx + 1].focus();
            inputs[idx + 1].select();
        }
    } else if(e.key === "ArrowUp"){
        e.preventDefault();
        if(inputs[idx - 1]){
            inputs[idx - 1].focus();
            inputs[idx - 1].select();
        }
    }
}

function getElementNumber(el){
    if(!el) return 0;
    const raw = ("value" in el) ? el.value : el.innerText;
    return parseFloat(raw) || 0;
}

function calcRow(input){
    const tr = input.closest("tr");
    const soldQty = getElementNumber(tr.querySelector(".sold-qty"));
    const priceGst = getElementNumber(tr.querySelector(".price-gst"));
    const qtyInput = tr.querySelector(".new-ret-qty");

    let qty = parseFloat(qtyInput.value) || 0;

    if(qty < 0){
        qty = 0;
        qtyInput.value = 0;
    }

    if(!isWithoutBillReturn && qty > soldQty){
        alert("Return qty cannot exceed sold qty");
        qty = soldQty;
        qtyInput.value = soldQty;
    }

    tr.querySelector(".ret-amount").value = (qty * priceGst).toFixed(2);
    calcTotal();
}

function calcTotal(){
    let total = 0;
    document.querySelectorAll(".ret-amount").forEach(inp => {
        total += parseFloat(inp.value) || 0;
    });
    document.getElementById("return_total").innerText = "₹" + total.toFixed(2);
}

async function updateReturn(){
    const btn = document.getElementById("btn_update_return");
    if(btn.disabled) return;

    btn.disabled = true;
    btn.innerText = "UPDATING...";

    try{
        let totalReturn = 0;
        const rows = Array.from(document.querySelectorAll("#items_body tr"));

        for(const row of rows){
            totalReturn += parseFloat(row.querySelector(".ret-amount").value) || 0;
        }

        if(totalReturn <= 0){
            alert("Return total must be greater than zero");
            btn.disabled = false;
            btn.innerText = "Update Return";
            return;
        }

        // 1. reverse previous stock
        for(const oldItem of oldReturnItems){
            const qty = parseFloat(oldItem.return_qty || 0);
            if(qty > 0){
                const { error: stockReverseErr } = await sb.rpc("decrease_stock", {
                    p_item_code: oldItem.item_code,
                    p_qty: qty,
                    p_reference_id: currentReturnId
                });

                if(stockReverseErr) throw stockReverseErr;
            }
        }

        // 2. delete old return item rows
        const { error: deleteErr } = await sb
            .from("sales_return_item_details")
            .delete()
            .eq("return_id", currentReturnId);

        if(deleteErr) throw deleteErr;

        // 3. update header
        const { error: headUpdateErr } = await sb
            .from("sales_return_details")
            .update({
                original_sales_id: isWithoutBillReturn ? null : currentSaleId,
                total_return_amount: totalReturn,
                customer_name: document.getElementById("cust_name").value || null,
                customer_mobile: document.getElementById("cust_mobile").value || null,
                return_date: new Date().toISOString()
            })
            .eq("id", currentReturnId);

        if(headUpdateErr) throw headUpdateErr;

        // 4. insert new rows and add stock again
        for(const row of rows){
            const itemCode = getRowItemCode(row);
            const itemName = getRowItemName(row);
            const soldQty = getElementNumber(row.querySelector(".sold-qty"));
            const returnQty = parseFloat(row.querySelector(".new-ret-qty").value) || 0;
            let price = parseFloat(row.querySelector(".price")?.innerText) || 0;
            const priceGst = getElementNumber(row.querySelector(".price-gst"));
            const gstPercent = parseFloat(row.querySelector(".gst-percent")?.innerText) || 0;
            if(isWithoutBillReturn && priceGst && gstPercent){
                price = priceGst / (1 + (gstPercent / 100));
            } else if(isWithoutBillReturn && priceGst && !price){
                price = priceGst;
            }
            const hsnCode = row.querySelector(".hsn-code")?.innerText || "";

            if(returnQty > 0){
                if(!itemCode || !itemName){
                    throw new Error("Please select item code and item name for every added return item.");
                }
                const { error: insertErr } = await sb
                    .from("sales_return_item_details")
                    .insert([{
                        return_id: currentReturnId,
                        item_code: itemCode,
                        item_name: itemName,
                        sold_qty: soldQty,
                        return_qty: returnQty,
                        price: price,
                        price_gst: priceGst,
                        hsn_code: hsnCode,
                        gst_percent: gstPercent
                    }]);

                if(insertErr) throw insertErr;

                const { error: stockAddErr } = await sb.rpc("increase_stock", {
                    p_item_code: itemCode,
                    p_qty: returnQty,
                    p_reference_id: currentReturnId
                });

                if(stockAddErr) throw stockAddErr;
            }
        }

        alert("Sales return updated successfully");
        window.location.href = "sales_return_report.html";

    } catch(err){
        console.error(err);
        alert("Update failed: " + (err.message || err));
        btn.disabled = false;
        btn.innerText = "Update Return";
    }
}
</script>
