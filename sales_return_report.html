<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" type="image/x-icon">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="manifest" href="site.webmanifest">
<title>Sales Return Report - VAJRA LIGHTS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="page_permissions.js"></script>
<script src="common-ui.js"></script>
<style>
:root{
    --primary:#2563eb;
    --accent:#059669;
    --bg:#0f172a;
    --panel:rgba(255,255,255,0.96);
    --border:#cbd5e1;
    --text:#1e293b;
}
body{
    font-family:'Segoe UI',Roboto,Arial,sans-serif;
    margin:0;
    padding:20px;
    background-image:url('background.jpg');
    background-size:cover;
    background-attachment:fixed;
    color:var(--text);
}
.container{
    width:100%;
    max-width:100%;
    margin:auto;
    background:var(--panel);
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.22);
    overflow-x:auto;
    overflow-y:visible;
}
.header{
    background:#020617;
    color:#fff;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}
.header h2{
    margin:0;
    font-size:22px;
}
.top-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.btn{
    border:none;
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    font-weight:700;
}
.btn-blue{ background:var(--primary); color:#fff; }
.btn-green{ background:var(--accent); color:#fff; }
.btn-gray{ background:#e2e8f0; color:#0f172a; }

.filters{
    padding:15px 20px;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    border-bottom:1px solid var(--border);
    background:#f8fafc;
}
.form-group{
    display:flex;
    flex-direction:column;
}
.form-group label{
    font-size:12px;
    font-weight:700;
    margin-bottom:4px;
    color:#475569;
    text-transform:uppercase;
}
.form-control{
    height:38px;
    border:1px solid var(--border);
    border-radius:8px;
    padding:0 10px;
    font-size:14px;
    box-sizing:border-box;
}
.summary{
    padding:14px 20px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    background:#fff;
    border-bottom:1px solid var(--border);
}
.card{
    min-width:200px;
    background:#f8fafc;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
}
.card .label{
    font-size:12px;
    color:#64748b;
    font-weight:700;
    text-transform:uppercase;
}
.card .value{
    font-size:24px;
    font-weight:800;
    margin-top:4px;
}
.table-wrap{
    width:100%;
    overflow-x:auto;
    overflow-y:visible;
    -webkit-overflow-scrolling:touch;
    padding-bottom:6px;
}
table{
    width:100%;
    min-width:1280px;
    border-collapse:collapse;
    table-layout:auto;
}
th,td{
    padding:10px 8px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
    white-space:nowrap;
    vertical-align:middle;
}
th:last-child,
td.action-cell{
    width:156px;
    min-width:156px;
}
th{
    background:#e2e8f0;
    position:sticky;
    top:0;
    z-index:1;
    font-size:12px;
    text-transform:uppercase;
}
tr:hover{
    background:#f8fafc;
}
.action-cell{
    white-space:normal;
}
.action-buttons{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:6px;
    flex-wrap:nowrap;
    min-width:max-content;
}
.action-btn{
    border:none;
    border-radius:7px;
    padding:0;
    cursor:pointer;
    font-size:11px;
    line-height:1;
    font-weight:800;
    margin:0;
    width:32px;
    min-width:32px;
    height:32px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}
.action-btn svg{ width:17px; height:17px; pointer-events:none; }
.edit-btn{ background:#2563eb; color:#fff; }
.print-btn{ background:#059669; color:#fff; }
.accept-btn{ background:#16a34a; color:#fff; }
.delete-btn{ background:#dc2626; color:#fff; }

.accepted-badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    background:#dcfce7;
    color:#166534;
}
.pending-badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    background:#fef3c7;
    color:#92400e;
}

.cash-badge,
.credit-badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:800;
    white-space:nowrap;
}
.cash-badge{
    background:#dcfce7;
    color:#166534;
}
.credit-badge{
    background:#fef3c7;
    color:#92400e;
}
.money-cash{ color:#047857; font-weight:800; }
.money-credit{ color:#b45309; font-weight:800; }
.disabled-btn{
    opacity:.55;
    cursor:not-allowed;
}

/* dropdown details */
.return-row{
    cursor:pointer;
}
.return-row.open{
    background:#eff6ff;
}
.details-row{
    display:none;
    background:#fff;
}
.details-box{
    background:#f8fafc;
    border:1px solid #dbeafe;
    border-radius:10px;
    padding:12px;
    margin:6px 0;
}
.details-title{
    font-size:13px;
    font-weight:800;
    color:#1e40af;
    margin-bottom:10px;
    text-transform:uppercase;
}
.details-table-wrap{
    overflow:auto;
}
.details-table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border:1px solid #cbd5e1;
}
.details-table th,
.details-table td{
    border:1px solid #cbd5e1;
    padding:8px;
    font-size:12px;
    white-space:nowrap;
}
.details-table th{
    background:#e2e8f0;
    color:#0f172a;
    position:static;
}
.loading-text{
    color:#64748b;
    font-style:italic;
}
.expand-hint{
    font-size:11px;
    color:#64748b;
    font-weight:700;
}

@media (max-width:768px){
    body{ padding:8px; }
    .container{ border-radius:10px; }
    .header h2{ font-size:18px; }
    .top-actions{ width:100%; }
    .top-actions .btn{ flex:1; padding:9px 10px; }
    .summary .card{ min-width:150px; flex:1; }
    table{ min-width:1180px; }
    th,td{ font-size:12px; padding:8px 6px; }
    th:last-child,
    td.action-cell{ width:156px; min-width:156px; }
    .action-buttons{ gap:5px; flex-wrap:nowrap; min-width:max-content; }
    .action-btn{ width:30px; min-width:30px; max-width:30px; height:30px; padding:0; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Sales Return Report</h2>
        <div class="top-actions">
            <button class="btn btn-gray" onclick="window.location.href='dashboard.html'">Dashboard</button>
            <button class="btn btn-blue" onclick="window.location.href='sales_return.html'">New Return</button>
            <button class="btn btn-green" onclick="loadReport()">Refresh</button>
        </div>
    </div>

    <div class="filters">
        <div class="form-group">
            <label>From Date</label>
            <input type="date" id="from_date" class="form-control">
        </div>

        <div class="form-group">
            <label>To Date</label>
            <input type="date" id="to_date" class="form-control">
        </div>

        <div class="form-group">
            <label>Customer Mobile</label>
            <input type="text" id="search_mobile" class="form-control" placeholder="Mobile">
        </div>

        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="search_name" class="form-control" placeholder="Customer name">
        </div>

        <div class="form-group">
            <label>Original Bill No</label>
            <input type="text" id="search_bill" class="form-control" placeholder="Bill no">
        </div>

        <div class="form-group">
            <label>Return Type</label>
            <select id="search_return_type" class="form-control">
                <option value="ALL">ALL</option>
                <option value="CASH">CASH REFUND</option>
                <option value="CREDIT">CREDIT ADJUSTMENT</option>
            </select>
        </div>

        <div class="form-group" style="align-self:end;">
            <button class="btn btn-blue" onclick="loadReport()">Search</button>
        </div>
    </div>

    <div class="summary">
        <div class="card">
            <div class="label">Total Returns</div>
            <div class="value" id="total_returns_count">0</div>
        </div>
        <div class="card">
            <div class="label">Total Return Amount</div>
            <div class="value" id="total_returns_amount">₹0.00</div>
        </div>
        <div class="card">
            <div class="label">Cash Refund</div>
            <div class="value money-cash" id="total_cash_refund">₹0.00</div>
        </div>
        <div class="card">
            <div class="label">Credit Adjustment</div>
            <div class="value money-credit" id="total_credit_adjustment">₹0.00</div>
        </div>
    </div>

    <div class="table-wrap">
        <table class="report-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Return ID</th>
                    <th>Return Date</th>
                    <th>Customer Name</th>
                    <th>Mobile</th>
                    <th>Original Bill No</th>
                    <th>Return Type</th>
                    <th>Return Amount</th>
                    <th>Cash Refund</th>
                    <th>Credit Adjustment</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="report_body"></tbody>
        </table>
    </div>
</div>

<script>
    const sb = window.sbcc; // supabase client from supabaseClient.js
  document.addEventListener("DOMContentLoaded", async () => {
  const ok = await requirePageAccess("sales");
  if (!ok) return;
  });

window.onload = async () => {
    setDefaultDates();
    await loadReport();
};

function setDefaultDates(){
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);

    document.getElementById("from_date").value = firstDay.toISOString().split("T")[0];
    document.getElementById("to_date").value = today.toISOString().split("T")[0];
}


function normalizeReturnType(value){
    const v = String(value || "CASH").trim().toUpperCase().replace(/[\s_\-]+/g, " ");
    if(v.includes("CREDIT")) return "CREDIT";
    return "CASH";
}

function getReturnType(row){
    return normalizeReturnType(row.return_payment_type || row.settlement_mode || row.payment_type || "CASH");
}

function getCashRefundAmount(row){
    const type = getReturnType(row);
    const total = parseFloat(row.total_return_amount || row.payable || row.total_amount || 0) || 0;
    if(type !== "CASH") return 0;
    // The return total is authoritative. This also fixes older modified returns
    // whose stored cash_refund_amount was not updated with the new total.
    return total;
}

function getCreditAdjustmentAmount(row){
    const type = getReturnType(row);
    const total = parseFloat(row.total_return_amount || row.payable || row.total_amount || 0) || 0;
    if(type !== "CREDIT") return 0;
    return total;
}

const ACTION_ICONS = {
    edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`,
    accept: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="m5 12 4 4L19 6"/></svg>`,
    print: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>`,
    delete: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="m19 6-1 15H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>`
};

function returnTypeBadge(type){
    return type === "CREDIT"
        ? `<span class="credit-badge">CREDIT ADJUSTMENT</span>`
        : `<span class="cash-badge">CASH REFUND</span>`;
}

async function loadReport(){
    const tbody = document.getElementById("report_body");
    tbody.innerHTML = `<tr><td colspan="12">Loading...</td></tr>`;

    const fromDate = document.getElementById("from_date").value;
    const toDate = document.getElementById("to_date").value;
    const mobile = document.getElementById("search_mobile").value.trim().toLowerCase();
    const name = document.getElementById("search_name").value.trim().toLowerCase();
    const billNo = document.getElementById("search_bill").value.trim().toLowerCase();
    const returnTypeFilter = document.getElementById("search_return_type").value;

    let { data: returns, error } = await sb
        .from("sales_return_details")
        .select("*")
        .order("id", { ascending:false });

    if(error){
        console.error(error);
        tbody.innerHTML = `<tr><td colspan="12">Error loading report</td></tr>`;
        return;
    }

    returns = returns || [];

    const salesIds = [...new Set(returns.map(r => r.original_sales_id).filter(Boolean))];

    let salesMap = {};
    if(salesIds.length){
        const { data: salesData, error: salesErr } = await sb
            .from("sales_details")
            .select("id, sales_number, customer_name, customer_mobile, series_code, bill_date")
            .in("id", salesIds);

        if(salesErr){
            console.error(salesErr);
        } else {
            (salesData || []).forEach(s => {
                salesMap[s.id] = s;
            });
        }
    }

    let filtered = returns.filter(r => {
        const sale = salesMap[r.original_sales_id] || {};
        const returnDate = r.return_date ? r.return_date.split("T")[0] : "";
        const customerName = String(sale.customer_name || r.customer_name || "").toLowerCase();
        const customerMobile = String(sale.customer_mobile || r.customer_mobile || "").toLowerCase();
        const billText = r.original_sales_id
            ? `${sale.series_code || ""}-${sale.sales_number || ""}`.toLowerCase()
            : "without bill";

        if(fromDate && returnDate < fromDate) return false;
        if(toDate && returnDate > toDate) return false;
        if(mobile && !customerMobile.includes(mobile)) return false;
        if(name && !customerName.includes(name)) return false;
        if(billNo && !billText.includes(billNo)) return false;
        if(returnTypeFilter !== "ALL" && getReturnType(r) !== returnTypeFilter) return false;

        return true;
    });

    tbody.innerHTML = "";

    let totalAmount = 0;
    let totalCashRefund = 0;
    let totalCreditAdjustment = 0;

    if(!filtered.length){
        tbody.innerHTML = `<tr><td colspan="12">No sales return records found</td></tr>`;
    }

    filtered.forEach((r, index) => {
        const sale = salesMap[r.original_sales_id] || {};
        const amt = parseFloat(r.total_return_amount || r.payable || r.total_amount || 0) || 0;
        const returnType = getReturnType(r);
        const cashRefund = getCashRefundAmount(r);
        const creditAdjustment = getCreditAdjustmentAmount(r);

        totalAmount += amt;
        totalCashRefund += cashRefund;
        totalCreditAdjustment += creditAdjustment;

        const accepted = !!r.is_accepted;
        const customerName = sale.customer_name || r.customer_name || "";
        const customerMobile = sale.customer_mobile || r.customer_mobile || "";
        const billText = r.original_sales_id
            ? `${sale.series_code || ""}-${sale.sales_number || ""}`
            : "WITHOUT BILL";

        const tr = document.createElement("tr");
        tr.className = "return-row";
        tr.id = `row_${r.id}`;
        tr.innerHTML = `
            <td onclick="toggleReturnDetails(${r.id})">${index + 1}</td>
            <td onclick="toggleReturnDetails(${r.id})">
                ${r.id}
                <div class="expand-hint">Click to view items</div>
            </td>
            <td onclick="toggleReturnDetails(${r.id})">${r.return_date ? r.return_date.split("T")[0] : ""}</td>
            <td onclick="toggleReturnDetails(${r.id})">${customerName}</td>
            <td onclick="toggleReturnDetails(${r.id})">${customerMobile}</td>
            <td onclick="toggleReturnDetails(${r.id})">${billText}</td>
            <td onclick="toggleReturnDetails(${r.id})">${returnTypeBadge(returnType)}</td>
            <td onclick="toggleReturnDetails(${r.id})">₹${amt.toFixed(2)}</td>
            <td onclick="toggleReturnDetails(${r.id})" class="money-cash">₹${cashRefund.toFixed(2)}</td>
            <td onclick="toggleReturnDetails(${r.id})" class="money-credit">₹${creditAdjustment.toFixed(2)}</td>
            <td onclick="toggleReturnDetails(${r.id})">
                ${accepted
                    ? `<span class="accepted-badge">ACCEPTED</span>`
                    : `<span class="pending-badge">PENDING</span>`
                }
            </td>
            <td class="action-cell" onclick="event.stopPropagation()">
                <div class="action-buttons">
                    <button class="action-btn edit-btn ${accepted ? "disabled-btn" : ""}"
                            onclick="${accepted ? "" : `modifyReturn(${r.id})`}"
                            title="Modify return" aria-label="Modify return"
                            ${accepted ? "disabled" : ""}>
                        ${ACTION_ICONS.edit}
                    </button>

                    ${
                        accepted
                        ? `<button class="action-btn accept-btn disabled-btn" title="Return accepted" aria-label="Return accepted" disabled>${ACTION_ICONS.accept}</button>`
                        : `<button class="action-btn accept-btn" onclick="acceptReturn(${r.id})" title="Accept return" aria-label="Accept return">${ACTION_ICONS.accept}</button>`
                    }

                    <button class="action-btn print-btn" onclick="printReturn(${r.id})" title="Print return" aria-label="Print return">${ACTION_ICONS.print}</button>
                    <button class="action-btn delete-btn ${accepted ? "disabled-btn" : ""}"
                            onclick="${accepted ? "" : `deleteReturn(${r.id})`}"
                            title="${accepted ? "Accepted returns cannot be deleted" : "Delete return"}"
                            aria-label="Delete return" ${accepted ? "disabled" : ""}>${ACTION_ICONS.delete}</button>
                </div>
            </td>
        `;
        tbody.appendChild(tr);

        const detailsTr = document.createElement("tr");
        detailsTr.className = "details-row";
        detailsTr.id = `details_${r.id}`;
        detailsTr.innerHTML = `
            <td colspan="12">
                <div class="details-box">
                    <div class="details-title">Sales Return Items - Return ID ${r.id}</div>
                    <div id="details_content_${r.id}" class="loading-text">Click the row to load items...</div>
                </div>
            </td>
        `;
        tbody.appendChild(detailsTr);
    });

    document.getElementById("total_returns_count").innerText = filtered.length;
    document.getElementById("total_returns_amount").innerText = "₹" + totalAmount.toFixed(2);
    document.getElementById("total_cash_refund").innerText = "₹" + totalCashRefund.toFixed(2);
    document.getElementById("total_credit_adjustment").innerText = "₹" + totalCreditAdjustment.toFixed(2);
}

async function toggleReturnDetails(returnId){
    const row = document.getElementById(`row_${returnId}`);
    const detailsRow = document.getElementById(`details_${returnId}`);
    const content = document.getElementById(`details_content_${returnId}`);

    if(!detailsRow) return;

    const isOpen = detailsRow.style.display === "table-row";

    document.querySelectorAll(".details-row").forEach(r => r.style.display = "none");
    document.querySelectorAll(".return-row").forEach(r => r.classList.remove("open"));

    if(isOpen){
        detailsRow.style.display = "none";
        row.classList.remove("open");
        return;
    }

    detailsRow.style.display = "table-row";
    row.classList.add("open");

    if(content.dataset.loaded === "true") return;

    content.innerHTML = `<div class="loading-text">Loading items...</div>`;

    const { data, error } = await sb
        .from("sales_return_item_details")
        .select("*")
        .eq("return_id", returnId);

    if(error){
        console.error(error);
        content.innerHTML = `<div class="loading-text">Error loading return items</div>`;
        return;
    }

    const items = data || [];

    if(!items.length){
        content.innerHTML = `<div class="loading-text">No items found in this sales return</div>`;
        content.dataset.loaded = "true";
        return;
    }

    const { data: returnHead } = await sb
        .from("sales_return_details")
        .select("*")
        .eq("id", returnId)
        .maybeSingle();

    let originalItemMap = {};
    if(returnHead?.original_sales_id){
        const { data: salesItems } = await sb
            .from("sales_item_details")
            .select("item_code, sales_price, sales_price_gst, gst_percent, hsn_code")
            .eq("sales_id", returnHead.original_sales_id);

        (salesItems || []).forEach(si => {
            originalItemMap[si.item_code] = si;
        });
    }

    const returnType = getReturnType(returnHead || {});
    const cashRefund = getCashRefundAmount(returnHead || {});
    const creditAdjustment = getCreditAdjustmentAmount(returnHead || {});

    let html = `
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">
            ${returnTypeBadge(returnType)}
            <strong class="money-cash">Cash Refund: ₹${cashRefund.toFixed(2)}</strong>
            <strong class="money-credit">Credit Adjustment: ₹${creditAdjustment.toFixed(2)}</strong>
        </div>
        <div class="details-table-wrap">
            <table class="details-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Item Code</th>
                        <th>Item Name</th>
                        <th>Return Qty</th>
                        <th>Price</th>
                        <th>Price+GST</th>
                        <th>GST %</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
    `;

    items.forEach((item, index) => {
        const src = originalItemMap[item.item_code] || {};
        const qty = parseFloat(item.quantity || item.return_qty || 0);
        const gst = parseFloat(item.gst_percent ?? src.gst_percent ?? 0) || 0;
        const priceGst = parseFloat(item.sales_price_gst || item.price_gst || src.sales_price_gst || 0) || 0;

        let price = parseFloat(item.price ?? src.sales_price ?? 0) || 0;
        if(!price && priceGst && gst){
            price = priceGst / (1 + (gst / 100));
        }

        const total = qty * priceGst;

        html += `
            <tr>
                <td>${index + 1}</td>
                <td>${item.item_code || ""}</td>
                <td>${item.item_name || ""}</td>
                <td>${qty.toFixed(2)}</td>
                <td>₹${price.toFixed(2)}</td>
                <td>₹${priceGst.toFixed(2)}</td>
                <td>${gst.toFixed(2)}%</td>
                <td>₹${total.toFixed(2)}</td>
            </tr>
        `;
    });

    html += `
                </tbody>
            </table>
        </div>
    `;

    content.innerHTML = html;
    content.dataset.loaded = "true";
}

function modifyReturn(id){
    window.location.href = `sales_return_modification.html?id=${id}`;
}

async function acceptReturn(id){
    const ok = confirm("Accept this sales return? CASH REFUND will reduce dashboard cash. CREDIT ADJUSTMENT will only reduce customer outstanding and will not reduce cash.");
    if(!ok) return;

    const acceptedBy = localStorage.getItem("staff_name") || localStorage.getItem("username") || "System";

    const { error } = await sb
        .from("sales_return_details")
        .update({
            is_accepted: true,
            accepted_at: new Date().toISOString(),
            accepted_by: acceptedBy
        })
        .eq("id", id)
        .eq("is_accepted", false);

    if(error){
        console.error(error);
        alert("Failed to accept return: " + error.message);
        return;
    }

    alert("Sales return accepted successfully");
    await loadReport();
}

function printReturn(id){
    window.open(`sales_return_print.html?id=${id}`, "_blank");
}

async function deleteReturn(id){
    const ok = confirm(`Delete sales return ${id}? This will reverse its returned stock and cannot be undone.`);
    if(!ok) return;

    const { data: returnHead, error: headErr } = await sb
        .from("sales_return_details")
        .select("id,is_accepted")
        .eq("id", id)
        .maybeSingle();

    if(headErr || !returnHead){
        alert("Unable to load this return: " + (headErr?.message || "record not found"));
        return;
    }
    if(returnHead.is_accepted){
        alert("Accepted returns cannot be deleted.");
        await loadReport();
        return;
    }

    const { data: items, error: itemsErr } = await sb
        .from("sales_return_item_details")
        .select("item_code,return_qty")
        .eq("return_id", id);

    if(itemsErr){
        alert("Unable to load return items: " + itemsErr.message);
        return;
    }

    try{
        for(const item of (items || [])){
            const qty = parseFloat(item.return_qty || 0) || 0;
            if(qty <= 0) continue;
            const { error: stockErr } = await sb.rpc("decrease_stock", {
                p_item_code: item.item_code,
                p_qty: qty,
                p_reference_id: id
            });
            if(stockErr) throw stockErr;
        }

        const { error: itemDeleteErr } = await sb
            .from("sales_return_item_details")
            .delete()
            .eq("return_id", id);
        if(itemDeleteErr) throw itemDeleteErr;

        const { data: deletedHead, error: headDeleteErr } = await sb
            .from("sales_return_details")
            .delete()
            .eq("id", id)
            .or("is_accepted.is.null,is_accepted.eq.false")
            .select("id");
        if(headDeleteErr) throw headDeleteErr;
        if(!deletedHead?.length) throw new Error("The return was accepted or already deleted before this action completed.");

        alert("Sales return deleted successfully");
        await loadReport();
    } catch(err){
        console.error(err);
        alert("Delete failed: " + (err.message || err));
    }
}
</script>
