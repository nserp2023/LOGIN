<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Billing Software</title>
  <link rel="stylesheet" href="signup.css">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Background with overlay */
    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: url("background.jpg") no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* Glassmorphism container */
    .login-container {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px 35px;
      width: 380px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.8s ease;
    }

    /* Floating shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
      filter: blur(40px);
      animation: float 12s infinite ease-in-out;
    }

    .shape:nth-child(1) {
      width: 200px;
      height: 200px;
      background: #00c6ff;
      top: 10%;
      left: 15%;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 150px;
      height: 150px;
      background: #ff6b6b;
      bottom: 15%;
      right: 20%;
      animation-delay: 4s;
    }

    .shape:nth-child(3) {
      width: 250px;
      height: 250px;
      background: #7d5fff;
      top: 60%;
      left: 5%;
      animation-delay: 8s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(-40px) translateX(30px);
      }
    }

    /* Heading */
    .login-container h2 {
      margin-bottom: 25px;
      font-size: 26px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Input groups */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #f1f1f1;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      transition: all 0.3s ease;
    }

    .input-group input::placeholder {
      color: #e0e0e0;
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.35);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 120, 215, 0.4);
    }

    /* Button */
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00c6ff, #0078d7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 120, 215, 0.5);
    }

    /* Messages */
    #error-message {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
    }

    #success-message {
      color: #7CFC98;
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
    }

    /* Login link */
    .login-container p {
      margin-top: 20px;
      font-size: 14px;
      color: #f1f1f1;
      text-align: center;
    }

    .login-container a {
      color: #00c6ff;
      font-weight: 500;
      text-decoration: none;
    }

    .login-container a:hover {
      text-decoration: underline;
    }

    /* Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>

  <div class="login-container">
    <h2>Create an Account</h2>

    <form id="signupForm">
      <div class="input-group">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" placeholder="Enter full name" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter email" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit">Sign Up</button>
      <p id="error-message"></p>
      <p id="success-message"></p>
    </form>

    <p>Already have an account? <a href="index.html">Login here</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;

    const supabaseUrl = "https://gqxczzijntbvtlmmzppt.supabase.co";
    const supabaseKey = "sb_publishable_kmh1sok1CWBSBW0kvdla7w_T7kDioRs";
    const supabaseClient = createClient(supabaseUrl, supabaseKey);

    document.getElementById("signupForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const full_name = document.getElementById("full_name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMessage = document.getElementById("error-message");
      const successMessage = document.getElementById("success-message");

      errorMessage.textContent = "";
      successMessage.textContent = "";

      if (!full_name || !email || !password) {
        errorMessage.textContent = "All fields are required!";
        return;
      }

      // 1. Create auth user
      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        errorMessage.textContent = "Signup failed: " + error.message;
        return;
      }

      const user = data.user;

      if (!user) {
        errorMessage.textContent = "Signup completed, but user details were not returned.";
        return;
      }

      // 2. Create profile row
      const { error: profileError } = await supabaseClient
        .from("user_profiles")
        .insert([{
          id: user.id,
          email: email,
          full_name: full_name,
          role: "PENDING",
          approved: false
        }]);

      if (profileError) {
        errorMessage.textContent = "User created in Auth, but profile save failed: " + profileError.message;
        return;
      }

      successMessage.textContent = "Signup successful! Wait for Owner/Admin approval before login.";
      document.getElementById("signupForm").reset();
    });
  </script>
</body>
</html>
