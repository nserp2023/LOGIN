<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #2563eb; /* Blue */
            --accent: #059669;  /* Green */
            --bg-overlay: rgba(255, 255, 255, 0.98);
            --border: #cbd5e1;
            --text: #1e293b;
            --row-hover: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
        }

        /* Main App Container */
        .container {
            max-width: 100%;
            height: 96vh;
            background: transparent;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        /* 1. TOP SECTION (Header) */
        .header-section {
            padding: 12px 15px;
            border-bottom: 2px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #030303;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .form-control {
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.15s;
            height: 32px;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        /* Width Utilities */
        .w-xs { width: 60px; }
        .w-sm { width: 100px; }
        .w-md { width: 140px; }
        .w-lg { width: 200px; }
        .w-xl { width: 250px; }

        /* Grand Total Box */
        .grand-total-box {
            margin-left: auto;
            background: var(--text);
            color: white;
            padding: 5px 20px;
            border-radius: 6px;
            text-align: right;
            min-width: 150px;
        }
        .grand-total-box span { font-size: 10px; opacity: 0.8; display: block; }
        .grand-total-box div { font-size: 24px; font-weight: bold; line-height: 1.2; }

        /* 2. MIDDLE SECTION (Table) */
        .items-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior:smooth;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Fixed Layout for speed */
        }

        thead {
            background: #f0e6e2;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 8px;
            text-align: left;
            font-size: 11px;
            color: #694747;
            font-weight: 700;
            border-bottom: 1px solid #cbd5e1;
        }

        td {
            border-bottom: 1px solid #f1f5f9;
            padding: 0; /* Remove padding to make inputs fit full cell */
        }

        /* Table Inputs */
        td input, td select {
            color: white;
            width: 100%;
            border: none;
            padding: 8px 5px;
            font-size: 13px;
            background: transparent;
            font-family: inherit;
        }

        td input:focus, td select:focus {
            color: white;
            background: transparent;
            box-shadow: inset 0 0 0 2px var(--primary);
            outline: none;
        }

        /* Column Widths */
        .col-idx { width: 30px; text-align: center; }
        .col-code { width: 100px; }
        .col-name { width: auto; } /* Takes remaining space */
        .col-qty  { width: 60px; }
        .col-type { width: 50px; }
        .col-price { width: 90px; }
        .col-gst  { width: 50px; }
        .col-tot  { width: 100px; }
        .col-act  { width: 30px; }

        /* 3. BOTTOM SECTION (Footer) */
        .footer-section {
            position: relative;
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            background: #000000;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .btn-save:hover { background: #047857; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Autocomplete List */
        .autocomplete-wrapper { position: relative; width: 100%; height: 100%; }
        
        .autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0;
    width: 1000px; /* Increased width for better visibility */
    background: white;
    border: 1px solid var(--border);
    box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    max-height: 300px;
    overflow-y: auto;
    z-index: 100;
    display: none;
}

.autocomplete-table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    font-weight:bold;
}

.autocomplete-table th{
    background:#f1f5f9;
    padding:6px;
    border:1px solid black;
    text-align:left;
}

.autocomplete-table td{
    padding:6px;
    border:1px solid black;
}

.autocomplete-row:hover{
    background:#dbeafe;
    cursor:pointer;
}

        .autocomplete-item {
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
        }

        .autocomplete-row:hover,
.autocomplete-row.selected {
    background-color: #dbeafe;
}

        .autocomplete-item strong { display: block; color: var(--text); }
        .autocomplete-item small { color: #64748b; }


        .autocomplete-table th:first-child,
        .autocomplete-table td:first-child{
    width: 350px;
}

        /* Print Styles */
        @media print {
            .footer-section, .autocomplete-list, button { display: none !important; }
            .container { box-shadow: none; border: none; height: auto; }
            body { background: white; overflow: auto; padding: 0; }
            input, select { border: none !important; box-shadow: none !important; }
        }

    </style>
</head>

document.addEventListener("input", function(e){
    if(e.target.tagName === "INPUT" && e.target.type === "text"){

});
    function setupDate() {
        document.getElementById('bill_date').valueAsDate = new Date();
    }

    async function fetchNextBillNumber() {
        const series = document.getElementById('bill_series').value;
        const { data } = await sb
.from('bill_series')
.select('bill_number')
.eq('series_code', series)
.maybeSingle();
        document.getElementById('bill_number').value = data ? (data.bill_number + 1) : 1;
    }

async function loadStockData() {
        let allItems = [];
        let from = 0;
        let to = 999;
        let fetchMore = true;

        // Loop to fetch ALL data in chunks of 1000
        while (fetchMore) {
            const { data, error } = await sb
                .from('stock_balance_view')
                .select('*')
                .range(from, to);

            if (error) {
                console.error("Error loading stock:", error);
                alert("Error loading stock items. Check console.");
                break;
            }

            if (data && data.length > 0) {
                allItems = allItems.concat(data);
                
                // Prepare for next chunk
                from += 1000;
                to += 1000;

                // If we got less than 1000 items, we reached the end
                if (data.length < 1000) {
                    fetchMore = false;
                }
            } else {
                fetchMore = false;
            }
        }

        stockData = allItems;
        console.log("Total Stock Items Loaded:", stockData.length);
    }
// --- 4. SEARCH ENGINES (Updated with Sorting) ---
    
    function searchStock(query, field) {
        if (!query) return [];
        const terms = query.toLowerCase().split(' ');
        
        // 1. Filter items based on search terms
        const filtered = stockData.filter(item => {
            const val = (item[field] || '').toLowerCase();
            return terms.every(t => val.includes(t));
        });

        // 2. Sort results alphabetically by the field being searched (A-Z)
        filtered.sort((a, b) => {
    const valA = (a[field] || '').toLowerCase();
    const valB = (b[field] || '').toLowerCase();

    if(valA === query.toLowerCase()) return -1;
    if(valB === query.toLowerCase()) return 1;

    return valA.localeCompare(valB);
});

        // 3. Return top 15 results
        return filtered.slice(0, 15);
    }
    // Customer Search (Debounced)
    const mobileInput = document.getElementById('cust_mobile');
    const mobileList = document.getElementById('mobile_suggestions');
    let custTimer;

    mobileInput.addEventListener('input', (e) => {
        clearTimeout(custTimer);
        const val = e.target.value;
        if(val.length < 3) { mobileList.style.display = 'none'; return; }

        custTimer = setTimeout(async () => {
            const { data } = await sb.from('customers').select('*').ilike('mobile', '%' + val + '%').limit(5);
            
            mobileList.innerHTML = '';
            if(data && data.length > 0) {
                mobileList.style.display = 'block';
                data.forEach((c, idx) => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.dataset.index = idx;
                    div.innerHTML = `<strong>${c.mobile}</strong><small>${c.name}</small>`;
                    div.onclick = () => selectCustomer(c);
                    mobileList.appendChild(div);
                });
            } else {
                mobileList.style.display = 'none';
            }
        }, 300);
    });

    mobileInput.addEventListener('keydown', (e) => handleListNav(e, mobileList, (div) => div.click()));

        document.getElementById('cust_mobile').value = c.mobile;
        document.getElementById('cust_name').value = c.name;
        document.getElementById('cust_address').value = c.address || '';
        document.getElementById('cust_gst').value = c.gst_number || '';
        mobileList.style.display = 'none';
        document.getElementById('cust_name').focus();
    }

function calcProfit() {
    let totalProfit = 0;

    document.querySelectorAll('#bill_body tr').forEach(row => {

        const rawField = row.querySelector('.raw-data');
        if(!rawField) return;

        const raw = rawField.value;
        if(!raw) return;

        const item = JSON.parse(raw);

        const qtyInput = row.querySelector('.qty-inp');
        const priceInput = row.querySelector('.price-gst-inp');

        const qty = qtyInput ? parseFloat(qtyInput.value) || 0 : 0;
        const sellPrice = priceInput ? parseFloat(priceInput.value) || 0 : 0;

        const landing = parseFloat(item.landing) || 0;

        const profitPerItem = sellPrice - landing;

        totalProfit += profitPerItem * qty;
    });

    document.getElementById('display_profit').innerText = totalProfit.toFixed(2);
}

    function updatePriceFromType(id) {
        const row = document.getElementById(`row_${id}`);
        const type = row.querySelector('.type-inp').value;
        const raw = row.querySelector('.raw-data').value;
        if(!raw) return;
        
        const item = JSON.parse(raw);
        let p = 0;
        // Logic for Prices 1-4
             if(type == "1") p = item.price1;
        else if(type == "2") p = item.price2;
        else if(type == "3") p = item.price3;

        row.querySelector('.price-inp').value = p;
        calcForward(id);
    }

    function calcForward(id) {
        const row = document.getElementById(`row_${id}`);
        const qty = parseFloat(row.querySelector('.qty-inp').value) || 0;
        const price = parseFloat(row.querySelector('.price-inp').value) || 0;
        const gst = parseFloat(row.querySelector('.gst-inp').value) || 0;

        const taxAmt = price * (gst/100);
        const pGst = price + taxAmt;
        const total = pGst * qty;

        row.querySelector('.price-gst-inp').value = pGst.toFixed(2);
        row.querySelector('.total-inp').value = total.toFixed(2);
        calcTotal();
        calcProfit();

    }

    function calcReverse(id) {
        const row = document.getElementById(`row_${id}`);
        const qty = parseFloat(row.querySelector('.qty-inp').value) || 0;
        const pGst = parseFloat(row.querySelector('.price-gst-inp').value) || 0;
        const gst = parseFloat(row.querySelector('.gst-inp').value) || 0;

        const price = pGst / (1 + (gst/100));
        const total = pGst * qty;

        row.querySelector('.price-inp').value = price.toFixed(2);
        row.querySelector('.total-inp').value = total.toFixed(2);
        calcTotal();
        calcProfit();

    }

    function calcTotal() {
        let sum = 0;
        document.querySelectorAll('.total-inp').forEach(i => sum += parseFloat(i.value) || 0);
        document.getElementById('display_grand_total').innerText = '₹' + sum.toFixed(2);
    }

const profitBox = document.getElementById('profit_box');

    if (profitBox.style.display === 'none') {

        profitBox.style.display = 'block';

        profitBox.style.display = 'none';
    }
});

    function handleEnterKey(e) {
        if(e.key === 'Enter') {
            e.preventDefault();
            // Logic: Find next input. If last, add row.
            const allInputs = Array.from(document.querySelectorAll('input:not([type="hidden"]), select, button#btn_save'));
            const idx = allInputs.indexOf(e.target);
            
            if(e.shiftKey) {
                if(idx > 0) allInputs[idx-1].focus();
            } else {
                // If it's the last input in the current row's flow (Price+GST)
                if(e.target.classList.contains('price-gst-inp')) {
                     addNewRow();
                } else if(idx < allInputs.length - 1) {
                    allInputs[idx+1].focus();
                }
            }
        }
    }

function handleListNav(e, list, callback) {
        // If list is hidden, let the grid navigation handle the key
        if(list.style.display === 'none') return false; 
        
        const items = list.querySelectorAll('.autocomplete-row');
        let active = list.querySelector('.selected');
        let idx = active ? parseInt(active.dataset.idx) : -1;

        if(e.key === 'ArrowDown') {
            e.preventDefault();
            idx = Math.min(idx + 1, items.length - 1);
        } else if(e.key === 'ArrowUp') {
            e.preventDefault();
            idx = Math.max(idx - 1, 0);
        } else if(e.key === 'Enter' && idx > -1) {
            e.preventDefault();
            callback(items[idx]);
            return true;
        } else { 
            return false; // Key not used by list
        }

        items.forEach(i => i.classList.remove('selected'));
        if(items[idx]) {
            items[idx].classList.add('selected');
            items[idx].scrollIntoView({block: 'nearest'});
        }
        return true; // Key was used
    }

function handleGridNav(e) {

    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;

    const currentInput = e.target;
    const currentRow = currentInput.closest('tr');
    if (!currentRow) return;

    // ✅ STOP browser default ALWAYS
    e.preventDefault();
    e.stopPropagation();

    const colClass = [...currentInput.classList].find(
        c => c.endsWith('-inp') && c !== 'row-inp'
    );

    if (!colClass) return;

    const rows = [...document.querySelectorAll('#bill_body tr')];
    const currentIndex = rows.indexOf(currentRow);

    let targetIndex = currentIndex;

    if (e.key === 'ArrowUp') targetIndex--;
    if (e.key === 'ArrowDown') targetIndex++;

    if (targetIndex < 0 || targetIndex >= rows.length) return;

    const targetRow = rows[targetIndex];
    const targetInput = targetRow.querySelector(`.${colClass}`);

    if (targetInput) {
        targetInput.focus();
        if (typeof targetInput.select === 'function') {
            targetInput.select();
        }
    }
}

}
let head;

if(type === "sales_pack"){

const {data, error} = await sb
.from("sales_packing_details")
.select("*")
.eq("id", id)
.maybeSingle();   // ✅ SAFE
if(!data){
alert("Document Not Found");
return;
}

head = data;

}
else{

const {data, error} = await sb
.from(headerTable)
.select("*")
.eq("id", id)
.maybeSingle();

if(error){
console.error(error);
alert("Error loading document");
return;
}

if(!data){
alert("Document Not Found");
return;
}

head = data;

}

if(!head){
alert("Document not found");
return;
}

document.getElementById("cust_name").value = head.customer_name || "";
document.getElementById("cust_mobile").value = head.customer_mobile || "";
document.getElementById("cust_gst").value = head.gst_number || "";

const rawDate =
head.bill_date ||
head.quotation_date ||
head.order_date ||
head.packing_date ||
null;

document.getElementById("bill_date").value =
rawDate ? rawDate.split("T")[0] : "";

document.getElementById("bill_number").value =
head.sales_number ||
head.packing_number ||
head.quotation_number ||
head.order_number || "";

// clear rows
document.getElementById("bill_body").innerHTML="";
currentRowId=0;

// load items
let items;

if(type === "sales_pack"){

const {data} = await sb
.from("sales_packing_item_details")
.select("*")
.eq("packing_id", head.id);   // ✅ correct

items = data;

}else{

const {data} = await sb
.from(itemTable)
.select("*")
.eq(idField, id);

items = data;

}

items.forEach(item=>{

addNewRow();

const row=document.getElementById(`row_${currentRowId-1}`);

row.querySelector(".code-inp").value=item.item_code;
row.querySelector(".name-inp").value=item.item_name;
row.querySelector(".qty-inp").value=item.quantity;
row.querySelector(".price-inp").value=item.price;
row.querySelector(".price-gst-inp").value=item.sales_price_gst;
row.querySelector(".gst-inp").value=item.gst_percent;
row.querySelector(".hsn-store").value=item.hsn_code;

calcForward(currentRowId-1);

});

calcTotal();

if(type === "sales_pack"){
document.getElementById("salesman").value="VAJRA";
document.getElementById("salesman").disabled=true;
}

}

</script>
</body>
