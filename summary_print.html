<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summary Print - Smart Page Fit</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="common-ui.js"></script>

  <style>
    @page { size: A4 portrait; margin: 8mm; }

    :root{
      --line:#000;
      --text:#000;
      --paper:#fff;
      --soft:#bfbfbf;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:#f3f3f3;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      font-size:14px;
      font-weight:500;
    }

    .app{
      max-width:1200px;
      margin:0 auto;
      padding:18px;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:end;
      background:#fff;
      border:2px solid #000;
      padding:14px;
      margin-bottom:16px;
    }

    .ctrl{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .ctrl label{
      font-size:13px;
      font-weight:800;
    }

    .ctrl input{
      min-height:40px;
      padding:8px 10px;
      min-width:180px;
      border:2px solid #000;
      font-size:14px;
      font-weight:700;
      color:#000;
      background:#fff;
    }

    button{
      min-height:40px;
      padding:0 16px;
      border:2px solid #000;
      background:#fff;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      color:#000;
    }

    .status{
      margin-bottom:10px;
      font-size:14px;
      font-weight:800;
      color:#000;
    }

    .sheet{
      width:210mm;
      height:297mm;
      margin:0 auto 10px auto;
      background:var(--paper);
      padding:8mm;
      border:2px solid #000;
      page-break-after:always;
      break-after:page;
      overflow:hidden;
      position:relative;
    }

    .sheet:last-child{
      page-break-after:auto;
      break-after:auto;
    }

    .top-title{
      text-align:center;
      font-size:20px;
      font-weight:900;
      letter-spacing:.04em;
      margin-top:4px;
    }

    .meta-row{
      display:flex;
      justify-content:space-between;
      margin-top:18px;
      font-size:14px;
      font-weight:800;
      gap:12px;
    }

    .main-heading{
      text-align:center;
      margin:10px 0 8px;
      font-size:17px;
      font-weight:900;
      letter-spacing:.08em;
    }

    .double-line{
      border-top:2px solid var(--line);
      border-bottom:2px solid var(--line);
      height:6px;
      margin:6px 0 14px;
    }

    .main-box{
      border:2px solid var(--line);
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
    }

    .half.left{
      border-right:2px solid var(--line);
    }

    .band{
      border-bottom:2px solid var(--line);
      padding:10px 10px;
      font-size:15px;
      font-weight:900;
      min-height:40px;
    }

    .subband{
      border-bottom:2px solid var(--line);
      padding:10px 10px;
      font-size:15px;
      font-weight:900;
      min-height:40px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    .blank-table th,
    .blank-table td{
      border-right:1.5px solid #000;
      border-bottom:1.5px solid var(--soft);
      padding:5px 4px;
      vertical-align:top;
      font-size:11px;
      line-height:1.15;
      color:#000;
      font-weight:700;
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .blank-table th:last-child,
    .blank-table td:last-child{
      border-right:none;
    }

    .blank-table th{
      border-bottom:2px solid #000;
      text-align:center;
      height:34px;
      font-size:11px;
      font-weight:900;
      line-height:1.1;
      padding:4px 3px;
    }

    .blank-table td{
      height:34px;
    }

    .balance-line{
      border:2px solid var(--line);
      border-top:none;
      text-align:center;
      padding:12px 8px;
      font-size:16px;
      letter-spacing:.05em;
      font-weight:900;
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .credit-box{
      border:2px solid var(--line);
      margin-top:18px;
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .credit-title{
      text-align:center;
      padding:10px 8px;
      border-bottom:2px solid var(--line);
      font-size:15px;
      font-weight:900;
      letter-spacing:.05em;
    }

    .credit-table th,
    .credit-table td{
      border-right:1.5px solid var(--line);
      border-bottom:1.5px solid var(--line);
      padding:6px 6px;
      font-size:12px;
      color:#000;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .credit-table th:last-child,
    .credit-table td:last-child{
      border-right:none;
    }

    .credit-table thead th{
      text-align:center;
      font-weight:900;
      font-size:13px;
      border-bottom:2px solid var(--line);
    }

    .credit-table tbody td{
      height:32px;
      font-weight:700;
    }

    .credit-table tbody tr:last-child td{
      border-bottom:none;
    }

    .amount{
      text-align:right;
      white-space:nowrap !important;
      word-break:normal !important;
      overflow-wrap:normal !important;
      font-weight:900;
    }

    .continued-note{
      text-align:center;
      font-size:13px;
      font-weight:800;
      margin:4px 0 8px;
    }

    #saleReceiptTotalText,
    #cashSalesTotalText,
    #returnPaymentTotalText,
    #returnAmountText,
    #balanceText{
      font-weight:900;
      font-size:17px;
    }

    @media print{
      html,body{
        background:#fff;
        font-size:14px;
      }

      .app{ padding:0; }
      .controls,.status{ display:none !important; }
      .sheet{
        width:194mm;
        height:281mm;
        margin:0;
        padding:0;
        border:none;
        box-shadow:none;
      }
      button{ display:none; }

      *{
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="controls">
      <div class="ctrl">
        <label for="closingDate">Date</label>
        <input id="closingDate" type="date" />
      </div>

      <div class="ctrl">
        <label>&nbsp;</label>
        <button onclick="loadClosingData()">Load</button>
      </div>

      <div class="ctrl">
        <label>&nbsp;</label>
        <button onclick="window.print()">Print</button>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div id="pagesContainer"></div>
  </div>

  <script>
    const sb = window.sbcc || (window.supabase && window.SUPABASE_URL && window.SUPABASE_ANON_KEY
      ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
      : null);

    const $ = (id) => document.getElementById(id);

    // Smart A4 page fit uses real rendered height, not fixed row counts.

    function setStatus(msg, isErr = false){
      const s = $('status');
      if(!s) return;
      s.textContent = msg || '';
      s.style.color = isErr ? '#b00020' : '#000';
    }

    function norm(v){ return String(v || '').trim().toLowerCase(); }
    function num(v){ return Number(v || 0); }

    function fmtCurrency(v){
      return new Intl.NumberFormat('en-IN', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(Math.round(num(v)));
    }

    function fmtDate(dateStr){
      if(!dateStr) return '00-00-0000';
      const d = new Date(dateStr + 'T00:00:00');
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${dd}-${mm}-${yyyy}`;
    }

    function fmtDateTime(dt){
      const d = dt ? new Date(dt) : new Date();
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      let hrs = d.getHours();
      const mins = String(d.getMinutes()).padStart(2, '0');
      const ap = hrs >= 12 ? 'pm' : 'am';
      hrs = hrs % 12 || 12;
      return `${dd}/${mm}/${yyyy}, ${hrs}:${mins} ${ap}`;
    }

    function fmtTime(dt){
      if(!dt) return '';
      const d = new Date(dt);
      let hrs = d.getHours();
      const mins = String(d.getMinutes()).padStart(2, '0');
      const ap = hrs >= 12 ? 'pm' : 'am';
      hrs = hrs % 12 || 12;
      return `${hrs}:${mins} ${ap}`;
    }

    function isApprovedStatus(status){
      const s = norm(status);
      return s === 'approved' || s === 'accepted';
    }

    function isCreditSale(row){
      return norm(row.payment_type).includes('credit');
    }

    function billNo(row){
      const series = row.series_code || '';
      const no = row.sales_number ?? '';
      return series && no !== '' ? `${series}-${no}` : String(no || '-');
    }

    function safeCell(v){
      return String(v || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function chunkArray(arr, size){
      if(size <= 0) return [arr];
      const out = [];
      for(let i = 0; i < arr.length; i += size){
        out.push(arr.slice(i, i + size));
      }
      return out.length ? out : [[]];
    }

    function buildDetailRows(rows){
      return rows.map(r => `
        <tr>
          <td>${safeCell(r[0])}</td>
          <td>${safeCell(r[1])}</td>
          <td>${safeCell(r[2])}</td>
          <td>${safeCell(r[3])}</td>
          <td class="amount">${safeCell(r[4])}</td>
        </tr>
      `).join('');
    }

    function buildCreditRows(rows){
      return rows.map(r => `
        <tr>
          <td>${safeCell(r[0])}</td>
          <td>${safeCell(r[1])}</td>
          <td>${safeCell(r[2])}</td>
          <td class="amount">${safeCell(r[3])}</td>
        </tr>
      `).join('');
    }

    function buildMainSection(receiptRows, paymentRows, totals, continued = false){
      return `
        <div class="top-title">VAJRA LIGHTS &amp; ELECTRICALS.</div>

        <div class="meta-row">
          <div>DATE: <span>${safeCell(totals.metaDate)}</span></div>
          <div>GENERATED AT: <span>${safeCell(totals.generatedAt)}</span></div>
        </div>

        <div class="main-heading">CASH FLOW DETAIL</div>
        ${continued ? '<div class="continued-note">CONTINUED</div>' : ''}
        <div class="double-line"></div>

        <div class="main-box">
          <div class="split">
            <div class="half left">
              <div class="band">SALE &amp; RECEIPT TOTAL : <span>${safeCell(totals.saleReceiptTotal)}</span></div>
              <div class="subband">TOTAL CASH SALES : <span>${safeCell(totals.cashSalesTotal)}</span></div>

              <table class="blank-table">
                <colgroup>
                  <col style="width:10%">
                  <col style="width:15%">
                  <col style="width:23%">
                  <col style="width:32%">
                  <col style="width:20%">
                </colgroup>
                <thead>
                  <tr>
                    <th>TIME</th>
                    <th>VOUCHER</th>
                    <th>CUSTOMER / PARTY</th>
                    <th>DESCRIPTION</th>
                    <th>AMOUNT</th>
                  </tr>
                </thead>
                <tbody>${buildDetailRows(receiptRows)}</tbody>
              </table>
            </div>

            <div class="half">
              <div class="band">RETURN &amp; PAYMENT TOTAL : <span>${safeCell(totals.returnPaymentTotal)}</span></div>
              <div class="subband">RETURN AMOUNT : <span>${safeCell(totals.returnAmount)}</span></div>

              <table class="blank-table">
                <colgroup>
                  <col style="width:10%">
                  <col style="width:15%">
                  <col style="width:23%">
                  <col style="width:32%">
                  <col style="width:20%">
                </colgroup>
                <thead>
                  <tr>
                    <th>TIME</th>
                    <th>VOUCHER</th>
                    <th>SUPPLIER / PARTY</th>
                    <th>DESCRIPTION</th>
                    <th>AMOUNT</th>
                  </tr>
                </thead>
                <tbody>${buildDetailRows(paymentRows)}</tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="balance-line">
          SALE &amp; RECEIPT &nbsp; - &nbsp; RETURN &amp; PAYMENT &nbsp; = &nbsp; BALANCE :
          <span>${safeCell(totals.balance)}</span>
        </div>
      `;
    }

    function buildCreditSection(creditRows, titleSuffix = ''){
      return `
        <div class="credit-box">
          <div class="credit-title">CREDIT - SALES REGISTER${titleSuffix}</div>
          <table class="credit-table">
            <colgroup>
              <col style="width:18%">
              <col style="width:36%">
              <col style="width:22%">
              <col style="width:24%">
            </colgroup>
            <thead>
              <tr>
                <th>BILL NO</th>
                <th>CUSTOMER NAME</th>
                <th>MOBILE</th>
                <th>BILL AMOUNT</th>
              </tr>
            </thead>
            <tbody>${buildCreditRows(creditRows)}</tbody>
          </table>
        </div>
      `;
    }

    function createContinuationHeader(totals, headingText){
      return `
        <div class="top-title">VAJRA LIGHTS &amp; ELECTRICALS.</div>
        <div class="meta-row">
          <div>DATE: <span>${safeCell(totals.metaDate)}</span></div>
          <div>GENERATED AT: <span>${safeCell(totals.generatedAt)}</span></div>
        </div>
        <div class="main-heading">${safeCell(headingText)}</div>
        <div class="continued-note">CONTINUED</div>
        <div class="double-line"></div>
      `;
    }

    function renderPages(receiptRows, paymentRows, creditRows, totals){
      const pagesContainer = $('pagesContainer');
      if(!pagesContainer) return;
      pagesContainer.innerHTML = '';

      function createPage(){
        const page = document.createElement('div');
        page.className = 'sheet';
        pagesContainer.appendChild(page);
        return page;
      }

      function pageFits(page){
        return page.scrollHeight <= page.clientHeight + 1;
      }

      function removeLastIfExists(tbody){
        if(tbody && tbody.lastElementChild) tbody.lastElementChild.remove();
      }

      let page = createPage();
      page.innerHTML = buildMainSection([], [], totals, false);

      let leftBody = page.querySelector('.half.left tbody');
      let rightBody = page.querySelector('.half:not(.left) tbody');
      const maxDetailRows = Math.max(receiptRows.length, paymentRows.length);

      for(let i = 0; i < maxDetailRows; i++){
        const receiptHtml = receiptRows[i] ? buildDetailRows([receiptRows[i]]) : '<tr><td></td><td></td><td></td><td></td><td class="amount"></td></tr>';
        const paymentHtml = paymentRows[i] ? buildDetailRows([paymentRows[i]]) : '<tr><td></td><td></td><td></td><td></td><td class="amount"></td></tr>';

        leftBody.insertAdjacentHTML('beforeend', receiptHtml);
        rightBody.insertAdjacentHTML('beforeend', paymentHtml);

        if(!pageFits(page)){
          removeLastIfExists(leftBody);
          removeLastIfExists(rightBody);

          page = createPage();
          page.innerHTML = buildMainSection([], [], totals, true);
          leftBody = page.querySelector('.half.left tbody');
          rightBody = page.querySelector('.half:not(.left) tbody');

          leftBody.insertAdjacentHTML('beforeend', receiptHtml);
          rightBody.insertAdjacentHTML('beforeend', paymentHtml);
        }
      }

      // Put credit register after cash-flow details. If it does not fit, move it to a fresh page.
      const creditWrapper = document.createElement('div');
      creditWrapper.innerHTML = buildCreditSection([]);
      page.appendChild(creditWrapper.firstElementChild);

      if(!pageFits(page)){
        const lastCreditBox = page.querySelector('.credit-box:last-child');
        if(lastCreditBox) lastCreditBox.remove();

        page = createPage();
        page.innerHTML = createContinuationHeader(totals, 'CREDIT - SALES REGISTER') + buildCreditSection([]);
      }

      let creditBody = page.querySelector('.credit-table tbody');

      for(let i = 0; i < creditRows.length; i++){
        const rowHtml = buildCreditRows([creditRows[i]]);
        creditBody.insertAdjacentHTML('beforeend', rowHtml);

        if(!pageFits(page)){
          removeLastIfExists(creditBody);

          page = createPage();
          page.innerHTML = createContinuationHeader(totals, 'CREDIT - SALES REGISTER') + buildCreditSection([], ' (CONTINUED)');
          creditBody = page.querySelector('.credit-table tbody');
          creditBody.insertAdjacentHTML('beforeend', rowHtml);
        }
      }

      // If there are no credit rows and the empty credit table alone wastes space, keep it only on the last page.
      // This keeps the print format consistent while still using full A4 height for real data rows.
    }

    async function fetchSales(dateStr){
      const { data, error } = await sb
        .from('sales_details')
        .select('id,sales_number,series_code,bill_date,invoice_amount,customer_name,customer_mobile,payment_type,created_at')
        .eq('bill_date', dateStr)
        .order('created_at', { ascending: true });

      if(error) throw error;

      const rows = Array.isArray(data) ? data : [];
      const creditSales = rows.filter(isCreditSale);
      const cashSales = rows.filter(r => !isCreditSale(r));

      return {
        creditSales,
        cashSalesTotal: cashSales.reduce((a, b) => a + num(b.invoice_amount), 0)
      };
    }

    async function fetchCashTransactions(dateStr){
      const { data, error } = await sb
        .from('cash_transactions')
        .select('*')
        .eq('txn_date', dateStr)
        .order('created_at', { ascending: true });

      if(error) throw error;

      const rows = Array.isArray(data) ? data : [];
      const receipts = rows.filter(r => norm(r.txn_type) === 'receipt');
      const payments = rows.filter(r =>
        norm(r.txn_type) === 'payment' && isApprovedStatus(r.approval_status)
      );

      return {
        receipts,
        payments,
        receiptsTotal: receipts.reduce((a, b) => a + num(b.amount), 0),
        paymentsTotal: payments.reduce((a, b) => a + num(b.amount), 0)
      };
    }

    async function fetchSalesReturns(dateStr){
      const { data, error } = await sb
        .from('sales_return_details')
        .select('id,total_return_amount,approval_status,is_accepted')
        .eq('return_date', dateStr);

      if(error) throw error;

      const rows = Array.isArray(data) ? data : [];
      const approved = rows.filter(r =>
        isApprovedStatus(r.approval_status) || r.is_accepted === true
      );

      return {
        total: approved.reduce((a, b) => a + num(b.total_return_amount), 0)
      };
    }

    async function loadClosingData(){
      try{
        if(!sb) throw new Error('Supabase client not found. Please check supabaseClient.js');

        const dateStr = $('closingDate').value;
        if(!dateStr) throw new Error('Please choose date');

        setStatus('Loading...');

        const [sales, cash, sr] = await Promise.all([
          fetchSales(dateStr),
          fetchCashTransactions(dateStr),
          fetchSalesReturns(dateStr)
        ]);

        const receiptRows = cash.receipts.map(r => [
          fmtTime(r.created_at || r.txn_date),
          r.voucher_no || r.receipt_number || r.id || '',
          r.party_name || r.customer_name || r.reference_name || '',
          r.notes || r.description || r.remarks || 'RECEIPT',
          fmtCurrency(r.amount)
        ]);

        const paymentRows = cash.payments.map(r => [
          fmtTime(r.created_at || r.txn_date),
          r.voucher_no || r.payment_number || r.id || '',
          r.party_name || r.supplier_name || r.reference_name || '',
          r.notes || r.description || r.remarks || 'PAYMENT',
          fmtCurrency(r.amount)
        ]);

        const creditRows = sales.creditSales.map(r => [
          billNo(r),
          r.customer_name || '',
          r.customer_mobile || '',
          fmtCurrency(r.invoice_amount || 0)
        ]);

        const totals = {
          metaDate: fmtDate(dateStr),
          generatedAt: fmtDateTime(new Date()),
          saleReceiptTotal: fmtCurrency(sales.cashSalesTotal + cash.receiptsTotal),
          cashSalesTotal: fmtCurrency(sales.cashSalesTotal),
          returnPaymentTotal: fmtCurrency(sr.total + cash.paymentsTotal),
          returnAmount: fmtCurrency(sr.total),
          balance: fmtCurrency((sales.cashSalesTotal + cash.receiptsTotal) - (sr.total + cash.paymentsTotal))
        };

        renderPages(receiptRows, paymentRows, creditRows, totals);
        setStatus('Loaded successfully.');
      }catch(err){
        console.error(err);
        setStatus(err.message || 'Failed to load', true);
      }
    }

    (function init(){
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');

      if($('closingDate')){
        $('closingDate').value = `${yyyy}-${mm}-${dd}`;
      }

      const emptyTotals = {
        metaDate: fmtDate(`${yyyy}-${mm}-${dd}`),
        generatedAt: fmtDateTime(new Date()),
        saleReceiptTotal: '0',
        cashSalesTotal: '0',
        returnPaymentTotal: '0',
        returnAmount: '0',
        balance: '0'
      };

      renderPages([], [], [], emptyTotals);
    })();
  </script>
</body>
</html>
